#:# Legacy dead keys for Non-Belgian AZERTY
#
#   <UEFD9> : "~"  *dead_legacytilde  Legacy tilde dead key: key E02, level 4.
#   <UEFDA> : "`"  *dead_legacygrave  Legacy grave dead key: key E07, level 4.
#
#   To improve backward compatibility, two legacy dead keys are required for
#   tilde and grave accent at level 4 of E02 and E07, because regular dead key
#   behavior is updated so as to output the combining diacritic when the space
#   bar is pressed after a dead key. Designed to seamlessly transition UX, the
#   legacy dead keys have limited functionality, no multikey equivalents, and
#   output ASCII on hitting space, ASCII twice on double press, emulating dead
#   key behavior as found on legacy keyboard layouts shipped with Windows.
#   (2022-12-20T2238+0100..2023-11-23T0722+0100)
#
#
#.# DEAD_LEGACYTILDE
