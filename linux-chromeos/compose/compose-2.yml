#
#
#*# DIAERESIS
#   dead_diaeresis
#   Multikey: ¦:
#
#   Quotation marks
#
#   Followed by quotedbl, EuroSign, apostrophe or rightsinglequotemark,
#   dead_diaeresis yields low, opening, curly quotation marks U201A, U201E.
#   A conflicting multikey equivalent is commented out and replaced with a
#   dedicated sequence.
#   See # # Quotation mark input method
#   See # # Comma-shaped quotation marks
#
#
#   Shortcuts
#
#   For usability, in French mode, dead_diaeresis is in the benefit of an
#   unshifted position. Hence its use for various shortcuts.
#
#   By diacriticized base letters, dead_diaeresis yields "Ǜ" U01DB, "ǜ" U01DC
#   by "Ù", "ù", but also "Å" U00C5, "å" U00E5 by "À", "à", and "Ø" U00D8,
#   "ø" U00F8 by "Ç", "ç" for convenience.
#   See # # Oslash for Danish, Norwegian and other languages
#
#   The long s "ſ" U017F has shortcuts by "z" and by "$", and the sharp s
#   "ẞ" U1E9E, "ß" U00DF has one by "S", "s" because it may be expected in
#   dead_diaeresis, additionally to being in group 1 of "S", "s" and thus well
#   supported, unlike the long s, in group 3 of "s" due to its antiquation.
#
#   The "≠" U2260 has a shortcut by "Z" with a graphic mnemonic, and so has the
#   horizontal ellipsis "…" U2026 by period, although it is on live key.
#   See dispocla.cpp key <AC11>
#
#
#   Superscripts
#
#   As dead_circumflex is lacking the multikey equivalents, dead_diaeresis is a
#   full-support alternative.
#   See #*# CIRCUMFLEX
#
#
#   Asterisk symbols
#
#   For intuitivity, with asterisk as a base character, dead_diaeresis yields
#   "⁑" U2051, consistently with dead_circumflex and *dead_superscript for
#   "⁂" U2042 ASTERISM. "⁑" U2051, "⁂" U2042 and "⁎" U204E are also in
#   dead_abovering.
#   See #*# RING_ABOVE
#   See #*# CIRCUMFLEX
#   See #*# SUPERSCRIPT
#
#
#   Per mille
#
#   Given that per mille "‰" U2030 and per myriad "‱" U2031 are scarcely used,
#   due to their confusability and limited availability, they are relegated to
#   the symbol groups 11 and 12, in favor of potentially more useful symbols in
#   the groups 1 and 2.
#   See # # D02 percent
#
#   However, per myriad has a shortcut in dead_acute, and per mille has two in
#   dead_diaeresis and in dead_circumflex.
#   See #*# ACUTE
#   See #*# CIRCUMFLEX
#
#
#   Long dashes
#
#   An alternative input method for multiple-em dashes ("⸺" U2E3A by "–" U2013,
#   "⸻" U2E3B by "—" U2014) is also provided, easing the input by proximity of
#   the dead key and the base characters.
#   See # # Long dashes
#   See #   Input method for hyphens and dashes
#
#
#   Symbols for documentation
#
#   Two less expected yet heavily used symbols, "‖" U2016 DOUBLE VERTICAL LINE
#   and "¦" U00A6 BROKEN BAR repurposed as multikey symbol, have quick access
#   by dead_diaeresis followed by slash, or periodcentered (for AZERTY) and
#   backslash (for remapped variants) respectively, for ease of input, as both
#   the dead key and the base characters are at the base level. (By contrast,
#   the more mnemonic but less practical bar is not used in this context, due
#   to conflicts with the diaeresis and macron virtual dead keys.)
#   See # # Symbols for multikey
#   See # # DIAERESIS&MACRON
#   See # # MACRON&DIAERESIS
#
#   "▾" U25BE BLACK DOWN-POINTING SMALL TRIANGLE representing the no-break thin
#   space U202F, by at sign, is by courtesy of the Draw Spaces plugin of GEdit.
#   See # # Symbols for no-break thin space NBTSP
#
