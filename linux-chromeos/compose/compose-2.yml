#
#^# MACRON input facility by DIAERESIS
#   dead_diaeresis double press
#   Multikey: ¦::
#
#   For ease of access, and in an attempt to meet potential user expectations,
#   the macron dead key is also activatable by dead_diaeresis double press,
#   extending the logic that multiple dead key presses transform diacritics,
#   to include the idea that a double press may also join the two dots, if
#   that is a better option with respect to usability.
#
#   For maintainability of the code, and usability of the documentation, this
#   dead key content is grouped in a single place.
#   See #*# MACRON
#   See # # Notes about documentation
#
#
#^# DIAERESIS_BELOW
#   dead_belowdiaeresis
#   dead_diaeresis triple press
#   Multikey: ¦:::
#
#   This is required for one precomposed letter (existing also with diaeresis),
#   plus several composed letters. Diaeresis below is used in Min Dong and in
#   phonetic transcription.
#   https://www.frathwiki.com/Diaeresis_Below
#
#   "᫝" U1ADD COMBINING DOT-AND-RING BELOW has asterisk as a base character,
#   because this is the multikey equivalent of ring above.
#   https://www.unicode.org/charts/PDF/Unicode-17.0/U170-1AB0.pdf
#
#   As the diaeresis below has no spacing clone, the two dot leader "‥" U2025
#   is provided instead.
#
#
#   Shortcut
#
#   Consistency with the bépo keyboard layout and other diacritical dead keys
#   requires virtualizing the diaeresis below dead key by double press
#   of the diaeresis dead key. Usability however imposes to use this as
#   a shortcut for the macron dead key located on D10, level 4, and to move to
#   triple press the variant below, while providing a shortcut using the
#   combination dead_diaeresis dead_circumflex in an attempt to restore some
#   ease of input.
#   https://bepo.fr/wiki/Touches_mortes#Tr%C3%A9ma_souscrit
#
#   For maintainability of the code, and usability of the documentation, this
#   dead key content is grouped in a single place.
#   See # # Notes about documentation
#
