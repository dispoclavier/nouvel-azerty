#^# COMMA_ABOVE
#   dead_abovecomma
#   dead_belowcomma double press
#   Multikey: ¦;;
#
#   This yields mainly the glottal letters "Ꞻ" UA7BA, "ꞻ" UA7BB, "Ꞽ" UA7BC,
#   "ꞽ" UA7BD, "Ꞿ" UA7BE, "ꞿ" UA7BF new to Unicode v12, as these may be
#   expected here, because the spiritus lenis that these glottal letters are
#   diacriticized with, often happens to be shaped like a comma above, that may
#   also be referred to as a curly apostrophe on top, so that "̓" U0313
#   COMBINING COMMA ABOVE is the actual encoding of the combining psili.
#
#   Nevertheless, the glottal letters are also in a dedicated dead key,
#   virtualized by *dead_abovehook UEFD3 double press.
#   See #^# GLOTTAL
#   See #*# COMMA_BELOW
#
