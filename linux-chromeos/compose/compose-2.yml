#^# LINE_BELOW
#   dead_lowline
#   *dead_macron triple press
#   Multikey: ¦|||
#
#   This is required for the letters used with a real line below, rather than a
#   macron below. But there are no precomposed letters with line below. Names
#   built on "WITH LINE BELOW" refer to a macron below instead.
#   https://unicode.org/charts/nameslist/n_1E00.html
#
#   The associated diacritic and its spacing equivalent are the same as for the
#   subscript dead key. Here, underscore acts as the spacing clone of the
#   diacritic; there, underscore is the ASCII equivalent of *dead_subscript,
#   and "̲" U0332 has the status of a combining clone.
#
#   Consistently with other dead keys supporting diacriticized math symbols,
#   grave (base character of "∧" U2227 in the symbol group 2) yields "⩠" U2A60,
#   with an extra line below compared to "⩟" U2A5F in dead_belowmacron, and
#   question yields "⩣" U2A63.
#   See #^# MACRON_BELOW
#
