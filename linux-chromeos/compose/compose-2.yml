#
#
#*# HOOK
#   hook, fishhook, crook
#   dead_hook
#   Multikey: ¦{
#
#   In character names, the hook has various designations. Straightforwardly,
#   a hook may also be referred to as a shepherd’s staff or crook, that other
#   languages may name this diacritic after. French calls it "crosse" and thus
#   alleviates the semantically overloaded hook (“crochet”). It may also be
#   referred to as a fishhook, like in the names of "ɾ" U027E and "𝼑" U1DF11.
#
#
#   Tone bars
#
#   This includes tone bars, due to good mnemonic based on "I", mapped like "{"
#   on D08. Tone bars also have dedicated multikey support.
#   See #^# Tone bars
#
#
#   Flower punctuation
#
#   Followed by period, dead_hook yields "⁕" U2055 FLOWER PUNCTUATION MARK with
#   a mnemonic both semantic based on sentence-ending period and flower, and
#   graphic based on keycap "I".
#   See #*# BREVE
#
#
#   Fullwidth punctuation
#
#   With an alphabetic mnemonic, dead_hook on key D08 "I" as "IDEOGRAPHIC"
#   yields CJK symbols and punctuation, single on single press, most double on
#   double press, and triple press yields "〚" U301A, "〛" U301B.
#
#                 quotedbl : "〃" U3003 DITTO MARK
#                 EuroSign : "〃" U3003 DITTO MARK
#                    grave : "〝" U301D REVERSED DOUBLE PRIME QUOTATION MARK
#               apostrophe : "〞" U301E DOUBLE PRIME QUOTATION MARK
#     rightsinglequotemark : "〞" U301E DOUBLE PRIME QUOTATION MARK
#                    comma : "〟" U301F LOW DOUBLE PRIME QUOTATION MARK
#               asciitilde : "〜" U301C WAVE DASH
#                braceleft : "〔" U3014 LEFT TORTOISE SHELL BRACKET
#               braceright : "〕" U3015 RIGHT TORTOISE SHELL BRACKET
#                parenleft : "【" U3010 LEFT BLACK LENTICULAR BRACKET
#               parenright : "】" U3011 RIGHT BLACK LENTICULAR BRACKET
#              bracketleft : "「" U300C LEFT CORNER BRACKET
#             bracketright : "」" U300D RIGHT CORNER BRACKET
#                     less : "〈" U3008 LEFT ANGLE BRACKET
#                  greater : "〉" U3009 RIGHT ANGLE BRACKET
#                        A : "〽" U303D PART ALTERNATION MARK
#                        a : "〽" U303D PART ALTERNATION MARK
#                        X : "〷" U3037 IDEOGRAPHIC TELEGRAPH LINE FEED SEPARATOR SYMBOL
#                        x : "〿" U303F IDEOGRAPHIC HALF FILL SPACE
#
#   Single press is in dead_hook.
#   See #*# HOOK
#
#   Double press is duplicated in *dead_retroflexhook.
#   See #^# CURL
#   See #*# RETROFLEX_HOOK
#
#   Triple press is duplicated in dead_abovedot.
#   See #^# SQUIRREL_TAIL
#   See #*# DOT_ABOVE
#
#
#   Diacritic
#
#   As a diacritic, "̡" U0321 COMBINING PALATALIZED HOOK BELOW is included, and
#   as a spacing modifier letter, "˞" U02DE MODIFIER LETTER RHOTIC HOOK, based
#   on "ɝ" U025D supported in dead_hook by "e". The rhotic hook in isolation is
#   also in the letter group 2 by case insensitive "r".
#   See #+# GROUP_2
#
