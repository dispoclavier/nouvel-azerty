#
#
#*# INVERTED_BREVE
#   inverted breve, trill
#   dead_invertedbreve
#   Multikey: ¦(
#
#   Both breve and inverted breve have their own dead key, for consistency with
#   the ASCII symbol map used for dead key multikey equivalents.
#   See #*# BREVE
#
#   As inverted breve has only 6×2 precomposed letters, it might be virtualized
#   by dead breve double press. Nevertheless, it has a dead key of its own, for
#   consistency with ASCII symbols, and with its XKB keysym dead_invertedbreve.
#
#   Inverted breve has no reported usage outside Unicode precomposed letters.
#   https://www.frathwiki.com/Inverted_Breve
#
#   This also supports "𝼀" U1DF00 LATIN SMALL LETTER FENG DIGRAPH WITH TRILL,
#   because the trill looks like a double inverted breve. This character only
#   exists since 2021 (Unicode 14.0), and this is the only instance of a trill.
#   Given that the feng digraph "ʩ" U02A9 is both in group 3 and in group 11,
#   "𝼀" U1DF00 is also supported in groups 1..5 and 11.
#   See # # Lenient dead key press
#
#
#   Half rings
#
#   "˓" U02D3 MODIFIER LETTER CENTRED LEFT HALF RING is mapped to unconflicting
#   and case insensitive C, with its right counterpart in dead_breve.
#   See #*# BREVE
#
#   "ʿ" U02BF MODIFIER LETTER LEFT HALF RING is mapped to case insensitive "d",
#   with its right counterpart "ʾ" U02BE in dead_breve.
#
#   Raised half rings "ʿ" U02BF and "ʾ" U02BE are in group 1 of "l" and "m",
#   too.
