<UEFD9>                                                                                        <n> : "ñ" U00F1 # LATIN SMALL LETTER N WITH TILDE
<UEFD9>                                                                                        <O> : "Õ" U00D5 # LATIN CAPITAL LETTER O WITH TILDE
<UEFD9>                                                                                        <o> : "õ" U00F5 # LATIN SMALL LETTER O WITH TILDE
<UEFD9>                                                                                        <U> : "Ũ" U0168 # LATIN CAPITAL LETTER U WITH TILDE
<UEFD9>                                                                                        <u> : "ũ" U0169 # LATIN SMALL LETTER U WITH TILDE
<UEFD9>                                                                                        <V> : "Ṽ" U1E7C # LATIN CAPITAL LETTER V WITH TILDE
<UEFD9>                                                                                        <v> : "ṽ" U1E7D # LATIN SMALL LETTER V WITH TILDE
<UEFD9>                                                                                        <Y> : "Ỹ" U1EF8 # LATIN CAPITAL LETTER Y WITH TILDE
