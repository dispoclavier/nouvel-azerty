#
#
#*# OGONEK
#   dead_ogonek
#   Multikey: ¦[
#
#   Given dead_ogonek’s legacy hitchhiking the multikey equivalents of
#   dead_belowcomma: semicolon, and dead_cedilla: comma, a new-school
#   alternative is required. So, bracketleft is convenient with its
#   shape-driven mnemonic, as in en_US.UTF-8/Compose it occurs only twice.
#
#
#   Diacritics
#
#   The combining ogonek above "᷎" U1DCE is supported regularly by double press
#   like other flipped diacritics, but also by apostrophe and its alias
#   rightsinglequotemark as a shortcut.
#   See #^# OGONEK_ABOVE
#
#   This supports the keycap diacritic  "⃣" U20E3 with *dead_abovehook UEFD3 as
#   a base character, and a mnemonic based on the brackets pair. The multikey
#   equivalent without full ASCII does not make sense, while with full ASCII,
#   the multikey equivalent would conflict with mathematical symbols and is
#   thus deactivated, as this facility is not worth screwing up the math.
#   See #*# HOOK_ABOVE
#   See # # Multikey equivalents
#
#
#   Shortcuts
#
#   Digits yield circled sans-serif number dingbats as a shortcut.
#   See # # CIRCLED_SANS
#
