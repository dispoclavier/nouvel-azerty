#
### Dead keys
#
#   While on Windows and macOS, input composition can be emulated by chaining
#   dead keys, XKB is to emulate dead keys by input composition. This resulting
#   configuration file is very human readable, and it is easily converted into
#   documentation.
#   See # # Notes about documentation
#
#   Input composition implemented by chaining dead keys is more powerful in
#   that it supports modularity, as opposed to XCompose that requires listing
#   all supported sequences, verbatim and in extenso. The reason why is that
#   this does not work:
#
#       <dead_circumflex> <dead_circumflex> : dead_belowcircumflex
#
#   then:
#
#       <dead_belowcircumflex> <e>          : "ḙ" U1E19 # LATIN SMALL LETTER E WITH CIRCUMFLEX BELOW
#
#   Although X.org specifies:
#
#       If the string is omitted, Xlib figures it out from the keysym according
#       to the current locale.
#
#       I.e., if a rule looks like:
#
#           <dead_grave>     <A> : "\300" Agrave
#
#       the result of the composition is always the letter with the "\300" code.
#       But if the rule is:
#
#           <dead_grave> <A> : Agrave
#
#       the result depends on how Agrave is mapped in the current locale.
#
#   https://www.x.org/releases/X11R7.5/doc/man/man5/Compose.5.html
#
#
# # Notes on Unicode support
#
#   Support of the Latin script is up-to-date as of Unicode 17.0 (2025-09-09).
#   https://www.unicode.org/versions/Unicode17.0.0/
#   https://github.com/dispoclavier/nouvel-azerty/releases/tag/6.0.4
#
#   The extended Latin F & G blocks in the SMP are supported since 2023-05-25.
#   https://unicode.org/versions/enumeratedversions.html
#   https://en.wikipedia.org/wiki/Latin_Extended-F
#
#   The issues related to SMP support do not affect Linux nor macOS, as opposed
#   to Windows, whose DEADTRANS macro only supports one single code unit output
#   instead of 2, 5 or more, and as a consequence, SMP characters are hard to
#   input by dead keys.
#
#   Due to more comprehensive support for Unicode characters used in Latin
#   script as encoded since version 1.1 of the Standard, some sequences in
#   en_US.UTF-8/Compose need to be redefined, by making more extensive use
#   of ASCII symbols and punctuation.
#
#   With Multi_key thought of as a generic dead key taking arguments, the base
#   letter that those modifications are applied to is typed last. This pattern
#   empowers XCompose to apply multiple diacritics as used in Vietnamese and in
#   Lithuanian. Therefore, it performs much better than the other way around.
#
#   As a result, semantics of paired punctuation may be switched compared to
#   en_US.UTF-8/Compose. For example, the multikey equivalent of dead_breve
#   in en_US.UTF-8/Compose is <Multi_key><a><parenleft>, while in new-school
#   input composition it is <Multi_key><parenright><a>.
#
#   This scheme is not proper to new school. Already en_US.UTF-8/Compose has
#   a prepended "U" with a shape-based mnemonic: <Multi_key><U><a>,
#   as well as a prepended initial: <Multi_key><b><a>.
#
#   While that change alone would not warrant a comprehensive overhaul, more
#   tweaks are required, such as supporting superscript and subscript, using
#   asciicircum and underscore repurposed, formerly circumflex and macron.
#
#   So, when "<" and ">" are used for circumflex and hacek (hatchek, caron)
#   and "|" for macron, ":" gets used for diaeresis like in Vim, and quotedbl
#   looks fine for double acute accent.
#
#   Bottom line: Full Unicode support requires an upgraded multikey scheme,
#   called "new-school input composition" for the purpose.
#
#
# # Introducing new-school input composition
#
#   New-school composition is designed to fully support the Latin script. This
#   requires repurposing several ASCII symbols, so that en_US.UTF-8/Compose
#   ends up disrupted, breaking user experience. Such a step is taken only
#   because it is unavoidable.
#
#   "^" and "_" need to be freed up for super- and subscript/smallcap, applying
#   the parentheses-breve scheme to circumflex and hacek, macron and diaeresis.
#   For example, new-school multikey sequences include « ¦^ » for superscript,
#   « ¦> » for hacek, « ¦< » for circumflex accent, « ¦| » for macron, « ¦: »
#   for diaeresis, « ¦" » for the double acute accent, an acute diaeresis.
#
#   Another reason to adopt new-school is that in en_US.UTF-8/Compose, <comma>
#   is used for both dead_cedilla and dead_ogonek, resulting in a conflict on E
#   that en_US.UTF-8/Compose works around by using <cedilla> instead of <comma>
#   in the multikey sequences yielding "Ȩ" U0228 and "ȩ" U0229.
#
#   Yet another reason is that en_US.UTF-8/Compose, using dead_hook both for
#   hook and hook above, is unable to support "Ƴ" U01B3 LATIN CAPITAL LETTER Y
#   WITH HOOK and "ƴ" U01B4 LATIN SMALL LETTER Y WITH HOOK, proving the
#   existing scheme as impracticable.
#
#
# # Multikey equivalents
#
#   Following the example of en_US.UTF-8/Compose, dead keys are emulated by
#   multikey for a versatile user experience at levels 1..3, despite dead keys
#   are extensively supported at level 4 with a number of level-1/3 duplicates.
#
#   Only a subset of the dead key content, however, is supported by multikey,
#   due to numerous conflicts, such as with the superscript or subscript dead
#   keys, with the quotation mark input method, with math symbols. Conflicting
#   multikey equivalents are commented out, with an enumeration of conflicting
#   characters, and eventually with a comment in the dead key header.
#   See # # Quotation mark input method
#   See #   Conflictlessness check
#   See #   Multikey conflicts with
#
#   Multikey equivalents for math symbols supported by dead key for consistency
#   are prone to conflicts with mnemonic multikey sequences provided as part of
#   the math symbol support, that have precedence over multikey equivalents,
#   for completeness of the math symbol documentation.
#   See ### Mathematical symbols by multikey
#   See #   Multikey is supported as part of math symbols.
#   See # # Notes about documentation
#
#   Extended dead key support — beyond the feasible multikey support level — is
#   required to make sure that dead keys are usable to an acceptable extent, so
#   as to avoid an excessive number of failures and disappointments, and foster
#   wide adoption motivated by the observation of usability and adequacy.
#
#   The resulting inconsistencies due to dead key sequences without a supported
#   multikey equivalent require transpiling multikey sequences separately, as
#   opposed to connecting the dead keys to a similar number of multikey entry
#   points, as it is straightforward when manually configuring the dead keys
#   on Windows.
#   See dead-key-convert.pl # Multikey
#
#   Most multikey equivalents below the dead key sequences have been added by
#   the script generate-multikey.pl.
#   https://github.com/dispoclavier/nouvel-azerty/blob/main/linux-chromeos/outils/generate-multikey.pl
#
#
# # X11 dead keysyms
#
#   The dead keysyms defined in keysymdef.h, that is part of x11proto-core-dev,
#   are so defective that the Latin script cannot be fully supported without
#   private use area keysyms. The most outstanding example is the lack of a
#   keysym for the bar diacritic, thought of as horizontal, as opposed to
#   the diagonal stroke.
#   See # # Bar and stroke diacritics
#
#   Here are the dead keysyms for Latin keyboard layouts configured in
#   keysymdef.h. The 21 dead keysyms used in this file are checked:
#
#      dead_abovecomma
#    ✔ dead_abovedot
#      dead_abovereversedcomma
#    ✔ dead_abovering
#    ✔ dead_acute
#      dead_belowbreve
#      dead_belowcircumflex
#    ✔ dead_belowcomma
#      dead_belowdiaeresis
#    ✔ dead_belowdot
#      dead_belowmacron
#      dead_belowring
#      dead_belowtilde
#    ✔ dead_breve
#    ✔ dead_caron
#    ✔ dead_cedilla
#    ✔ dead_circumflex
#    ✔ dead_currency
#    ✔ dead_diaeresis
#    ✔ dead_doubleacute
#      dead_doublegrave
#    ✔ dead_grave
#    ✔ dead_greek
#    ✔ dead_hook
#    ✔ dead_horn
#    ✔ dead_invertedbreve
#    ✔ dead_macron
#    ✔ dead_ogonek
#    ✔ dead_stroke
#    ✔ dead_tilde
#
#   Some new dead keys already had a keysym defined in keysymdef.h, then got it
#   removed as documented below:
#
#      dead_aboveverticalline
#      dead_belowverticalline
#      dead_longsolidusoverlay
#      dead_lowline
#
#
# # Bar and stroke diacritics
#
#   Despite for line-shaped diacritics crossing the letters, the slant of the
#   line is semantically significant, they are interchangeably referred to as
#   “stoke”, eventually with the attribute “diagonal”. Fortunately, in Unicode,
#   the horizontal line is often called “bar”.
#
#   As of the keysym, in X11 keysymdef.h, dead_stroke was initially meant to be
#   used both for the diagonal dash overlay and for the horizontal dash overlay
#   also known as bar. Yet in practice, one dead key is not enough to support
#   both "/"-shaped and "-"-shaped diacritics.
#
#   To cater for Karl Pentzlin’s new German T3 layout issued in DIN 2137:2012,
#   dead_longsolidusoverlay was added based on the name of the diacritic used
#   to decompose negated math symbols: "̸" U0338 COMBINING LONG SOLIDUS OVERLAY
#   (given that Oslash "Ø" U00D8 LATIN CAPITAL LETTER O WITH STROKE and similar
#   letters are not decomposed). T3 also required another three new keysyms:
#   dead_aboveverticalline, dead_belowverticalline, dead_lowline, although none
#   of these has any precomposed letters, and Windows’ DEADTRANS macro only
#   supports one single code unit output instead of 2, 5 or more, and as a
#   consequence, decomposed (NFD/NFKD) letters cannot be input by dead key like
#   precomposed letters. But the stroke versus bar distinction made a good
#   point for adding the “extra dead elements for German T3 layout” alongside
#   the use of vertical line below and its alternate representation vertical
#   line above in Yoruba and in other languages.
#
#   Initially, the new keysym was called "dead_longsolidus", and "dead_stroke"
#   was disruptively renamed to "dead_shortstroke" as well.
#   https://bugs.freedesktop.org/attachment.cgi?id=85370
#
#   Alas, en_US.UTF-8/Compose has not been updated in the wake. One decade down
#   the road, while dead_longsolidusoverlay was (expectedly) in use at least in
#   Cimbali’s partial implementation (skipping unsupported dead key content) of
#   the newly standardized (NF Z71-300) French AZERTY https://norme-azerty.fr/
#   in /usr/share/X11/symbols/fr(afnor), that explicitly supports "Ł" U0141 and
#   "ł" U0142 as well as "Ƚ" U023D and "ƚ" U019A (another casing letter pair is
#   less completely enumerated in the standard), Ghost User (@ghost) managed to
#   toss it out of keysymdef.h.
#   https://gitlab.freedesktop.org/xorg/proto/xorgproto/-/merge_requests/70
#   https://web.archive.org/web/20240520104930/https://gitlab.freedesktop.org/xorg/proto/xorgproto/-/merge_requests/70
#   https://gitlab.freedesktop.org/xorg/proto/xorgproto/-/commit/6d4acb0e3a6568a8faaa651d4e3d32f917b9067b
#   https://web.archive.org/web/20250202063718/https://gitlab.freedesktop.org/xorg/proto/xorgproto/-/commit/6d4acb0e3a6568a8faaa651d4e3d32f917b9067b
#
#   The resulting regression was bluntly released in libxkbcommon 1.6.0.
#   https://lists.freedesktop.org/archives/wayland-devel/2023-October/043121.html
#   https://www.reddit.com/r/openSUSE/comments/17guwgm/comment/k6p6ul2/
#
#   Consistently, in Cimbali’s French AFNOR layout, dead_longsolidusoverlay
#   ended up as a second instance of dead_stroke, and none of the two French
#   standard layouts could be implemented anymore using XKB named keysyms only.
#
#   Fortunately, that was just a ghost in a mismanaged branch that did not make
#   it into main, given that in 2024 versions, the new keysyms are still there.
#   https://fossies.org/linux/tk/xlib/X11/keysymdef.h
#   https://web.archive.org/web/20241002235635/https://fossies.org/linux/tk/xlib/X11/keysymdef.h
#
#   Consistently, in version tk8.6.15 (2024-11-27), new advice has been added,
#   urging to not remove any keysyms (line 168).
#   https://fossies.org/diffs/tk/8.6.14_vs_8.6.15/xlib/X11/keysymdef.h-diff.html
#
#   The outcome is that in the meantime, due to assuming that the changes were
#   effective, the instances of dead_longsolidusoverlay have been replaced with
#   dead_stroke, and *dead_bar has been assigned UEFD8, the ninth Private Use
#   keysym used for regular dead keys in this file, resulting in more
#   consistency of dead keysyms with names of diacritics.
#   See # # Proposed additional dead keysyms
#
#
# # Macron below and line below
#
#   The deadkeysym dead_lowline is not used to input precomposed letters having
#   “WITH LINE BELOW” in their name, given that in the "Latin Extended
#   Additional" block, “the names "WITH LINE BELOW" refer to a macron below the
#   letter.”
#   https://unicode.org/charts/nameslist/n_1E00.html
#
#   These letters are input using dead_belowmacron, which may be virtualized by
#   double press of dead_macron.
#   See #^# MACRON_BELOW
#
#   Letters with a real line below are used in languages of Gabon and in Oneida
#   and require a line-below dead key, standardized in ISO/IEC 9995-11, where
#   dead keys output combining diacritics to begin with, for post-processing by
#   applications on Windows that part 11 of the standard has been designed for.
#   See #^# LINE_BELOW
#
#   As the output only consists in an added combining diacritic to any letter
#   typed after, implementing this dead key on non-Windows keyboards requires
#   knowing the list of letters expected to be supported.
#
#   (Although "̲" U0332 COMBINING LOW LINE is defined as connecting, it may not
#   be used to underline a text span in plain text, due to vertical alignment
#   issues under lowercase letters with descender.)
#
#
# # Hook, hook above and retroflex hook
#
#   In en_US.UTF-8/Compose, dead_hook is used both for hook and hook above.
#   The consequence is that en_US.UTF-8/Compose is unable to support "Ƴ" U01B3
#   LATIN CAPITAL LETTER Y WITH HOOK and "ƴ" U01B4 LATIN SMALL LETTER Y WITH
#   HOOK alongside "Ỷ" U1EF6 LATIN CAPITAL LETTER Y WITH HOOK ABOVE and
#   "ỷ" U1EF7 LATIN SMALL LETTER Y WITH HOOK ABOVE.
#
#   In en_US.UTF-8/Compose, the question mark is used as a multikey equivalent
#   of hook above, while the many letters with hook that are supported ("Ɓ",
#   "ɓ", "Ƈ", "ƈ", "Ɗ", "ɗ", "Ƒ", "ƒ", "Ɠ", "ɠ", "ɦ", "Ƙ", "ƙ", "Ɱ", "ɱ", "Ɲ",
#   "ɲ", "Ƥ", "ƥ", "ʠ", "ɼ", "ʂ", "Ƭ", "ƭ", "Ʋ", "ʋ", "Ⱳ", "ⱳ", "Ȥ", "ȥ") are
#   so by dead key only (dead_hook), without any multikey equivalent.
#
#   Hence the need for a keysym dedicated to letters with hook above. The most
#   obvious is *dead_abovehook. As of its multikey equivalent, bracketright is
#   more convenient than question.
#
#   Another hook dead key is added because new-school input composition uses
#   braceleft as a multikey equivalent of dead_hook, while taking advantage of
#   the brace symmetry to alleviate the overloaded dead_hook, by adding the new
#   *dead_retroflexhook dead key, with braceright as a multikey equivalent.
#
#
# # Proposed additional dead keysyms
#
#   These 8 additional dead keys are required for supporting the Latin script,
#   and also for consistency with the 30 ASCII symbols and punctuation mapped
#   at level 3 of the keys in rows B..D, columns 1..10.
#
#   *dead_abovehook
#   See # # Hook, hook above and retroflex hook
#   See #*# HOOK_ABOVE
#
#   *dead_bar
#   See # # Bar and stroke diacritics
#   See #*# BAR
#
#   *dead_group
#   See ### Group dead key introduction
#   See #*# GROUP_1
#
#   *dead_flag (regional indicator letters, U1F1E6..U1F1FF)
#   See #*# FLAG
#
#   *dead_retroflexhook
#   See # # Hook, hook above and retroflex hook)
#   See #*# RETROFLEX_HOOK
#
#   *dead_reversed (~50 Latin letters)
#   See #*# REVERSED
#
#   *dead_subscript (smallcap when the base letter is uppercase)
#   See #*# SUBSCRIPT
#
#   *dead_superscript (used as modifier letter and abbreviation indicator)
#   See #*# SUPERSCRIPT
#
#   *dead_turned (~70); inverted (20) or sideways (8) on double press
#   See #*# TURNED
#
#   An alias for a virtual dead key is also proposed, consistently with many
#   XKB keysyms used for dead keys virtualized by double press in this layout,
#   such as dead_belowcircumflex:
#   *dead_circled for dead_greek double press
#   See #^# CIRCLED
#
#
# # Dead keys not included in keysymdef.h
#
#   As these dead keys are required on these fr-FR keyboard layouts, and while
#   keysymdef.h does not feature them, the following Private Use Area picks are
#   used so far instead, with mnemonic numbers to palliate the lack of mnemonic
#   dead keysyms.
#   https://fossies.org/linux/tk/xlib/X11/keysymdef.h
#   See # # Dead characters for portability
#
#   0 is for the group dead key, 1 is for superscript, and 2 is for subscript,
#   given that these three are both the most outstanding and the most obvious
#   new dead keys; 3 has the form of a hook above; 4 has a flection to the left
#   making it mnemonic for retroflex; 5 remains readable after it is turned;
#   7 looks close to a flag; and 8 has lines converging at the exact location
#   of the bar crossing barred letters. The least mnemonic is 6 for reversed.
#
#   The "D" in second position is mnemonic for "dead key".
#
#   The sequences in French quotes are the multikey equivalents.
#   See #   Multikey sequence notation
#   See # # Multikey equivalents
#
#   <UEFD0> : "①"   *dead_group, for 12 additional groups; « ¦# ».
#                   See #*# GROUP_1
#
#   <UEFD1> : "^"   *dead_superscript, used in phonetics and for abbreviation
#                   indicators, also on live keys; « ¦^ ».
#                   See #*# SUPERSCRIPT
#                   See dispocla.cpp ## Superscript letters
#                   See #*# CIRCUMFLEX
#
#   <UEFD2> : "_"   *dead_subscript is required for phonetics and traditionally
#                   includes small caps; « ¦_ ».
#                   See #*# SUBSCRIPT
#
#   <UEFD3> : "ẻ"   *dead_abovehook, required to prevent conflicts of dead_hook
#                   with hook above; « ¦] ».
#                   See #*# HOOK_ABOVE
#                   See #*# HOOK
#
#   <UEFD4> : "ɖ"   *dead_retroflexhook, required to unload the overloaded
#                   dead_hook, and for consistency with the new-school multikey
#                   scheme benefitting from brace symmetry; « ¦} ».
#                   See #*# RETROFLEX_HOOK
#                   See #*# HOOK
#
#   <UEFD5> : "ᴚ"   *dead_turned, technically easiest transform; ~70 instances;
#                   « ¦% ».
#                   See #*# TURNED
#                   double-press: inverted (20) or sideways (8) in Latin;
#                   inverted and sideways have an empty intersection; « ¦%% ».
#                   See #^# INVERTED
#
#   <UEFD6> : "ᴙ"   *dead_reversed, second-most frequent transform;
#                   ~50 instances in Latin; « ¦\ ».
#                   See #*# REVERSED
#
#   <UEFD7> : "⚐"   *dead_flag is the Regional Indicator Symbols dead key, with
#                   additional "double" and "equal" semantics; « ¦= ».
#                   See #*# FLAG
#
#   <UEFD8> : "ħ"   *dead_bar for barred letters, with the meaning of a
#                   horizontal line through, as opposed to the diagonal or
#                   oblique stroke; « ¦- ».
#                   See # # Bar and stroke diacritics
#                   See #*# BAR
#                   See #*# STROKE
#
#
# # Order of dead key content lists
#
#   There is no obvious order, as keysyms may be missing, most code points are
#   arbitrary and unmnemonic, and using common names is challenging due to
#   language and conventions.
#
#   By lack of anything better, dead keys are ordered following the ASCII map
#   of the AZERTY keyboard layout.
#   See #   Dead key layout overview
#
#   This order is based on the assumption that the ASCII symbols are mapped in
#   a stable manner. However, this map was unstable until it was settled in
#   version 2 and corrected in version 6.
#   See Compose.yml Acknowledgements
#
#
# # Proposed dead key layout for AZERTY keyboards
#
#   30 out of 32 ASCII symbols and punctuation are mapped at level 3 of keys
#   (B..D)(01..10), and 28 dead keys are mapped at level 4 on the same keys
#   as the ASCII characters used to emulate those dead keys by multikey, using
#   old-school or new-school input composition as appropriate on a case-by-case
#   basis.
#   See # # Introducing new-school input composition
#
#   One of those two dead keys that is not mapped on the same key as the symbol
#   used to emulate it by multikey is dead_abovedot, mapped on key "P", where
#   level-3 ampersand is unrelated. However, dead_abovedot’s multikey
#   equivalent period is mapped at level 5, for use as a decimal separator or
#   group separator on the level-5 numpad, alongside comma on key C10 "M" on
#   AZERTY.
#
#   The other exception is dead_cedilla on the "comma" key B07, where level 3
#   is used for question mark, that is not an equivalent of any dead key
#   either.
#
#   As a result, most dead keys are mnemonically related to the ASCII symbols
#   mapped on the same keys, the more as all level-4 positions are available
#   for dead keys, because none of them is used for an uppercase letter, the
#   less as in the Windows implementation of these layouts, the UX level 3
#   called AltGr is an additional level, implemented as 0x10 or Right Oyayubi.
#   It is no longer emulated by Control + Alt. As a consequence, it has no
#   Caps Lock support, but it is free from the numerous conflicts with
#   application shortcuts affecting the (Shift-plus-)Control-plus-Alt "AltGr"
#   levels, no matter how good applications managed to fix them internally.
#
#   That is one reason why levels 3 and 4 are not used for casing characters,
#   consistently with Mark Durdin’s advice about “Robust key message handling
#   in Windows”.
#   https://blog.keyman.com/2008/06/robust-key-mess/
#
#   Except Multi_key, each dead key has a stable mapping at level 4 according
#   to the table below.
#
#
#   Dead key layout overview
#
#   Based on AZERTY fr_FR, French mode (ASCII mode swaps B09, B10 levels 1, 2).
#   Non-existing mnemonic keysyms are flagged with a prepended asterisk and
#   followed by the private use area keysym used in this file. All of these
#   are new-school as of multikey equivalents. Levels are in French mode.
#
#   Level 1 2           3         4
#                          Multikey equivalent
#                          ↓
#              (QWERTY)           IDENTIFIER      Keysym
#
#   D01   a A  (Q)      ^  ¦^ #*# SUPERSCRIPT    *dead_superscript UEFD1
#   D02   z Z  (W)      %  ¦% #*# TURNED         *dead_turned UEFD5
#   D03   e E           "  ¦" #*# DOUBLE_ACUTE    dead_doubleacute new-school
#   D04   r R           \  ¦\ #*# REVERSED       *dead_reversed UEFD6
#   D05   t T           ~  ¦~ #*# TILDE           dead_tilde
#   D06   y Y           @  ¦@ #*# GREEK           dead_greek new-school
#   D07   u U           '  ¦' #*# ACUTE           dead_acute
#   D08   i I           {  ¦{ #*# HOOK            dead_hook new-school
#   D09   o O           }  ¦} #*# RETROFLEX_HOOK *dead_retroflexhook UEFD4
#   D10   p P           &  ¦. #*# DOT_ABOVE       dead_abovedot
#
#   C01   q Q  (A)      #  ¦# #*# GROUP_1        *dead_group UEFD0
#   C02   s S           $  ¦$ #*# CURRENCY        dead_currency new-school
#   C03   d D           (  ¦( #*# INVERTED_BREVE  dead_invertedbreve new-school
#   C04   f F           )  ¦) #*# BREVE           dead_breve new-school
#   C05   g G           -  ¦- #*# BAR            *dead_bar UEFD8
#   C06   h H           +  ¦+ #*# HORN            dead_horn
#   C07   j J           _  ¦_ #*# SUBSCRIPT      *dead_subscript UEFD2
#   C08   k K           [  ¦[ #*# OGONEK          dead_ogonek new-school
#   C09   l L           ]  ¦] #*# HOOK_ABOVE     *dead_abovehook UEFD3
#   C10   m M  (;)      |  ¦| #*# MACRON          dead_macron new-school
#
