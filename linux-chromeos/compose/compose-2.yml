#
#^# OGONEK_ABOVE
#
#   As this dead key exists for "᷎" U1DCE only, it is streamlined by cropping
#   the base characters.
#   See # # Single-character dead keys
#
#dead_ogonek><dead_ogonek>                                                                 <space> : "᷎" U1DCE # COMBINING OGONEK ABOVE
<dead_ogonek><dead_ogonek>                                                                         : "᷎" U1DCE # COMBINING OGONEK ABOVE
#   Multikey conflicts with "⟦" U27E6.                                                             : "᷎" U1DCE # COMBINING OGONEK ABOVE
#
#
#*# HOOK_ABOVE
#   *dead_abovehook UEFD3
#   Multikey: ¦]
#
#   This supports the keycap diacritic  "⃣" U20E3 with dead_ogonek as a base
#   character, and a mnemonic based on the brackets pair. The multikey
#   equivalent without full ASCII does not make sense, while with full ASCII,
#   the multikey equivalent would conflict with mathematical symbols and is
#   thus deactivated, as this facility is not worth screwing up the math.
#   See #*# OGONEK
#   See # # Multikey equivalents
#
#   Digits yield negative sans-serif circled number dingbats as a shortcut.
#   See # # CIRCLED_NEGATIVE_SANS
#
#   Since the combining hook above has no spacing clone nor any modifier letter
#   looking close to it, both half rings "ʾ" U02BE, "ʿ" U02BF are provided as a
#   stopgap, with a rationale based on the laterality of the AltFr and AltGr
#   modifier keys involved in typing these left and right half rings this way.
#   AltGr + spacebar yields nobreakspace, and the no-break thin space U202F is
#   on AltFr + spacebar.
#
<UEFD3>                                                                                    <space> : "̉" U0309 # COMBINING HOOK ABOVE
<Multi_key><bracketright>                                                                  <space> : "̉" U0309 # COMBINING HOOK ABOVE
<UEFD3>                                                                                    <U200B> : "̉" U0309 # COMBINING HOOK ABOVE
