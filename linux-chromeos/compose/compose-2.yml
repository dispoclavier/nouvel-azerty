#   <UEFD2>                  <*dead_subscript>          "_" U005F LOW LINE
#   <UEFD3>                  <*dead_abovehook>          "ỏ" U1ECF LATIN SMALL LETTER O WITH HOOK ABOVE
#   <UEFD4>                  <*dead_retroflexhook>      "ɖ" U0256 LATIN SMALL LETTER D WITH TAIL
#   <UEFD5>                  <*dead_turned>             "ɐ" U0250 LATIN SMALL LETTER TURNED A
#   <UEFD6>                  <*dead_reversed>           "ᴙ" U1D19 LATIN LETTER SMALL CAPITAL REVERSED R
#   <UEFD7>                  <*dead_flag>               "⚐" U2690 WHITE FLAG
#   <UEFD8>                  <*dead_bar>                "ɍ" U024D LATIN SMALL LETTER R WITH STROKE
#
#       The bar dead key has "ɍ" U024D as a base character for French mnemonics
#       based on “raie”, the French word for “bar”, and “rayé”, French for the
#       English word “barred” and the English term “with bar”, despite this is
#       often mistranslated by “barré” meaning “struck”, or “with stroke”.
#       See #*# BAR
#
#   <UEFD8><UEFD8>           <*dead_bar><*dead_bar>     "ⱡ" U2C61 LATIN SMALL LETTER L WITH DOUBLE BAR
#   <UEFD9>                  <*dead_legacytilde>        "~" U007E TILDE
#   <UEFDA>                  <*dead_legacygrave>        "`" U0060 GRAVE ACCENT
#
#   The multikey sequences by contrast are built using generic dead characters
#   in a private use area, because there are too many of them, and it is better
#   to have a .notdef box output on failure rather than an unintended character
#   or two of them (on Windows).
#
#   Moreover, chained dead keys require as many dead characters as dead keys
#   involved. As a result, support for this scheme is about to be dropped.
#
#
# # Combining diacritics
#
#   The Unicode Standard states:
#
#      A common implementation for the input of combining character sequences
#      is the use of dead keys. These keys match the mechanics used by
#      typewriters to generate such sequences through overtyping the base
#      character after the nonspacing mark. In computer implementations,
#      keyboards enter a special state when a dead key is pressed for the
#      accent and emit a precomposed character only when one of a limited
#      number of “legal” base characters is entered. It is straightforward
#      to adapt such a system to emit combining character sequences or
#      precomposed characters as needed.
#
#      Typists, especially in the Latin script, are trained on systems that
#      work using dead keys. However, many scripts in the Unicode Standard
#      (including the Latin script) may be implemented according to the
#      handwriting sequence, in which users type the base character first,
#      followed by the accents or other nonspacing marks (see Figure 5-4).
#
#   https://www.unicode.org/versions/Unicode17.0.0/core-spec/chapter-5/#G1076
#   https://unicode.org/mail-arch/unicode-ml/y2016-m11/0046.html
#
#   As a consequence, keyboard layouts should feature dead keys as well as easy
#   access to combining marks, so as to support out of the box the characters
#   used in phonetics, also supported using Praat with sequences like multikey:
#   https://www.fon.hum.uva.nl/praat/manual/Phonetic_symbols__diacritics.html
#
#   In en_US.UTF-8/Compose, combining diacritics are supported using the base
#   character nobreakspace, while space yields a legacy spacing character if
#   available (not for dead_hook, dead_belowcomma, dead_doubleacute properly).
#
#   In ISO/IEC 9995-11:2026, combining diacritics are supported using dead key
#   double press, while space yields a legacy spacing character if available,
#   and if not, another useful and mnemonic spacing character, as specified.
#   https://en.wikipedia.org/w/index.php?title=ISO/IEC_9995&diff=next&oldid=1319186841#Functionality
#   https://en.wikipedia.org/w/index.php?title=ISO/IEC_9995&diff=next&oldid=1319186841#Dead_keys_on_space:_Spacing_variants_of_the_diacritical_marks
#
#   However, those among these spacing characters that are in the ASCII range,
#   as "^", "~", "`", are not usefully generated by dead key, and are expected
#   to be easily accessible on live keys instead, while all others are only a
#   small subset of the characters in use, and dead key multiple press is used
#   to virtualize other useful dead keys, and to provide shortcuts to some.
#   See #^# HACEK input facility by CIRCUMFLEX
#   See #^# MACRON input facility by DIAERESIS
#   See #^# COMBINING_ABOVE
#   See #^# INVERTED
#   See #^# MIDDLE_TILDE
#   See #^# DOUBLE_MIDDLE_TILDE
#   See #^# CIRCLED
#   See #^# DOUBLE_ACUTE
#   See #^# CURL
#   See #^# SQUIRREL_TAIL
#   See #^# PALATAL_HOOK
#   See #^# SWASH_TAIL
#   See #^# VERTICAL_LINE_ABOVE
#   See #^# CURRENCY_EXTENDED
#   See #^# INVERTED_BREVE_BELOW
#   See #^# BREVE_BELOW
#   See #^# DOUBLE_BAR
#   See #^# HIGH_BAR
#   See #^# COMBINING_OVERLAY
#   See #^# COMBINING_BELOW
#   See #^# GLOTTAL
#   See #^# MACRON_BELOW
#   See #^# LINE_BELOW
#   See #^# OBLIQUE_STROKE
#   See #^# TRIPLE_STROKE
#   See #^# RING_BELOW
#   See #^# CIRCUMFLEX_BELOW
#   See #^# HACEK_BELOW
#   See #^# FLAG_EMOJI
#   See #^# REGIONAL_INDICATOR_SYMBOL
#   See #^# DOUBLE_GRAVE
#   See #^# COMMA_ABOVE
#   See #^# DIAERESIS_BELOW
#   See #^# VERTICAL_LINE_BELOW
#   See #^# GROUP_2
#   See #^# GROUP_3
#   See #^# GROUP_4
#
#   The only dead keys where multiple press directly yields a combining
#   diacritic are dead_ogonek and dead_cedilla on double press — but not the
#   combining ogonek nor the combining cedilla —, and dead_acute on triple
#   press for the combining triple acute accent.
#   See #^# OGONEK_ABOVE
#   See #^# TRIPLE_ACUTE
#   See #^# CEDILLA_ABOVE
#
#   Hence it is proposed to use space as a base character to get the combining
#   diacritic throughout following J. ‘Mach’ Wust, as implemented:
#
#     • since 2009 on Michael Langlois’ Clavier français diacrité 1.1.
#       https://michaellanglois.fr/it/french-keyboard-with-diacritics-11-windows_clavier-francais-diacrite-11-windows/
#       https://michaellanglois.fr/it/french-keyboard-with-diacritics-11-mac_clavier-francais-diacrite-11-mac/
#
#     • since 2010 on J. ‘Mach’ Wust’s US Custom keyboard layout for macOS.
#       https://uscustom.sourceforge.net/
#       https://sourceforge.net/projects/uscustom/
#
#   Following a principle used in en_US.UTF-8/Compose, the most synergistic
#   character after the default mappings of dead keys at level 4, ZWSP,
#   duplicates the combining diacritics, much like conversely, the NBSP is
#   repurposed to yield spacing diacritics as does en_US.UTF-8/Compose with
#   ordinary space.
#
#   "¤" U00A4 # CURRENCY SIGN is an exception to the rule.
#
#   The XCompose compiler does not parse results defined as multiple keysyms.
#   Composed letters must be defined as literal strings without keysyms.
#
#   In en_US.UTF-8/Compose, the only composed Latin letter is the uppercase and
#   lowercase "j" with acute accent by dead_acute or by multikey with prepended
#   or appended ASCII apostrophe or Latin-1 acute:
#
#       "J́"   # LATIN CAPITAL LETTER J U004A with COMBINING ACUTE ACCENT U0301
#       "j́"   # LATIN SMALL LETTER J U006A with COMBINING ACUTE ACCENT U0301
#
#   Due to a technical limitation on Windows (the DEADTRANS macro only supports
#   one single code unit output instead of 2, 5 or more), dead keys on Windows
#   are limited to single UTF-16 code units, excluding composed letters and
#   characters in the Supplemental Multilingual Plane. Hence, composed letters
#   are not cross-platform compatible.
#
#
# # Enumeration order of dead keys
#
#   Dead keys in this file are ordered following the AZERTY keyboard layout and
#   the level-3 ASCII map.
#   See # # Actionable dead key layout for Latin keyboards
#
#   Heading levels are differentiated, in that the main dead keys with mappings
#   on keys are prefixed "#*# ", the dead keys virtualized by double or triple,
#   rarely quadruple press are prefixed "#^# ", and the other dead keys "# # ".
#
#   Dead keys are further ordered following this scheme:
#
#       1.    #*# Main dead key
#       2.    # # Dead key in group
#       3.    # # Dead key combination with one or more other dead keys
#       4.    #^# Dead key virtualized by multiple press
#
#   The order of base characters matters, too, as this file is also used for
#   documentation: spaces, other symbols and punctuation (including quotedbl
#   and apostrophe and their aliases, used for the quotation mark input method)
#   where ASCII is intuitively ordered following the level-3 ASCII map, that
#   the level-4 dead key map is consistent with, while non-ASCII aliases
#   EuroSign (quotedbl), periodcentered (backslash), dead_greek (at),
#   rightsinglequotemark (apostrophe) and section (exclam) are grouped with
#   their ASCII counterparts; digits come next, then the base alphabet, and
#   ultimately, diacriticized letters on live keys, and additional letters
#   mapped on African variants.
#   See # # Composed letters for languages in Togo
#   See # # Order of dead key content lists
#
#   As a result, combining marks and spacing clones of diacritics are listed
#   first.
#
#
# # Composed letters for languages in Togo
#
#   The letters labeled "Languages in Togo" are based on the list that
#   Mats Blakstad <mats.gbproject_at_gmail.com> shared on the Unicode public
#   mailing list in 2016:
#   “Possible to add new precomposed characters for local language in Togo?”
#   https://unicode.org/mail-arch/unicode-ml/y2016-m02/0071.html
#
#   Sequences with "Ɛ" U0190, "ɛ" U025B, "Ɔ" U0186, "ɔ" U0254 keysyms are for
#   use on the Francophone Africa semiautomatic keyboard layout “kbfrAFs” and
#   its remapped variant “kbfrAFr” with live keys for open e, also known as
#   Latin epsilon, and open o.
#
#   For a streamlined user experience, regular base letters in groups 1..3 are
#   supported alongside the following shortcut base letters, listed with their
#   regular alternatives:
#
#       Output    Input group 1    group 2    group 3
#
#       "Ɛ" U0190       X          E
#       "ɛ" U025B       x          e
#       "Ŋ" U014A       G          N
#       "ŋ" U014B       g          n
#       "Ɔ" U0186       C          O
#       "ɔ" U0254       c          o
#       "Ʋ" U01B2       U                     V
#       "ʋ" U028B       u                     v
#
#   Consistently, the base letters of composed letters for languages in Togo
#   must match those in the letter groups.
#   See #+# GROUP_1
#   See #+# GROUP_2
#   See #+# GROUP_3
#
#   The group dead key press may be skipped in some instances thanks to
#   conflictlessness, although it is supported throughout for consistency.
#   In particular, for V WITH HOOK "Ʋ" U01B2, "ʋ" U028B with diacritics,
#   group 1 of "V", "v" is also supported, while plain group 1 is "℣" U2123.
#   See #   VERSICLE and RESPONSE
#   See # # Lenient dead key press
#
#   "Ǝ" U018E LATIN CAPITAL LETTER REVERSED E is called by its Unicode 1.0 name
#   "LATIN CAPITAL LETTER TURNED E" in this set, because it is the capital of
#   "ǝ" U01DD LATIN SMALL LETTER TURNED E, not "ɘ" U0258 LATIN SMALL LETTER
#   REVERSED E.
#
#   Many Latin letters did not make it into keysymdef.h. Examples include
#   "Ɛ" U0190 *Eopen, "ɛ" U025B *eopen, "Ɔ" U0186 *Oopen, "ɔ" U0254 *oopen.
#
#   These composed letters are dispatched among the related dead keys for
#   consistency and maintainability (past their initial grouping by letters
#   in a special list).
#   See Languages in Togo
#   See #*# TILDE
#   See # # TILDE&ACUTE
#   See # # TILDE&GRAVE
#   See #*# ACUTE
#   See # # HOOK&ACUTE
#   See # # HOOK&MACRON
#   See # # HOOK&CIRCUMFLEX
#   See # # HOOK&HACEK
#   See # # HOOK&GRAVE
#   See #*# MACRON
#   See #*# CIRCUMFLEX
#   See #*# HACEK
#   See #*# GRAVE
#
#
#*# SUPERSCRIPT
#   *dead_superscript UEFD1
#   Multikey: ¦^
#
#   Unlike en_US.UTF-8/Compose’s superscript support hitchhiking the circumflex
#   dead key in combination with dead_macron’s multikey equivalent for letters, 
#   new-school dedicates asciicircum to superscript and assigns dead_circumflex
#   the less keysym instead, following the logic of parentheses for breve and
#   its inverted counterpart.
#   See #*# CIRCUMFLEX
#   See #*# BREVE
#   See #*# INVERTED_BREVE
#
#
#   Letters
#
#   In Unicode CLDR, French has ordinal indicators ᵈ, ᵉ, ʳ, ˢ since v34 (2018).
#   https://github.com/unicode-org/cldr/blob/release-34/common/main/fr.xml#L1421
#   https://github.com/unicode-org/cldr/blob/release-42/common/main/fr.xml#L1526
#
#   Superscript lowercase letters are most extensively used as abbreviation
#   indicators in English, French, Italian, Portuguese, Spanish, spoken by one
#   third of the world’s population. Therefore, these letters are on live keys.
#   Support for diacriticized abbreviation indicators is straightforward in the
#   Unicode character encoding model, using combining diacritics.
#   See #^# Legacy ordinal indicators
#
#   Superscript small q is part of Unicode since v14.0 released in 2020.
#   https://www.unicode.org/L2/L2020/20117-modifier-letter-suppt.pdf
#   There had been an attempt to encode superscript q in isolation, with a good
#   rationale based on two street signs photographed in Paris, pointing to the
#   National Library: “Biblio𐞥ᵘᵉ Nationale”.
#   https://unicode.org/L2/L2010/10230-modifier-q.pdf
#   One year later, in 2011, a new take argued that the full set of superscript
#   small and capital letters is convenient for keyboard layout design, as this
#   would improve the related user experience.
#   https://unicode.org/L2/L2011/11208-n4068.pdf
#   The first proposal encountered strong headwinds from the industry.
#   https://unicode.org/L2/L2010/10315-comment.pdf
#   It was immediately defended by its author during the UTC meeting.
#   https://unicode.org/L2/L2010/10316-cmts.pdf
#   Both attempts to complete the Latin superscript small letters failed.
#
#   The superscript uppercase alphabet is less complete. Yet some of these are
#   used in orthographies. In 2020 and 2021, more uppercase letters were added:
#   C "ꟲ" UA7F2, F "ꟳ" UA7F3, Q "ꟴ" UA7F4.
#   https://www.unicode.org/L2/L2020/20251-mod-latin.pdf
#   L2/20-251 is cited in the Script Ad Hoc Working Group Report L2/21-016r.
#   https://www.unicode.org/L2/L2021/21016r-script-adhoc-rept.pdf
#   In 2025, with version 17.0, uppercase S "꟱" UA7F1 was added too.
#   https://www.unicode.org/L2/L2024/24081-modifier-capital-s.pdf
#   https://www.unicode.org/charts/PDF/Unicode-17.0/U170-A720.pdf
#
#   Superscript uppercase X, Y, Z still missing despite a proposal advising to
#   encode them all are for now replaced with "∄" U2204 THERE DOES NOT EXIST.
#   https://www.unicode.org/L2/L2002/02141-n2419-uralic-phonetic.pdf#page=5
#   See #*# SUBSCRIPT
#
#   There is a consensus about including superscript letters in Unicode for
#   phonetic notation. But plain text abbreviation indicators are fiercely
#   opposed by members of the Consortium, for software marketing reasons. And
#   when character names on a MODIFIER LETTER basis were introduced, these were
#   adopted as the new norm for “superscript”. Meanwhile, “subscript” remained
#   unchanged, meaning that duly disguising subscript likewise was dropped,
#   probably due to running out of technical terms. That makes clear that the
#   preformatted superscript letters were targeted in particular, due to their
#   use as abbreviation indicators. Indeed, superscript is a means to carry
#   semantics and is therefore eligible for plain text support in Unicode.
#
#
#   Vertical line
#
#   Followed by apostrophe or rightsinglequotemark, dead_superscript yields
#   modifier letter vertical line "ˈ" U02C8 consistently with its combining
#   counterpart "̍" U030D in double press.
#   See "ˈ" U02C8
#   See #^# COMBINING_ABOVE
#   See "̍" U030D
#
#
#   Double apostrophe
#
#   Followed by quotedbl or EuroSign, dead_superscript yields modifier letter
#   double apostrophe, that unlike its single counterpart is not supported in
#   the symbol groups.
#   See "ˮ" U02EE
#   See #^# COMBINING_ABOVE
#   See "̎" U030E
#
#
#   Asterism
#
#   Followed by asterisk, *dead_superscript provides an intuitive shortcut for
#   "⁂" U2042 ASTERISM, with mnemonics based on the ASCII circumflex, no longer
#   the multikey equivalent of dead_circumflex, that "⁂" U2042 is also in.
#   See #*# CIRCUMFLEX
#
#
#   Overlines
#
#   Followed by underscore, *dead_superscript provides an intuitive shortcut
#   for the overline "‾" U203E that is also supported on live key.
#   See dispocla.cpp ## Overscore
#
#   Followed by asciitilde, *dead_superscript provides an intuitive shortcut
#   for "﹋" UFE4B WAVY OVERLINE.
#
#
#   Punctuation-shaped letters
#
#   The letter apostrophe "ʼ" U02BC is what *dead_superscript yields by comma,
#   the raised colon "˸" U02F8 and the raised exclamation mark "ꜝ" UA71D have
#   also straightforward base characters, and the middle dot "·" U00B7 is what
#   is output by period, as the spacing’’ "˙" U02D9 is in dead_abovedot.
#   See #*# DOT_ABOVE
#
#
#   Math-shaped symbols
#
#   Plus, parentheses, equal and the minus sign have their superscript form
#   "⁺" U207A, "⁽" U207D, "⁾" U207E, "⁼" U207C, "⁻" U207B with straightforward
#   base characters.
#
#   The up or down arrows "ꜛ" UA71B and "ꜜ" UA71C have less and greater as
#   base characters following the logic applied to multikey sequences.
#   See #   Arrows and harpoons
#
#   The multikey equivalent of "⁻" U207B conflicts with "ᴯ" U1D2F, "ᶤ" U1DA4,
#   "ᶧ" U1DA7, "ᶱ" U1DB1, "ᶶ" U1DB6, "ꟸ" UA7F8, "𐞕" U10795, "𐞳" U107B3 and
#   "𐞴" U107B4, but this can be worked around by typing it the other way around
#   instead. The same holds true for "⁺" U207A conflicting with "⨣" U2A23, and
#   for "⁾" U207E conflicting with "𐞛" U1079B, "𐞜" U1079C, "𐞝" U1079D,
#   "𐞡" U107A1.
#   See # # Superscript or subscript signs, symbol, punctuation
#
#
#   Diacritic
#
#   To populate the diacritic slot, "̅" U0305 COMBINING OVERLINE is included,
#   with a mnemonic referring to "̲" U0332 COMBINING LOW LINE that fills this
#   slot in *dead_subscript, rather than duplicates of the set of circumflexes
#   already provided in dead_circumflex.
#   See #*# SUBSCRIPT
#
#   Consistently, the spacing clone is "‾" U203E, supported on live key, too.
#   See dispocla.cpp ## Overscore
#
