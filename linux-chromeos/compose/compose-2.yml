#
#
#*# GRAVE
#   dead_grave
#   Multikey: ¦`
#
#   Quotation marks
#
#   Followed by quotedbl, EuroSign, apostrophe or rightsinglequotemark,
#   dead_grave yields reversed high, opening curly quotation marks U201B,
#   U201F. A conflicting multikey equivalent is commented out and replaced with
#   a dedicated sequence.
#   See # # Quotation mark input method
#
#
#   Reversed primes
#
#   The reversed primes by digits sequences add to the support of "‵" U2035,
#   "‶" U2036, "‷" U2037 by multikey.
#   See # # Reversed primes
#
#
#   End marks
#
#   Followed by bracketleft, dead_grave is a shortcut to the box-shadowed
#   "❑" U2751, with mnemonics based on the slant of the grave accent.
#   See #*# ACUTE
#   See "❒" U2752
#
#   Followed by bracketright, dead_grave is a shortcut to the drop-shadowed
#   "❏" U274F, with mnemonics based on the slant of the grave accent. This
#   makes for a streamlined user experience, as opposed to lenient bracket
#   sides while using group 1 for the drop-shadowed square.
#   See #*# ACUTE
#   See "❐" U2750
#
#
#   Shortcut to LONG S
#
#   Followed by case insensitive "s", dead_grave is a shortcut to "ſ" U017F,
#   as an alternative to this small-letter-only character’s shortcut in
#   dead_diaeresis by dollar.
#
#
#   Grave accent below
#
#   "̖" U0316 COMBINING GRAVE ACCENT BELOW has ampersand as a base character,
#   and underscore yields its spacing counterpart "ˎ" U02CE MODIFIER LETTER LOW
#   GRAVE ACCENT, because double press is the double grave accent. Else, double
#   press followed by space or no-break space is the most straightforward input
#   method for the variants below. But there are no precomposed letters with a
#   grave accent below. Therefore, a dedicated virtual dead key is not required
#   for this diacritic.
#   See #^# DOUBLE_GRAVE
#   See #*# ACUTE
#   See #   Acute accent below
#
