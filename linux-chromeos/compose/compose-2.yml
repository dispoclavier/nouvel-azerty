#
#
#*# RETROFLEX_HOOK
#   retroflex hook, right hook, hook tail, tail, squirrel tail
#   *dead_retroflexhook UEFD4
#   Multikey: ¦}
#
#   A retroflex hook may be referred to as a right hook, and based on animal
#   anatomy, as a tail or a hook tail.
#
#   A shortcut for "Ꝕ" UA754, "ꝕ" UA755 P WITH SQUIRREL TAIL is provided for
#   convenience and ease of input, thanks to the availability of the "P", "p"
#   base characters.
#   See #^# SQUIRREL_TAIL
#
#   As a result, *dead_retroflexhook supports "ᶏ" U1D8F, "𝼝" U1DF1D, "Ɖ" U0189,
#   "ɖ" U0256, "ᶒ" U1D92, "ᶖ" U1D96, "ɭ" U026D, "ɳ" U0273, "𝼛" U1DF1B,
#   "Ꝕ" UA754, "ꝕ" UA755, "Ɋ" U024A, "ɋ" U024B, "Ɽ" U2C64, "ɽ" U027D,
#   "ʂ" U0282, "Ʈ" U01AE, "ʈ" U0288, "ᶙ" U1D99, "ⱱ" U2C71, "ʐ" U0290.
#
#   By contrast, the dead key of the similar-in-shape but backward-pointing
#   palatal hook is virtualized by *dead_retroflexhook double press.
#   See #^# PALATAL_HOOK
#
#
#   Recycling symbols
#
#   The full set of 10 recycling symbols is supported with digits as base chars
#   consistently with the paper symbols in dead_abovedot, with graphic mnemonic
#   based on the cycle-shaped letter "O" (D09) this dead key is on, by lack of
#   the alphabetic mnemonic, except when considering the dead key name, since
#   *dead_retroflexhook moved from key "R" (D04) in the wake of making room for
#   the Euro sign. The proximity with dead_abovedot also has a mnemonic upside.
#   https://www.unicode.org/L2/L2000/00292-n2240.pdf
#   See #*# DOT_ABOVE
#   See #*# REVERSED
#   See # # D04 backslash
#   See # # Recycling symbols
#
#
#   Fullwidth punctuation
#
#   With an alphabetic mnemonic, dead_hook on key D08 "I" as "IDEOGRAPHIC"
#   yields CJK symbols and punctuation, single on single press, most double on
#   double press, and triple press yields "〚" U301A, "〛" U301B.
#
#               asciitilde : "〰" U3030 WAVY DASH
#                braceleft : "〘" U3018 LEFT WHITE TORTOISE SHELL BRACKET
#               braceright : "〙" U3019 RIGHT WHITE TORTOISE SHELL BRACKET
#                parenleft : "〖" U3016 LEFT WHITE LENTICULAR BRACKET
#               parenright : "〗" U3017 RIGHT WHITE LENTICULAR BRACKET
#              bracketleft : "『" U300E LEFT WHITE CORNER BRACKET
#             bracketright : "』" U300F RIGHT WHITE CORNER BRACKET
#                     less : "《" U300A LEFT DOUBLE ANGLE BRACKET
#                  greater : "》" U300B RIGHT DOUBLE ANGLE BRACKET
#
#   Single press is in dead_hook.
#   See #*# HOOK
#
#   Double press is duplicated in *dead_retroflexhook.
#   See #^# CURL
#   See #*# RETROFLEX_HOOK
#
#   Triple press is duplicated in dead_abovedot.
#   See #^# SQUIRREL_TAIL
#   See #*# DOT_ABOVE
#
#
#   Diacritic
#
#   While there is a COMBINING RETROFLEX HOOK BELOW diacritic "̢" U0322, the
#   spacing modifier letter slot is populated with "˾" U02FE MODIFIER LETTER
#   OPEN SHELF, by lack of anything more to the point.
#
