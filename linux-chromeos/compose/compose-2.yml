#
# # CIRCLED_TEEN
#   dead_greek quotedbl
#   Multikey: ¦@"
#
#   This only supports "⑪" U246A.."⑳" U2473, as circled digits from 0 through 9
#   as well as circled number 10 are supported in dead_greek single press, and
#   the full set of basic circled numbers "⓪" U24EA.."㊿" U32BF is supported by
#   multikey. The parenthesized sequences found in en_US.UTF-8/Compose are
#   (streamlined and) supported for sideways compatibility in the Multikey
#   section.
#   See #*# GREEK_OR_CIRCLED
#   See # # Circled by leading parenthesis
#
#   Another 11..20 range has been encoded with inverted colors and is supported
#   likewise as an intrinsically limited set, providing the template that this
#   arbitrarily limited facility is coded after.
#   See # # CIRCLED_NEGATIVE_TEEN
#
#   The leading quotedbl or EuroSign on D03 is in synergy with the level-3
#   position of this dead key on D06.
#
