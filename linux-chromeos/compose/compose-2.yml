#
#
#*# BAR
#   bar, stroke
#   *dead_bar UEFD8
#   Multikey: ¦-
#
#   In X11 XKB, the diacritic called “stroke” had an ambiguous shape, until the
#   horizontal stroke and the oblique stroke were distinguished, by introducing
#   the new dead_longsolidusoverlay keysym named after U0338 "̸" COMBINING LONG
#   SOLIDUS OVERLAY as one of four extra dead elements for the German T3 layout
#   designed around 2010 and standardized in 2012 as DIN 2137:2012.
#   https://de.wikipedia.org/wiki/DIN_2137#Neufassung_2012
#   https://gitlab.freedesktop.org/xorg/proto/xorgproto/-/commit/6d4acb0e3a6568a8faaa651d4e3d32f917b9067b
#   https://web.archive.org/web/20250202063718/https://gitlab.freedesktop.org/xorg/proto/xorgproto/-/commit/6d4acb0e3a6568a8faaa651d4e3d32f917b9067b
#
#   The use of dead_stroke for horizontal, rather than for diagonal while
#   introducing *dead_bar to cover horizontal, appears to be fueled by the name
#   of the combining diacritic and the character names containing WITH STROKE
#   with the meaning of WITH BAR, or BARRED, like UAB33 LATIN SMALL LETTER
#   BARRED E, or in the Unicode 1.0 name of U0197 LATIN CAPITAL LETTER I WITH
#   STROKE, previously LATIN CAPITAL LETTER BARRED I (Unicode 1.0).
#   See # # Bar and stroke diacritics
#
#   But since dead_longsolidusoverlay was removed in 2023, dead_stroke is used
#   for slash-shaped diacritics again, while missing *dead_bar gets a PUA code.
#   https://gitlab.freedesktop.org/xorg/proto/xorgproto/-/merge_requests/70
#   https://web.archive.org/web/20240520104930/https://gitlab.freedesktop.org/xorg/proto/xorgproto/-/merge_requests/70
#   https://gitlab.freedesktop.org/xorg/proto/xorgproto/-/commit/cb44799b72f611eb4c9d7cc185bc3b09e070be08
#   https://web.archive.org/web/20250202064605/https://gitlab.freedesktop.org/xorg/proto/xorgproto/-/commit/cb44799b72f611eb4c9d7cc185bc3b09e070be08
#
#   The identifier is BAR rather than BARRED, consistently with STROKE, despite
#   most character names use BARRED instead of WITH BAR that is consistent with
#   most other diacritics, and despite the confusability with the bar keysym.
#   See "ƚ" U019A # LATIN SMALL LETTER L WITH BAR
#   See "Ƚ" U023D # LATIN CAPITAL LETTER L WITH BAR
#   See "Ꞓ" UA792 # LATIN CAPITAL LETTER C WITH BAR
#   See "ꞓ" UA793 # LATIN SMALL LETTER C WITH BAR
#
#
#   Letters
#
#   All barred letters occurring in orthographies have their precomposed form
#   encoded in Unicode, due to the rendering challenge of overlay diacritics.
#   https://www.frathwiki.com/Bar
#
#   The unicase glottal stop with stroke, meaning with bar, is supported in its
#   upright form "ʡ" U02A1 by "7", by "?", by "q", and by apostrophe and
#   rightsinglequotemark; in its inverted form "ƾ" U01BE by "Q", and by
#   percent; and in its reversed form "ʢ" U02A2 by backslash, consistently with
#   aliases, multikey equivalents and shape-based mnemonics.
#
#
#   Daggers
#
#   Although "†" U2020 DAGGER and "‡" U2021 DOUBLE DAGGER are in groups 1 and 2
#   of "|", *dead_bar provides shortcuts with "|" and "+" as base characters,
#   and so does *dead_bar double press for "‡" U2021.
#   See #^# DOUBLE_BAR
#
#
#   Arrows
#
#   Simple arrows "←" U2190 and "→" U2192 have shortcuts by less and greater;
#   the wide-headed arrow "➔" U2794 is by equal given that its tip is sharp,
#   and braceright is used for "⦵", so only the stem is left for the mnemonic;
#   and the round-tipped arrow "➜" U279C is based on parenright.
#
#
#   Math symbols
#
#   Consistently with other dead keys supporting diacriticized math symbols,
#   braceright yields "⦵" U29B5, with mnemonics based on braceright as the base
#   character of "∅" U2205 in the symbol group 2.
#   See # # D09 braceright
#
#   Beyond the arrows "←" U2190 and "→" U2192 documented above, the not sign
#   "¬" U00AC is also a candidate for support in *dead_bar, with comma as a
#   base character, "÷" U00F7 has a straightforward shortcut by colon, and
#   the minus sign "−" U2212 has the minus hyphen as a base character.
#
#
#   Diacritic
#
#   As a spacing counterpart of the short bar diacritic "̵" U0335, "˗" U02D7
#   MODIFIER LETTER MINUS SIGN is convenient, because despite being named a
#   modifier letter it is no superscript.
#   See #*# SUPERSCRIPT
#
