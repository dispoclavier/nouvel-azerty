#
#
#*# MACRON
#   macron, topbar, vertical bar, long arm, long leg, leg
#   dead_macron
#   Multikey: ¦|
#
#   Long leg is merged with macron thanks to an empty intersection and with a
#   mnemonic based on the macron multikey equivalent pipe "|" spurring the
#   extended "long" semantics of dead_macron, that therefore supports "ɼ" U027C
#   and its turned counterpart "ɺ" U027A in group 1, while the uppercase slot
#   is used for the (right) leg letter "ꭆ" UAB46.
#
#   By contrast, "Ƞ" U0220, "ƞ" U019E cannot be supported in group 0 in a
#   cross-platform compatible manner, as composed "N̄", "n̄" is used to write
#   Fula in Senegalese orthography. So it is in group 1 instead, the more
#   appropriately as it has been obsoleted both in Lakota and in the IPA.
#   So has "ɼ" U027C been obsoleted by IPA in 1989.
#   https://en.wikipedia.org/wiki/N_with_long_right_leg
#   https://fr.wikipedia.org/wiki/%C9%BC
#
#   Tbat notwithstanding, "Ƞ" U0220, "ƞ" U019E is supported in group 0 as a
#   Windows-specific alternative.
#   See #   Windows-specific
#
#   Long leg is not obsolete, however, when it occurs on "x", as in "ꭗ" UAB57,
#   and in "ꭘ" UAB58 with an additional right ring, and therefore supported in
#   the uppercase slot for convenience, additionally to their support in letter
#   groups, by "x" and "X" as base characters, because dead_abovering by "x"
#   and "X" is used up by "ꭔ" UAB54 and "ꭖ" UAB56 featuring normal-length legs.
#   See #+# GROUP_5
#   See #+# GROUP_3
#
#   Similarly, "ꭙ" UAB59 and "ꭕ" UAB55 are supported in group 1. Both have a
#   left serif, and "ꭙ" UAB59 has a long left leg, while "ꭕ" UAB55 being a
#   Latin small chi has naturally two long legs.
#
#   In group 2, the stretched C "ʗ" U0297 is supported by case insensitive "c"
#   to meet eventual user expectations based on the extended semantics of
#   dead_macron including vertical bar and long, additionally to the support in
#   double press of dead_macron, given that in dead_macron single press, both
#   "C" and "c" are used for currency symbols "₵" U20B5 and "¢" U00A2; and in
#   group 1, for open o with macron.
#   See #^# MACRON_BELOW
#
#   The historic letters with topbar "Ƃ" U0182, "ƃ" U0183, "Ƌ" U018B, "ƌ" U018C
#   are supported alongside thanks to an empty intersection, with a rationale
#   based on the straightforward mnemonic.
#
#
#   Currency symbols
#
#   Cedi "₵" U20B5 and Cent "¢" U00A2 signs are supported by lack of C with
#   macron, and for consistency with en_US.UTF-8/Compose as of the multikey
#   equivalents.
#
#   This extends dead_macron to a vertical bar dead key, as opposed to the
#   horizontal bar dead key *dead_bar, and the diagonal/oblique bar dead key
#   dead_stroke.
#   See #*# BAR
#   See #*# STROKE
#
#
#   Daggers
#
#   Although "†" U2020 DAGGER and "‡" U2021 DOUBLE DAGGER are in groups 1 and 2
#   of "|", dead_macron provides shortcuts with "+" and "=" as base characters.
#   See #*# ACUTE
#
#
#   Math symbols
#
#   Digits yield simple and multiple vertical bars: The broken bar "¦" U00A6
#   and the math symbols "‖" U2016, "∣" U2223, "∥" U2225, "∦" U2226, "⦀" U2980,
#   "⫴" U2AF4, "⫼" U2AFC, "⫾" U2AFE, "⫿" U2AFF. Input methods using multikey or
#   groups may be less mnemonic or more complicated.
#
#       0  "⫾" U2AFE
#       1  "∣" U2223
#       2  "‖" U2016
#       3  "⦀" U2980
#       4  "¦" U00A6
#       5  "∥" U2225
#       6  "⫴" U2AF4
#       7  "⫿" U2AFF
#       8  "∦" U2226
#       9  "⫼" U2AFC
#
#   This is a part of the design of math sequences.
#   See #   Outsourcing to dead keys
#   See #*# STROKE
#   See #*# REVERSED
#
#   Consistently with other dead keys supporting diacriticized math symbols,
#   case insensitive "s" yields "⨛" U2A1B; "L" yields "⋶" U22F6; "l" yields
#   "⋷" U22F7; "M" yields "⋽" U22FD; "m" yields "⋾" U22FE; slash yields
#   ⧶" U29F6; apostrophe and rightsinglequotemark (base characters of "∪" U222A
#   in the symbol group 4 on D07) yield "⩂" U2A42; braceleft on D08 yields
#   "⩃" U2A43; braceright (base character of "∅" U2205 in the symbol group 2)
#   yields "⦱" U29B1; grave on B06, level 3 (base character of "∧" U2227 in the
#   symbol group 2) yields "⊼" U22BC; question on B07, level 3 (and 5), yields
#   "⊽" U22BD; case insensitive "T" yields "⫧" U2AE7.
#   See # # D09 braceright
#
#   For consistency and mnemonics, the MINUS-OR-PLUS SIGN "∓" U2213 is
#   supported by plus, consistently with its non-inverted counterpart in
#   dead_belowmacron.
#
#
#   Diacritics
#
#   The conjoining variants of the combining diacritics are supported with
#   ampersand as a base character both in macron and in macron below.
#   See "︦" UFE26
#   See "︭" UFE2D
#
#   The double diacritic "͞" U035E has emdash as a mnemonic base character, and
#   dollar as an ASCII alternative with "double" mnemonics, for consistent
#   input methods across all dead keys featuring a double diacritic.
#
#   Combining macron halves above – "︤" UFE24, "︥" UFE25 – are supported on all
#   unconflicting and fully available base letters for a streamlined user
#   experience. Halves of combining diacritics are also supported in a virtual
#   dead key called “tilde and ampersand”.
#   See # # TILDE&AMPERSAND
#
#
#   Shortcut
#
#   For ease of access, and in an attempt to meet potential user expectations,
#   the macron dead key is also activatable by dead_diaeresis double press,
#   extending the logic that multiple dead key presses transform diacritics,
#   to include the idea that a double press may also join the two dots, if
#   that is a better option with respect to usability.
#
#   Chaining is only supported with the group dead key.
#
#   For portability, the full dead key content is supported, as well as
#   multikey, even though that does not make sense.
#
#   For maintainability of the code, and usability of the documentation, this
#   dead key content is grouped in a single place.
#   See # # Notes about documentation
#
<dead_macron>                                                                              <space> : "̄" U0304 # COMBINING MACRON
