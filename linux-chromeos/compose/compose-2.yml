#
#
#^# COMBINING_BELOW
#   *dead_subscript double press
#   Multikey: ¦__
#
#   This subscript equivalent of the combining above dead key is required for
#   "᷊" U1DCA COMBINING LATIN SMALL LETTER R BELOW, "ᪿ" U1ABF COMBINING LATIN
#   SMALL LETTER W BELOW and other diacritics below.
#   See #^# COMBINING_ABOVE
#
#
#   Vertical lines below
#
#   Single and double vertical lines below use apostrophe and quotedbl and
#   their aliases rightsinglequotemark and EuroSign as straightforward base
#   characters.
#   See "̩" U0329
#   See "͈" U0348
#
#
#   Half rings below
#
#   The left half ring below "̜" U031C and the right half ring below "̹" U0339
#   have "D" and "F" as base characters consistently with their counterparts
#   above "͑" U0351 and "͗" U0357 and with the ASCII map parenleft and
#   parenright. Below, "D" and "F" are case insensitive.
#   See #   Half rings above
#
#
#   Tacks below
#
#   Consistently with the tacks above, their older counterparts below have
#   digits and "T", "t" as base characters, with graphic, modifier key and
#   numpad mnemonics.
#   See #   Tacks above
#
#       T   "̝" U031D COMBINING UP TACK BELOW
#       t   "̞" U031E COMBINING DOWN TACK BELOW
#
#       2   "̞" U031E COMBINING DOWN TACK BELOW
#       4   "̘" U0318 COMBINING LEFT TACK BELOW
#       6   "̙" U0319 COMBINING RIGHT TACK BELOW
#       7   "̝" U031D COMBINING UP TACK BELOW
#
#   Digit 7 is used for the up tack because 8 is used for "͚" U035A.
#
#   Tacks by digits work along the lines of what is done for the spacing tacks
#   "˔" U02D4, "˕" U02D5, "꭪" UAB6A, "꭫" UAB6B in dead_tilde.
#   See #*# TILDE
#   See #   Tacks in dead_tilde
#
#
#   Centralization strokes
#
#   Slash goes for "᪹" U1AB9 COMBINING LIGHT CENTRALIZATION STROKE BELOW, and
#   period, for "᪺" U1ABA COMBINING STRONG CENTRALIZATION STROKE BELOW.
#
#
#   Paired punctuation
#
#   The opening and closing parentheses are base characters for "᫃" U1AC3 and
#   "᫄" U1AC4, while single "᪽" U1ABD are yielded by bar, dollar and "1",
#   consistently with "᫁" U1AC1, "᫂" U1AC2, "᪻" U1ABB in the absence of double.
#   https://www.unicode.org/charts/nameslist/n_1AB0.html
#
#   The opening and closing brackets yield "͉" U0349 COMBINING LEFT ANGLE BELOW
#   as the counterpart below of "̚" U031A, with a shape mnemonic.
#
#
#   Math-shaped symbols
#
#   The plus sign "̟" U031F has a straightforward base character.
#
#   So does the asterisk "͙" U0359.
#
#   Left and right arrowheads below "͔" U0354 "͕" U0355 use less and greater as
#   base characters.
#
#   "͖" U0356 COMBINING RIGHT ARROWHEAD AND UP ARROWHEAD BELOW has the base
#   character asciicircum consistent with its second part. By contrast,
#   "᷿" U1DFF COMBINING RIGHT ARROWHEAD AND DOWN ARROWHEAD BELOW is by "V".
#
#   The COMBINING DOUBLE RIGHTWARDS ARROW BELOW "͢" U0362 has percent as a base
#   character, with a mnemonic using the percent sign as carrying a "double"
#   mnemonic, consistently with its counterpart above, "᫫" U1AEB.
#   https://en.wikipedia.org/wiki/Percent_sign
#
#   "͍" U034D is by "5" consistently with the arrow layout used in this project
#   when using the numeric keypad, while "͎" U034E is by "9", because "8" is
#   used for "͚" U035A COMBINING DOUBLE RING BELOW with a shape-based mnemonic.
#
#
#   Symbols by letters
#
#   One of the above ("͉" U0349) and some additional diacritics are dispatched
#   on available letters:
#
#       A, a, L, l   "͉" U0349 COMBINING LEFT ANGLE BELOW
#             I, i   "᷐" U1DD0 COMBINING IS BELOW
#             j, o   "᪷" U1AB7 COMBINING OPEN MARK BELOW
#             J, O   "᪸" U1AB8 COMBINING DOUBLE OPEN MARK BELOW
#             m, v   "̼" U033C COMBINING SEAGULL BELOW
#                M   "᫦" U1AE6 COMBINING DOUBLE ARCH BELOW
#             s, S   "᷂" U1DC2 COMBINING SNAKE BELOW
#                V   "᷿" U1DFF COMBINING RIGHT ARROWHEAD AND DOWN ARROWHEAD BELOW
#                W   "᪶" U1AB6 COMBINING WIGGLY LINE BELOW
#                x   "͓" U0353 COMBINING X BELOW
#                X   "᪵" U1AB5 COMBINING X-X BELOW
#             Z, z   "᷏" U1DCF COMBINING ZIGZAG BELOW
#
#   The open marks come in a single and a double form and have been encoded for
#   addition below.
#   https://www.unicode.org/L2/L2014/14169r-dialect-latin.pdf
#
#
#   Diacritic
#
#   The diacritic and its spacing clone build on the underscore theme combined
#   with the “double” theme coming in from double press: "̳" U0333, "‗" U2017.
#
