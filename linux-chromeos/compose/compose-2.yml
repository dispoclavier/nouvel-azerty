#
#
#^# HIGH_BAR
#   *dead_bar triple press
#   Multikey: ¦---
#
#   This dead key is required to have an intuitive input method for "Ꝉ" UA748,
#   "ꝉ" UA749, that adds to "Ƚ" U023D, "ƚ" U019A in #dead_bar single press, and
#   "Ⱡ" U2C60, "ⱡ" U2C61 in *dead_bar double press.
#
#   "—" U2014 EM DASH could be supported in this high bar dead key to get the
#   closest possible to sideways compatibility with en_US.UTF-8/Compose, given
#   this has a multikey sequence for it: <Multi_key><minus><minus><minus>.
#   However, for consistency with the UCS, a sequence with a triple minus and
#   a final period is used for "―" U2015 HORIZONTAL BAR, because as a
#   four-per-three-em dash, this may have a length of three quarters of an em
#   dash; and a new multikey sequence made of a quadruple minus is added to
#   support "—" U2014 by multikey, although all of these three dashes are on
#   live keys, except "―" U2015 on part of the regional variants.
#   See # # HORIZONTAL BAR for Breton and African variants
#   See #   Dashes
#   See #^# DOUBLE_BAR
#
#   As a diacritic, "᫢" U1AE2 COMBINING MINUS SIGN ABOVE comes in handy with
#   Unicode 17.0. Less consistently, the modifier letters are arrowheads, with
#   a rationale based on the laterality of the AltFr and AltGr modifiers
#   involved in typing "˂" U02C2 and "˃" U02C3. To complete the set, "˄" U02C4
#   and "˅" U02C5 are mapped to mnemonic, case insensitive letters "A" and "V".
#   Additionally, along the lines of what is done on dead_caron double press,
#   "C", "G", "W" can be used to input "˂" U02C2, and "D", "M", "P", "R" are
#   for "˃" U02C3.
#   See #^# HACEK_BELOW
#
