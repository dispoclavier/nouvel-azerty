#
#
#*# TURNED
#   turned, sideways
#   *dead_turned UEFD5
#   Multikey: ¦%
#
#   The rotation angle may be 180° as for TURNED, or 90° as for SIDEWAYS.
#
#
#   Letters
#
#   For intuitivity, the Polynesian ʻeta, Hawaiʻian ʻokina can also be input as
#   if it were a turned rightsinglequotemark despite being a letter. Apostrophe
#   is also supported as a base character for this input method.
#   See # # D07 apostrophe
#
#   As "ɟ" U025F LATIN SMALL LETTER DOTLESS J WITH STROKE is “typographically a
#   turned f, but better thought of as a form of j” (Unicode Code Charts), it
#   is supported as such, but for convenience, also as a turned f.
#
#   Since the Claudian letter "Ⅎ" U2132 also has a lowercase form "ⅎ" U214E,
#   that is intended to meet Unicode casing requirements, the uppercase slot is
#   used for the related Lisu letter, and the set of Claudian letters is moved
#   to the double press dead key used for inverted, sideways and other turned.
#   https://en.wikipedia.org/wiki/Claudian_letters
#   See #^# INVERTED
#   See # # DOT_ABOVE&STROKE
#
#   Old Lisu letters are also supported, as they are repurposed for typesetting
#   turned Latin capital letters, also upright for centrally symmetric letters.
#   For an example see the “Propulsé par” (“Powered by”) mention at the bottom:
#   https://humanisme-renaissance.droz.org
#
#   Old Lisu has turned glyphs for A..L, N..P, R..V, X..Z because Q is not used
#   at all, and turned M and W are confusable. "𑾰" U11FB0 has been encoded late
#   and is therefore outside the BMP.
#   https://www.unicode.org/L2/L2008/08019-lisu.pdf
#   https://www.unicode.org/L2/L2018/18338r2-lisu-letter-yha.pdf
#
#   The TURNED dead key supports Lisu letters looking like turned Latin letters
#   or like the centrally symmetric H, I, N, O, S, X, Z, as these may be used
#   alongside for consistency. But the other Lisu letters, those that cannot be
#   used as turned Latin letters, are not supported, given that this is not fit
#   for writing Lisu, due to its dead key based functioning. Still, double press
#   is used for a fuller set.
#   See #^# INVERTED
#
#   Although "Ǝ" U018E LATIN CAPITAL LETTER REVERSED E is used as a turned E,
#   its usual glyph is a genuine reversed E for aesthetics, unlike what is done
#   for Lisu.
#   See #*# REVERSED
#
#
#   Punctuation
#
#   Turned punctuation for Spanish is supported both by turned (single press)
#   and inverted (double press) dead keys, to meet expectations based on names.
#
#   The opening parenthesis yields the character tie "⁀" U2040, as this may
#   be considered sideways, or like a vertical parenthesis. The undertie
#   "‿" U203F conflicts with "𐞡" U107A1, "𝼆" U1DF06 by its multikey equivalent,
#   but it is also supported in the double press virtual dead key. Both
#   "⁀" U2040 and "‿" U203F are also in group 12 of "(" and ")".
#   See #^# INVERTED
#   See # # C03 parenleft
#   See # # C04 parenright
#
#
#   Math symbols
#
#   Consistently with other dead keys supporting diacriticized math symbols,
#   asciitilde yields "≀" U2240, and digit 8 yields "∞" U221E.
#
#
#   Diacritic
#
#   As a diacritic, "̒" U0312 COMBINING TURNED COMMA ABOVE is included, and its
#   spacing counterpart "ʻ" U02BB MODIFIER LETTER TURNED COMMA alongside (but a
#   better option for typing a U02BB is using group 1 of grave), with no-break
#   space or no-break thin space as a base character.
#
<UEFD5>                                                                                    <space> : "̒" U0312 # COMBINING TURNED COMMA ABOVE
<Multi_key><percent>                                                                       <space> : "̒" U0312 # COMBINING TURNED COMMA ABOVE
<UEFD5>                                                                                    <U200B> : "̒" U0312 # COMBINING TURNED COMMA ABOVE
<Multi_key><percent>                                                                       <U200B> : "̒" U0312 # COMBINING TURNED COMMA ABOVE
<UEFD5>                                                                             <nobreakspace> : "ʻ" U02BB # MODIFIER LETTER TURNED COMMA
