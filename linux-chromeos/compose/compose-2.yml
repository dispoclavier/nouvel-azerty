#
#
#^# COMBINING_ABOVE
#   *dead_superscript double press
#   Multikey: ¦^^
#
#   This is required for the many letter-shaped diacritics that can be placed
#   above Latin letters, but it also supports other shapes used as diacritics.
#
#
#   Small capital letters
#
#   As potential combining capital letters are downscaled to small caps, these
#   are supported in capital slots: "ᷛ" U1DDB, "ᷞ" U1DDE, "ᷟ" U1DDF, "ᷡ" U1DE1,
#   "ᷢ" U1DE2.
#
#
#   Diacriticized letters
#
#   The combining "c" above with cedilla "ᷗ" U1DD7 is supported by its live key
#   on AZERTY, with case insensitivity. For consistency, a virtual dead key is
#   also provided.
#   See # # COMBINING_ABOVE&CEDILLA
#
#   As the three combining letters above with diaeresis "ᷲ" U1DF2, "ᷳ" U1DF3,
#   "ᷴ" U1DF4 do not intersect with small caps, capital slots are used for
#   these too, for convenience. For consistency, a combining above with
#   diaeresis virtual dead key is also provided.
#   See # # COMBINING_ABOVE&DIAERESIS
#
#   Additionally, live keys with diaeresis are also supported as base
#   characters, with case insensitivity, and with language insensitivity using
#   French aliases with proximity mnemonics on AZERTY, or with an alphabetic
#   mnemonic:
#
#       "ᷲ" U1DF2      "ä" U00E4    "é" U00E9 near "a"
#       "ᷳ" U1DF3      "ö" U00F6    "à" U00E0 near "o"
#       "ᷴ" U1DF4      "ü" U00FC    "è" U00E8 near "u"    "ù" U00F9
#
#   By contrast, "ᷭ" U1DED COMBINING LATIN SMALL LETTER O WITH LIGHT
#   CENTRALIZATION STROKE has slash as a mnemonic base character, as well as
#   "y" for an alphabetic alternative with a slight shape-based mnemonic.
#
#
#   Vertical lines above
#
#   Single and double vertical lines above use apostrophe and quotedbl and
#   their aliases rightsinglequotemark and EuroSign as straightforward base
#   characters.
#   See "̍" U030D
#   See "̎" U030E
#
#
#   Half rings above
#
#   The left half ring above "͑" U0351 and the right half ring above "͗" U0357
#   have "D" and "F" as base characters consistently with their counterparts
#   below "̜" U031C and "̹" U0339 and with the ASCII map parenleft and
#   parenright.
#   See #   Half rings below
#
#
#   Tacks above
#
#   The most longstanding combining tack above is supported by "T", although
#   the mnemonic works upside down:
#
#       T   "᷵" U1DF5 COMBINING UP TACK ABOVE
#
#   Additionally to the up tack, the other tacks are supported as they were
#   added to Unicode for version 17.0. The base characters are digits 4 and 6
#   on a regular basis, and 0 because 2 is used for "᪼" U1ABC for the sake of
#   the "double" mnemonic.
#   https://www.unicode.org/charts/PDF/Unicode-17.0/U170-1AB0.pdf
#
#       4   "᫠" U1AE0 COMBINING LEFT TACK ABOVE
#       6   "᫡" U1AE1 COMBINING RIGHT TACK ABOVE
#       0   "᫛" U1ADB COMBINING DOWN TACK ABOVE
#
#   Tacks by digits work along the lines of what is done for the spacing tacks
#   "˔" U02D4, "˕" U02D5, "꭪" UAB6A, "꭫" UAB6B in dead_tilde.
#   See #*# TILDE
#   See #   Tacks in dead_tilde
#
#
#   Small punctuation
#
#   As the dot and the comma may be centered or right, the right variant has
#   its base character with a dot above, and for the left dot it is exclam:
#
#       !  "᷸" U1DF8       .  "̇" U0307       :  "͘" U0358
#                         ,  "̓" U0313       ;  "̕" U0315
#
#
#   Paired punctuation
#
#   The opening and closing parentheses are base characters for "᫁" U1AC1 and
#   "᫂" U1AC2, while single "᪻" U1ABB are yielded by bar and "1", double
#   "᪼" U1ABC by dollar and "2".
#   https://www.unicode.org/charts/nameslist/n_1AB0.html
#
#   The opening bracket yields "᫅" U1AC5, while the closing bracket yields
#   "̚" U031A COMBINING LEFT ANGLE ABOVE with a shape mnemonic.
#
#
#   Math-shaped symbols
#
#   In addition to the plus sign "᫈" U1AC8, Unicode 17.0 brought the minus sign
#   "᫢" U1AE2. These have straightforward base characters.
#
#   So does the asterisk "⃰" U20F0, that is part of the Combining Diacritical
#   Marks for Symbols block, some of which are used in mathematics (but not
#   this one).
#
#   Also, less and greater yield the arrowheads "᷾" U1DFE and "͐" U0350, while
#   equal has now "᫨" U1AE8 as a "͇" U0347 counterpart above.
#
#   The COMBINING DOUBLE RIGHTWARDS ARROW ABOVE "᫫" U1AEB has percent as a base
#   character, with a mnemonic using the percent sign as carrying a "double"
#   mnemonic, consistently with its counterpart below, "͢" U0362.
#   https://en.wikipedia.org/wiki/Percent_sign
#
#
#   Other symbols
#
#   Some other combining characters above are supported likewise using empty
#   capital slots and base letters with a mnemonic shape or, for "͆" U0346,
#   with a French mnemonic based on “pontet” (small bridge):
#
#       P   "͆" U0346 COMBINING BRIDGE ABOVE
#       S   "᷑" U1DD1 COMBINING UR ABOVE
#       V   "᷃" U1DC3 COMBINING SUSPENSION MARK
#       W   "᪳" U1AB3 COMBINING DOWNWARDS ARROW
#       X   "̽" U033D COMBINING X ABOVE
#       Z   "͛" U035B COMBINING ZIGZAG ABOVE
#
#   The combining x above was initially referred to as a multiplication sign,
#   and consistently, "̽" U033D is smaller than the combining small letter "x"
#   "ͯ" U036F. Therefore, "̽" U033D is also supported by multiply "×" U00D7 as
#   a base character, and this has a shortcut in *dead_superscript.
#   https://fr.wikipedia.org/wiki/Marque_x_(diacritique)
#   See #*# SUPERSCRIPT
#
#   What looked like a downwards arrow "᪳" U1AB3 is reported as being a
#   combination of two diacritics: “originally a misconstrual of a caron-acute
#   sequence in Croatian dialectology”, so that “for Croatian dialectology use
#   the sequence 030C ◌̌ 0301 ◌́, instead”. Consistently, "᪳" U1AB3 is not
#   supported as an arrow by "2", but by asciicircum and "W" instead.
#   https://www.unicode.org/charts/nameslist/n_1AB0.html
#
#   By contrast, "᫙" U1AD9 COMBINING SHARP SIGN has numbersign as a mnemonic
#   base character, as well as "q" and "Q" with positional mnemonics based on
#   the level-3 ASCII map:
#
#       Q   "᫙" U1AD9 COMBINING SHARP SIGN
#
#   Remaining empty capital slots are populated with the small letter content,
#   as part of the lenience streamlining the user experience.
#
#
#   Diacritic
#
#   The diacritic replicates the scheme used for combining below with "̿" U033F
#   as the exact counterpart of "̳" U0333, while "﹌" UFE4C as a spacing clone
#   is less fortunate than "‗" U2017. Anyway, its single counterpart "﹋" UFE4B
#   is supported, too, with underscore as a base character.
#   See #^# COMBINING_BELOW
#
<UEFD1><UEFD1>                                                                             <space> : "̿" U033F # COMBINING DOUBLE OVERLINE
#   Multikey conflicts with "⋄" U22C4.                                                     <space> : "̿" U033F # COMBINING DOUBLE OVERLINE
<UEFD1><UEFD1>                                                                             <U200B> : "̿" U033F # COMBINING DOUBLE OVERLINE
<Multi_key><asciicircum><asciicircum>                                                      <U200B> : "̿" U033F # COMBINING DOUBLE OVERLINE
