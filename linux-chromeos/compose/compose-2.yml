#
#
#^# MACRON_BELOW
#   dead_belowmacron
#   dead_macron double press
#   Multikey: ¦||
#
#   The precomposed letters with macron below have character names containing
#   “WITH LINE BELOW”, as Unicode notes that in the "Latin Extended Additional"
#   block, “the names "WITH LINE BELOW" refer to a macron below the letter.”
#   https://unicode.org/charts/nameslist/n_1E00.html
#
#
#   Stretched C
#
#   "ʗ" U0297 is supported by case insensitive "c" to meet eventual user
#   expectations based on the extended semantics of dead_macron including
#   vertical bar and long, additionally to the support in group 2 of
#   dead_macron, given that in dead_macron single press, both "C" and "c"
#   are used for currency symbols "₵" U20B5 and "¢" U00A2.
#
#
#   Math symbols
#
#   Consistently with other dead keys supporting diacriticized math symbols,
#   a number of symbols with a line or a minus sign below may alternatively
#   be input using this dead key:
#   case insensitive "s" yields "⨜" U2A1C; semicolon and multiply with B08
#   keycap mnemonics (with period as dot for multiply) yield "⨱" U2A31; slash
#   yields "⦤" U29A4; backslash yields "⦥" U29A5; percent yields "⧋" U29CB;
#   bracketleft/right yield "⦋" U298B, "⦌" U298C; grave on B06, level 3 (base
#   character of "∧" U2227 in the symbol group 2) yields "⩟" U2A5F; question
#   on B07, level 3 (and 5), yields "⩣" U2A63, bar yields "⫨" U2AE8.
#   See # # D09 braceright
#
#   For consistency and mnemonics, the PLUS-MINUS SIGN "±" U00B1 is supported
#   by plus, consistently with its inverted counterpart "∓" U2213 in
#   dead_macron.
#
#
#   Diacritics
#
#   The conjoining variants of the combining diacritics are supported with
#   ampersand as a base character both in macron and in macron below.
#   See "︭" UFE2D
#   See "︦" UFE26
#
#   The double diacritic "͟" U035F has emdash as a mnemonic base character, and
#   dollar as an ASCII alternative with "double" mnemonics, for consistent
#   input methods across all dead keys featuring a double diacritic.
#
#   Combining macron halves below "︫" UFE2B, "︬" UFE2C are supported on "W"
#   as well as on all other available base letters, consistently with
#   dead_macron single press, for a streamlined user experience. This is
#   redundant with the tilde-and-ampersand virtual dead key, that supports
#   halves of combining diacritics, too.
#   See # # TILDE&AMPERSAND
#
<dead_macron><dead_macron>                                                                 <space> : "̱" U0331 # COMBINING MACRON BELOW
