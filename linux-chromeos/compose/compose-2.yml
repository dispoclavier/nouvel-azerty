#   The "k", "l", "n", "r" with cedilla "Ķ" U0136, "ķ" U0137, "Ļ" U013B,
#   "ļ" U013C, "Ņ" U0145, "ņ" U0146, "Ŗ" U0156, "ŗ" U0157 are reported to be
#   actually with comma below and to need comma-below glyphs accordingly:
#   “despite their names, this pair of characters should normally be displayed
#   with a comma below”
#   In Latvian, "g" too is with comma below: "Ģ" U0122, "ģ" U0123. In this
#   case, Unicode only states that “there are three major glyph variants”.
#   Latvian also uses "k", "l" and "n" with comma below, and before the Soviet
#   occupation, Latvian used "r" with comma below, too.
#   Hence these casing pairs are duplicated in dead_belowcomma.
#   https://www.unicode.org/Public/17.0.0/ucd/NamesList.txt
#   https://hapax.qc.ca/ListeNoms-17.0.0.txt
#   https://en.wikipedia.org/wiki/Cedilla
#   "Ģ" U0122, "ģ" U0123:
#   https://en.wikipedia.org/wiki/%C4%A2
#   "Ķ" U0136, "ķ" U0137:
#   https://en.wikipedia.org/wiki/%C4%B6
#   "Ļ" U013B, "ļ" U013C:
#   https://fr.wikipedia.org/wiki/%C4%BB
#   "Ņ" U0145, "ņ" U0146:
#   https://fr.wikipedia.org/wiki/%C5%85
#   "Ŗ" U0156, "ŗ" U0157:
#   https://fr.wikipedia.org/wiki/%C5%96
#
#   As a consequence, the cuatrillo with comma "Ꜯ" UA72E, "ꜯ" UA72F cannot be
#   by "K", "k". So it is by "C", "c", by "F", "f" and by "Q", "q" instead,
#   with Spanish, English and French mnemonics based on the numeral.
#   
#   The glottal letters "Ꞻ" UA7BA, "ꞻ" UA7BB, "Ꞽ" UA7BC, "ꞽ" UA7BD, "Ꞿ" UA7BE,
#   "ꞿ" UA7BF, new to Unicode v12, are duplicated here for convenience.
#   See LETTER GLOTTAL
#   See #^# GLOTTAL
#   See #^# COMMA_ABOVE
#
#   Digits yield numbers 11 through 20 followed by a period, as an experimental
#   convenience, while parenthesized digits and letters are not supported.
#   Numbers 1..10 followed by a period are in dead_cedilla.
#   See #*# CEDILLA
#
