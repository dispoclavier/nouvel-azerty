#
#
#*# TILDE
#   dead_tilde
#   Multikey: ¦~
#
#   Lithuanian requires a hard dot on i and j. The sequences with dot above are
#   a workaround. The hard dot on i and j is a feature of Lithuanian, and
#   should not depend on user input, but on font settings instead.
#
#   All letters annotated as for Lithuanian in this file are by courtesy of
#   Vilnius University, the State Commission of the Lithuanian language,
#   Lithuanian Standards Board.
#   https://unicode.org/L2/L2012/12026r-n4191-lithuanian.pdf
#
#   The tilde dead key has also intuitive support for the swung dash "⁓" U2053,
#   with any of the remaining dashes U2013, U2015 as a base character, as well
#   as with underscore as an alternative ASCII base character.
#
#   As a convenience, "⁑" U2051 TWO ASTERISKS ALIGNED VERTICALLY is supported
#   by dead_tilde followed by asterisk, like "⁂" U2042 ASTERISM is in
#   *dead_circumflex, as both have easy mappings on the same key D11.
#
#
#   Daggers
#
#   The tilde dead key supports daggers, because its default position is mapped
#   on key "T" due to alphabetic mnemonic, while the "T"-shape-based mnemonic
#   benefits the daggers. The full set of daggers is available by digits 1..6
#   with shape-based mnemonic for simple, double and triple (already supported
#   by Umihotaru’s Nishiki-teki font) daggers, by 1..3, and numpad positional
#   mnemonic for left/right guard daggers, by 4 and 6 respectively, around the
#   turned dagger by 5.
#
#
#   Tacks in dead_tilde
#
#   The remaining digits are used for the four tack modifier letters, still for
#   the sake of alphabetic-graphic mnemonics based on "T". These letters are
#   no superscripts despite the "modifier letter" part in their names. Mnemonic
#   is positional based on the numpad as far as possible in the remaining slots
#   7..9 based on the arrows of the numpad, and 0 based on semantics:
#
#      7    "꭪" UAB6A MODIFIER LETTER LEFT TACK
#      8    "˔" U02D4 MODIFIER LETTER UP TACK
#      9    "꭫" UAB6B MODIFIER LETTER RIGHT TACK
#      0    "˕" U02D5 MODIFIER LETTER DOWN TACK
#
#
#   Angle brackets
#
#   Heavy angle bracket ornaments "❰" U2770, "❱" U2771 are supported in
#   dead_tilde by less and greater in two-handed synergy with the easy-access
#   instance of dead_tilde, and by braceleft and braceright in one-handed
#   same-row synergy, with respect to their use as escape delimiters in
#   Unicode CLDR.
#   https://github.com/unicode-org/cldr/blob/9f25bc73c08d43293a83b7699b73135ef3218769/tools/cldr-code/src/main/java/org/unicode/cldr/util/CodePointEscaper.java#L73
#   https://github.com/unicode-org/cldr/blob/main/tools/cldr-code/src/main/java/org/unicode/cldr/util/CodePointEscaper.java#L73
#
#   Medium angle bracket ornaments "❬" U276C, "❭" U276D are also supported in
#   dead_tilde by bracketleft and bracketright in one-handed synergy with the
#   easy-access instance of dead_tilde.
#
#
#   Math symbols
#
#   Consistently with other dead keys supporting diacriticized math symbols,
#   plus yields "⨤" U2A24, and numbersign yields "⧤" U29E4, without multikey
#   equivalents, but multikey support is provided as part of the math symbol
#   support.
#   See # # Supplemental Mathematical Operators of block U2A00
#   See # # Miscellaneous Mathematical Symbols-B of block U2980
#
#
#   Diacritics
#
#   The double diacritic "͠" U0360 has emdash as a mnemonic base character, and
#   dollar as an ASCII alternative with "double" mnemonics, for consistent
#   input methods across all dead keys featuring a double diacritic.
#
#   Combining tilde halves above – "︢" UFE22, "︣" UFE23 – are supported on all
#   fully available base letters for a streamlined user experience. Halves of
#   combining diacritics are also supported in a virtual dead key called
#   “tilde and ampersand”.
#   See # # TILDE&AMPERSAND
#
#
#   Format controls
#
#   The level-3 tilde dead key was the straightforward pick to jump in when the
#   format controls in symbol group 10 were replaced with visible symbols for a
#   consistent user experience across the symbol groups (not sooner than v6.1.0
#   when the dead key data was transpiled, and the need for visible symbols was
#   unnegotiatable).
#
#   EuroSign and quotedbl yield the emoji style variation selector UFE0F, and
#   so does asciitilde for text style UFE0E, with alphabetic mnemonics, while
#   the backslash in-between yields the most common variation selector #1 for
#   completeness.
#
#   The combining grapheme joiner U034F is called “diacritique invisible
#   bloquant” in French, and so keeps benefitting from alphabetic mnemonics as
#   it is yielded by parenleft on the "D" key.
#
#   The mnemonic is still French for the word joiner U2060, called “gluon”, on
#   key "G" by the minus hyphen, while its legacy equivalent ZWNBSP is again
#   in-between on key "F" by parenright.
#
#   The plain-text page break FORM FEED U000C is also supported, by grave on
#   the "N" key with alphabetic mnemonics based on “nouvelle page”. (Here like
#   elsewhere, the multikey equivalent cannot be supported.)
#
