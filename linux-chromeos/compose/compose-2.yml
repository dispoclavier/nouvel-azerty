<Multi_key><parenleft><parenleft>                                                          <U202F> : "ᵔ" U1D54 # MODIFIER LETTER SMALL TOP HALF O
<dead_invertedbreve><dead_invertedbreve>                                                  <dollar> : "᷼" U1DFC # COMBINING DOUBLE INVERTED BREVE BELOW
<Multi_key><parenleft><parenleft>                                                         <dollar> : "᷼" U1DFC # COMBINING DOUBLE INVERTED BREVE BELOW
