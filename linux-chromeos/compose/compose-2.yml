#
#
#^# CIRCLED
#   circled, double-circled
#   dead_greek double press
#   Multikey: ¦@@
#
#   This extends the Greek dead key to a circled dead key for which a dedicated
#   keysym is proposed, *dead_circled, but that has no room on a Latin keyboard
#   layout on its own in the presence of a Greek letter dead key.
#
#   This virtual dead key supports double-circled numbers, available from 1
#   through 10, thanks to the fact that single-circled numbers are supported in
#   dead_greek single press. As a result, dead_greek triple press is not used.
#   See #^# CIRCLED_TEEN
#
#   For an easier alternative, double-circled numbers are in dead_doubleacute,
#   too.
#   See #*# DOUBLE_ACUTE
#
#   Circled operators are also supported for consistency, although these are
#   redundant with dead_greek single press except for "⨷" U2A37, where single
#   press yields "⊗" U2297, and for "⦸" U29B8, because backslash is used as an
#   attribute for circled inverted color numbers.
#   See # # CIRCLED_NEGATIVE
#
#   As a diacritic,  "⃝" U20DD is provided, and "◯" U25EF as a spacing clone.
#
