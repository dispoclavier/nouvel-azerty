#
#
# # Virtual dead keys
#
#   The French BÉPO ergonomic keyboard layout defines a number of dead keys as
#   virtualized by dead key double press.
#   https://bepo.fr/wiki/Version_1.1rc1/Touches_mortes/Pressions_multiples
#
#   The diacritics supported by double-press virtual dead keys are doubled or
#   transformed by shifting to the less frequently diacriticized side of the
#   letter.
#
#   Based on this, triple or quadruple press virtual dead keys may also be
#   supported as required. Additionally, mixing multiple diacritics on the
#   same letter also requires virtual dead keys.
#
#
# # Single-character dead keys
#
#   Some virtual dead keys exist for the sake of one single letter, and so
#   offer the opportunity to be streamlined by cropping the base character.
#   See #   As this dead key exists for
#   See # # Design of multikey sequences
#
#   As a result, the letter is output as soon as the dead key combination is
#   complete, without waiting for the base character, given the lack of
#   multiple options.
#   See # # SUPERSCRIPT&SUBSCRIPT&BAR
#   See # # COMBINING_ABOVE&CEDILLA
#   See # # SUPERSCRIPT&STROKE
#
#   One multikey equivalent, however, is not included in the scheme, because it
#   conflicts with the math symbol "⟌" U27CC and thus requires the base letter
#   as a terminator.
#   See # # SUPERSCRIPT&SUBSCRIPT&BREVE_BELOW
#
#   This feature is part of the streamlined user experience set as an implicit
#   design goal.
#   See #   Streamlining
#   See # # Lenient dead key press
#
#
#   Single-diacritic dead keys
#
#   Another category of single-character dead keys is required to support the
#   combining diacritic glyphs made out of multiple diacritics in a row. Many
#   of these characters are new to Unicode 17.0.
#   https://www.unicode.org/charts/PDF/Unicode-17.0/U170-1AB0.pdf
#
#   These dead keys require the space base character (either U0020 or U200B) as
#   a terminator and thus work like normal dead keys, without any streamlining,
#   except as set up for lenient dead key press.
#   See # # Lenient dead key press
#
#
# # Input order of mixed dead keys
#
#   Dead key combinations, called chained dead keys on Windows, are actionable
#   both ways for two diacritics, except when order matters, for diacritics to
#   be positioned above, stacked in one order or the other way around, as for
#   "Ṻ" U1E7A and "ṻ" U1E7B versus "Ǖ" U01D5 and "ǖ" U01D6, the only case, for
#   instance. All other dead key combinations are symmetric and are symmetrized
#   consistently, multikey equivalents not withstanding.
#   See # # Plus-minus
#   See # # MACRON&DIAERESIS
#   See # # DIAERESIS&MACRON
#   See # # Multikey equivalents
#
#
# # Symmetrization of chained dead keys
#
#   Chained dead keys may be symmetrized using the "bhughes339.replacerules"
#   extension for VSCode with this replaceruleset based on the observation that
#   at this point, chaining does not encompass more than four dead key strokes
#   other than group selection, that always trails and is thus not symmetrized.
#   The JSON below going into user settings has the "@" prefix for subsequent
#   multikey equivalent generation built in and supports a number of likely
#   use cases.
#   See # # Multikey equivalents
#
#       {
#         "replacerules.rules": {
#           "permutate2": {
#             "find": "^(<[^<>]+>)(<[^<>]+>)( .+)",
#             "replace": "@$1$2$3\n@$2$1$3"
#           },
#           "permutate2SameAnd1": {
#             "find": "^(<[^<>]+>)\\1(<[^<>]+>)( .+)",
#             "replace": "@$1$1$2$3\n@$1$2$1$3\n@$2$1$1$3"
#           },
#           "permutate1And2Same": {
#             "find": "^(<[^<>]+>)(<[^<>]+>)\\2( .+)",
#             "replace": "@$1$2$2$3\n@$2$1$2$3\n@$2$2$1$3"
#           },
#           "permutate3": {
