#
#
#*# FLAG
#   flag partial, letter emoji, double, equal
#   *dead_flag UEFD7
#   Multikey: ¦=
#
#   “FLAG” only serves the purpose of being a handy dead key identifier, while
#   the actual flags are output by the FLAG_EMOJI virtual dead key on double
#   press, supporting the full set of existing flag emoji.
#   See #^# FLAG_EMOJI
#
#   In XKB, on single press, letters yield regional indicator symbol letters
#   with an appended word joiner U2060. rather than a cursive non-joiner U200C,
#   as this only enables runs of letter emoji, without preventing the intended
#   words from randomly breaking apart at line end.
#
#   Regional indicator symbols in isolation are supported on triple press.
#   See #^# REGIONAL_INDICATOR_SYMBOL
#
#   Digits yield double arrows "⇐" U21D0.."⇙" U21D9 as a redundant facility
#   expected to meet most common user expectations. Single arrows are yielded
#   by dead_horn.
#   See #*# HORN
#
#   Consistently with *dead_flag double press, "🏴" U1F3F4 WAVING BLACK FLAG is
#   supported by backslash, with phonetic mnemonics, as well as by
#   periodcentered (at the base level instead of backslash on most variants),
#   and "🏳" U1F3F3 WAVING WHITE FLAG, by slash.
#
#
#   Cross-platform compatibility
#
#   Windows supports an extra modifier added on Caps Lock for continuous input,
#   and also for composing flags. As for letter emoji, WORD JOINER needs to be
#   appended, on Windows, Shift would need to be held down for writing words,
#   consistently with the uppercase display of letter emoji, but not for flags.
#
#   MacOS supports an iterative dead key for continuous input, on triple press.
#   As XKB has no support for iterative dead keys, the behavior of single press
#   and triple press is swapped, so that single press outputs an appended WJ,
#   and triple press outputs regional indicator symbol letters in isolation.
#
#   In en_US.UTF-8/Compose, sequences starting with « ¦= » conflict with
#   currency symbols and with double acute, given that en_US.UTF-8/Compose uses
#   « ¦" », not « ¦: », for diaeresis, and so cannot use « ¦" » for
#   dead_doubleacute, and uses « ¦= » instead. Removing currency symbol
#   sequences starting with EQUALS SIGN, and leaving only those ending with
#   EQUALS SIGN, solves this issue.
#   See #^# Currency symbols
#
#
#   Auxiliary characters
#
#   Auxiliary characters are supported with dead keys in synergy as base
#   characters. The multikey equivalents without full ASCII would not make
#   sense, while with full ASCII, most multikey equivalents would conflict with
#   mathematical symbols and are thus deactivated, as this facility is not
#   worth screwing up the math.
#   See #*# HOOK_ABOVE
#   See # # Multikey equivalents
#
#   The straightforward diacritic "᫨" U1AE8 COMBINING EQUALS SIGN ABOVE is
#   available since Unicode 17.0. As a spacing counterpart, there is
#   "˭" U02ED MODIFIER LETTER UNASPIRATED, while "꞊" UA78A MODIFIER LETTER
#   SHORT EQUALS SIGN is consistently in *dead_bar double press.
