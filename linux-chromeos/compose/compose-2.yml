#
#
#^# DOUBLE_BAR
#   double bar, long bar, barred descender, short bar overlay
#   *dead_bar double press
#   Multikey: ¦--
#
#   The eponymous letter of this virtual dead key is "Ⱡ" U2C60 LATIN CAPITAL
#   LETTER L WITH DOUBLE BAR, "ⱡ" U2C61 LATIN SMALL LETTER L WITH DOUBLE BAR.
#
#   The short bar overlay in "Ꟈ" UA7C7 LATIN CAPITAL LETTER D WITH SHORT STROKE
#   OVERLAY is longer than the standard bar in "Đ" U0110 LATIN CAPITAL LETTER D
#   WITH STROKE, and so makes a good point for support in this double press bar
#   virtual dead key.
#
#   "–" U2013 EN DASH is supported in this double bar virtual dead key, with
#   period as a base character, for sideways compatibility with the sequence in
#   en_US.UTF-8/Compose: <Multi_key><minus><minus><period>.
#   See #^# HIGH_BAR
#   See #   Input method for hyphens and dashes
#
#   Budu uses MODIFIER LETTER SHORT EQUALS SIGN "꞊" UA78A as a tone letter, and
#   this is picked here to fill the modifier letter slot, due to its “double”
