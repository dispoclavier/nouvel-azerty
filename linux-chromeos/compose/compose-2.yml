#
#
#*# STROKE
#   stroke, diagonal stroke, oblique stroke, bar (lenient)
#   dead_stroke
#   dead_longsolidusoverlay
#   Multikey: ¦/
#
#   In X11 XKB, the diacritic called “stroke” had an ambiguous shape, until the
#   horizontal stroke and the slanted strokes were distinguished by introducing
#   the new dead_longsolidusoverlay keysym named after U0338 "̸" COMBINING LONG
#   SOLIDUS OVERLAY as one of four extra dead elements for the German T3 layout
#   designed around 2010 and standardized in 2012 as DIN 2137:2012.
#   https://de.wikipedia.org/wiki/DIN_2137#Neufassung_2012
#   https://gitlab.freedesktop.org/xorg/proto/xorgproto/-/commit/6d4acb0e3a6568a8faaa651d4e3d32f917b9067b
#   https://web.archive.org/web/20250202063718/https://gitlab.freedesktop.org/xorg/proto/xorgproto/-/commit/6d4acb0e3a6568a8faaa651d4e3d32f917b9067b
#   See #*# BAR
#
#   The use of dead_stroke for horizontal, rather than for diagonal while
#   introducing *dead_bar to cover horizontal, appears to be fueled by the name
#   of the combining diacritic and the character names containing "WITH STROKE"
#   with the meaning of WITH BAR, or BARRED, like UAB33 LATIN SMALL LETTER
#   BARRED E, or in the Unicode 1.0 name of U0197 LATIN CAPITAL LETTER I WITH
#   STROKE, previously LATIN CAPITAL LETTER BARRED I.
#   See # # Bar and stroke diacritics
#
#   But since dead_longsolidusoverlay was removed in 2023, dead_stroke is used
#   for slash-shaped diacritics again.
#   https://gitlab.freedesktop.org/xorg/proto/xorgproto/-/merge_requests/70
#   https://web.archive.org/web/20240520104930/https://gitlab.freedesktop.org/xorg/proto/xorgproto/-/merge_requests/70
#   https://gitlab.freedesktop.org/xorg/proto/xorgproto/-/commit/cb44799b72f611eb4c9d7cc185bc3b09e070be08
#   https://web.archive.org/web/20250202064605/https://gitlab.freedesktop.org/xorg/proto/xorgproto/-/commit/cb44799b72f611eb4c9d7cc185bc3b09e070be08
#   See # # Bar and stroke diacritics
#
#
#   Letters
#
#   For convenience, to account for this confusion, letters without a variant
#   with stroke have their barred variant duplicated in this dead key as well,
#   to make it more lenient, for a streamlined user experience.
#
#   Some letters occur both with a diagonal stroke and with an oblique stroke,
#   where the diagonal stroke has the steep slant of a regular slash, while the
#   oblique stroke is only slightly slanted, to such an extent that it might be
#   referred to as an oblique bar, if keeping things straightforward wasn’t the
#   best option. Yet prior to Unicode 16.0, the only letter occurring both with
#   a diagonal stroke and an oblique stroke was "K", where a diagonal stroke is
#   also short: "Ꝃ" UA742 LATIN CAPITAL LETTER K WITH DIAGONAL STROKE. But as
#   Unicode 16.0 adds "Ꟍ" UA7CC LATIN CAPITAL LETTER S WITH DIAGONAL STROKE
#   https://commons.wikimedia.org/wiki/File:Latin_letter_S_with_diagonal_stroke.svg
#   alongside Unicode 6.0 "Ꞩ" UA7A8 LATIN CAPITAL LETTER S WITH OBLIQUE STROKE,
#   the scheme is now clear, and double press is dedicated to oblique stroke.
#   However, empty slots in single press are populated conveniently for a
#   streamlined user experience.
#   See #^# OBLIQUE_STROKE
#
#
#   Math symbols
#
#   Digits yield mathematical slashes "⁄" U2044, "∕" U2215, "⟋" U27CB,
#   "⧸" U29F8. The digit is consistent with the number of leading spaces of
#   multikey sequences, and #0 is duplicated on #4 for convenience.
#
#       0  "∕" U2215
#       1  "⧸" U29F8
#       2  "⟋" U27CB
#       3  "⁄" U2044
#       4  "∕" U2215
#
#   This is a part of the design of math sequences.
#   See #   Outsourcing to dead keys
#   See #*# REVERSED
#   See #*# MACRON
#
#   Consistently with other dead keys supporting diacriticized math symbols,
#   and to meet strong user expectations and cater for widely used symbols,
#   equal yields "≠" U2260 in group 0, "≢" U2262 in group 1, as "≡" U2261 is in
#   group 1 of equal; less yields "≮" U226E in group 0, "≰" U2270 in groups 1
#   and 2, as "⩽" U2A7D is in group 2 of less; so does greater for "≯" U226F
#   and "≱" U2271; asciitilde yields "≁" U2241.
#
#
#   Diacritic
#
#   As a spacing counterpart of the long solidus diacritic "̸" U0338, the
#   division slash "∕" U2215 is picked.
#
