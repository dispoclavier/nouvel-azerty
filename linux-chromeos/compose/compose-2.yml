#
#^# GLOTTAL
#   *dead_abovehook UEFD3 double press
#   Multikey: ¦]]
#
#   As the glottal letters new to Unicode v12 are diacriticized with a spiritus
#   lenis, Greek psili, they are here in a dedicated virtual dead key, based on
#   the hook above as looking closest. However, given the psili is considered a
#   comma above, and has been encoded consistently, these letters are also part
#   of the virtual dead key based on dead_belowcomma double press with a set of
#   duplicates in dead_belowcomma for convenience.
#   https://en.wikipedia.org/wiki/Smooth_breathing
#   See #^# COMMA_ABOVE
#   See #*# COMMA_BELOW
#
#   As a diacritic, a mark looking close to a right half ring is picked, for
#   the sake of being a real psili, as an alternative to the comma above:
#   "҆" U0486, although this is Cyrillic. But a dedicated spacing clone is
#   available for Greek smooth breathing: "᾿" U1FBF.
#   See #^# COMMA_ABOVE
#
<UEFD3><UEFD3>                                                                             <space> : "҆" U0486 # COMBINING CYRILLIC PSILI PNEUMATA
