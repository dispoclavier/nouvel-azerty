#
#
#^# FLAG_EMOJI
#   *dead_flag double press
#   Multikey: ¦==
#
#   The 258 country flags are supported on double press followed by a
#   two-letter ISO country code or one of the following additional codes,
#   written in regional indicator symbol letters.
#   https://unicode.org/emoji/charts/emoji-list.html#country-flag
#   https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2
#   See #   Country flags
#
#       AC  "🇦🇨" Ascension Island
#       CP  "🇨🇵" Clipperton Island
#       DG  "🇩🇬" Diego Garcia
#       EA  "🇪🇦" Ceuta & Melilla
#       EU  "🇪🇺" European Union
#       IC  "🇮🇨" Canary Islands
#       TA  "🇹🇦" Tristan da Cunha
#       UN  "🇺🇳" United Nations
#       XK  "🇽🇰" Kosovo
#
#   The only standardized subdivision flags are England, Scotland and Wales.
#   https://blog.unicode.org/2022/03/the-past-and-future-of-flag-emoji.html
#   https://unicode.org/emoji/charts/emoji-list.html#subdivision-flag
#
#   The 3 subdivision flags supported by Unicode (after projecting to support
#   all subdivision flags, and devising a scheme to do so by composing the
#   subdivision identifiers in lowercase tag characters with an initializer
#   ["🏴" U1F3F4] and a terminator [UE007F CANCEL TAG]) have base characters
#   consistent with the level-10 map for Windows using the AltEm modifier
#   added on top of the Caps Lock key (using it requires resetting the toggle
#   status in the wake), at the Shift + AltEm level, with geospatial mnemonics
#   using the stacked layout of these keys, constrained by the requirement of
#   duplicate mappings to work around the column-02 bug on Windows, affecting
#   level 10, decimal 65, hex 0x41.
#
#       C12: Wales    "gbwls"
#       D12: England  "gbeng"
#       E12: Scotland "gbsct"
#
#       B02 is duplicated on B07
#       C02 is duplicated on C11
#       D02 is duplicated on D11
#       E02 is duplicated on E11
#
#   A partial keycap mnemonic is based on "£" printed in shift position on D12
#   of French AZERTY, on C12 of Belgian AZERTY.
#
#   For convenience, on Linux, a geographically more accurate layout featuring
#   Wales on key D11 is also provided; and with respect to remapped variants,
#   Scotland is replicated on key E11 by at sign, while England has also minus
#   as a base character.
#   See #   Subdivision flags
#
#   For intuitivity, an alphabetic alternative is also provided, although "GB"
#   is used for the country flag, and country flag input is case insensitive.
#   As a workaround, the unused "UK" is prefixed instead, and sequences based
#   on "gbeng", "gbsct", "gbwls" are streamlined to "UKE", "UKS", "UKW".
#
#   On double press, the most straightforward diacritic is "͇" U0347 COMBINING
#   EQUALS SIGN BELOW.
#
#   The sequences with no-break space and no-break thin space, used for spacing
#   clones of diacritics or for modifier letters on most dead keys, output a
#   black flag by no-break space, and a white flag by no-break thin space.
#   This is done because the flag used as a base character for subdivision
#   flags, "🏴" U1F3F4 WAVING BLACK FLAG, is in the SMP, cross-platform
#   incompatible.
#
#   However, "🏴" U1F3F4 WAVING BLACK FLAG is supported by backslash, with
#   phonetic mnemonics, as well as by periodcentered (at the base level instead
#   of backslash on most variants), and "🏳" U1F3F3 WAVING WHITE FLAG, by slash.
#
