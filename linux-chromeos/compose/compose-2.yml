#
#
#*# CIRCUMFLEX
#   dead_circumflex
#   Multikey: ¦<
#
#   Unlike en_US.UTF-8/Compose’s superscript support hitchhiking the circumflex
#   dead key in combination with dead_macron’s multikey equivalent for letters, 
#   new-school dedicates asciicircum to superscript and assigns dead_circumflex
#   the less keysym instead, following the logic of parentheses for breve and
#   its inverted counterpart.
#   See #*# SUPERSCRIPT
#
#
#   Quotation marks
#
#   Followed by quotedbl, EuroSign, apostrophe or rightsinglequotemark,
#   dead_circumflex yields turned high curly quotation marks U2018, U201C
#   (opening or closing). A conflicting multikey equivalent is commented out
#   and replaced with a dedicated sequence.
#   See # # Quotation mark input method
#   See # # Comma-shaped quotation marks
#
#
#   "Ê" key emulation
#
#   The polygrams "êk", "êl", "êm", "ên", "êp", "êqu", "êr", "êt", "êv", "êch"
#   make dead_circumflex behave like an Ê key in most cases by using the fact
#   that the letters k, l, m, n, p, q, r, t, v, x do not exist as precomposed
#   letters with circumflex accent, and most of these are not in usage either
#   with combining circumflex as known composed letters. Those that are, will
#   need to be overridden, so as to prioritize the "Ê" key emulation
#   sequences.
#
#   French usage information by courtesy of _La fée des lettres_.
#   https://www.motsavec.com
#
#   This is the full list of composed letters unsupported for the sake of Ê key
#   emulation:
#
#       <dead_circumflex><M> : "M̂" # U004D U0302 LATIN CAPITAL LETTER M WITH CIRCUMFLEX: Min Nan
#       <dead_circumflex><m> : "m̂" # U006D U0302 LATIN SMALL LETTER M WITH CIRCUMFLEX: Min Nan
#       <dead_circumflex><N> : "N̂" # U004E U0302 LATIN CAPITAL LETTER N WITH CIRCUMFLEX: Min Nan
#       <dead_circumflex><n> : "n̂" # U006E U0302 LATIN SMALL LETTER N WITH CIRCUMFLEX: Min Nan
#
#   By courtesy of FrathWiki.
#   https://www.frathwiki.com/Circumflex
#
#   For maintainability, these overridden sequences have been removed.
#   https://github.com/dispoclavier/nouvel-azerty/commit/f1d465e92b885ae0659bfaa5d3d418f18b7f2b13
#
#   Cross-platform compatibility is full on MacOS, but only partial on Windows,
#   that is able to support only lowercase, and only digrams, provided that the
#   dead key is assigned the appropriate dead character: "ê" U00EA LATIN SMALL
#   LETTER E WITH CIRCUMFLEX, for instance.
#
#   Likewise, a "Ç" key is emulated for use on the Canadian French variant.
#   See #*# CEDILLA
#
#
#   Superscripts
#
#   For the sake of usability and meeting predictable user expectations, that
#   also have been escalated to the level of standards support, superscript
#   digits are supported, at the expense of multikey equivalents.
#   See NF Z71-300:2019, section 6.3.3 page 24
#
#   As the ISO keyboard standard, part 11, since the 2026 revision supports
#   superscript signs and parentheses along with digits, these are supported
#   likewise, as well as the superscript equals sign "⁼" U207C for completeness
#   and consistency, except the superscript plus sign, as dead_circumflex by
#   plus is required for "⨣" U2A23 PLUS SIGN WITH CIRCUMFLEX ACCENT ABOVE.
#   $ee ISO/IEC 9995-11:2026
#   https://en.wikipedia.org/wiki/ISO/IEC_9995#Dead_keys_on_digits:_Superscripting_and_subscripting
#   https://en.wikipedia.org/w/index.php?title=ISO/IEC_9995&diff=next&oldid=1319186841#Dead_keys_on_digits:_Superscripting_and_subscripting
#
#       Dead keys on digits: Superscripting and subscripting
#       If the definition of a keyboard layout refers to this feature (which is
#       optional), the circumflex  applied on a digit (i.e., pressed and
#       released before typing the digit) yields the superscript version of the
#       digit (as indicated by the arrow in the keyboard symbol). Then,
#       likewise, the caron  yields the subscript version of the digit. Besides
#       digits, the same applies for the parentheses ( and ), the plus sign +
#       and the hyphen-minus -, the latter yielding a superscripted or
#       subscripted minus sign.
#
#   The German E DIN 2137-1:2020-11 has been synced with NF Z71-300:2019, but
#   only with the digits part, not the plus and minus signs nor parentheses.
#   https://de.wikipedia.org/wiki/E1_(Tastaturbelegung)#Hochstellen,_Tiefstellen_und_Einkreisen_von_Buchstaben
#   https://de.wikipedia.org/wiki/DIN_2137#%C3%9Cberarbeitung_2020
#   See DIN 2137-01:2023-08
#   See E DIN 2137-1:2020-11
#
#   In en_US.UTF-8/Compose, that the “superscript digits by dead_circumflex”
#   feature comes from, the superscript dead key is missing, consistently with
#   keysymdef.h lacking a *dead_superscript or equivalent keysym.
#   See # # Notes on Unicode support
#   See # # Introducing new-school input composition
#
#   Anyway, the multikey equivalents of this way to input superscript digits
#   cannot be supported, due to conflicts with "❤" U2764 as of "³" U00B3, or
#   with the less frequent "♥" U2665, as of "⁸" U2078 if using the new sequence
#   <Multi_key><less><8> introduced for the support of "♥" U2665.
#   See # # Heart emoji
#   See # # Multikey equivalents
#
#   For full support including multikey equivalents, the diaeresis dead key may
#   likely be an acceptable workaround solution for superscript digits, as some
#   mnemonic, using the traditional French AZERTY mapping of dead_diaeresis on
#   the same key (D11) as dead_circumflex, in shift position, might not be too
#   far-fetched. Superscript characters are also in the superscript dead key.
#   See #*# DIAERESIS
#   See #*# SUPERSCRIPT
#
#
#   Shortcuts
#
#   For consistency with the French AZERTY keyboard layout, in French mode,
#   dead_circumflex is in the benefit of an unshifted position. Hence its use
#   for various shortcuts.
#
#   Followed by Çç, dead_circumflex is a shortcut to Ññ for Breton and Spanish.
#
#   U017F LATIN SMALL LETTER LONG S, in group 3 of s, has an additional input
#   method by <dead_circumflex><f>, thanks to French not having any word with
#   an "êf" digraph.
#
#   As "B" has not been encoded with circumflex, and no French word includes
#   any "êb" digraph, <dead_circumflex><B> and <dead_circumflex><b> may be used
#   as shortcuts for anything. "B" mnemonics suggest U WITH BREVE "Ŭ" U016C,
#   "ŭ" U016D. Likewise, the "U" mnemonic is a valuable reason to make use of
#   Ugrave for the same output (by lack of something else for the time being).
#   "U" has not been encoded with circumflex and grave, as opposed to "A"
#   (by Agrave on key E10), "E" (by Egrave on key E07) and "O" (French AZERTY
#   does not feature Ograve).
#
#   Followed by comma, dead_circumflex provides an additional input method for
#   "ʼ" U02BC MODIFIER LETTER APOSTROPHE.
#   See # # D07 apostrophe
#
#   Followed by period, dead_circumflex is a shortcut to the middle dot
#   "·" U00B7, with mnemonics based on the superscript semantics of its
#   legacy multikey equivalent asciicircum, consistently with superscript
#   digits, also supported to meet current user expectations.
#
#   Followed by semicolon, dead_circumflex is a shortcut to the hyphenation
#   point "‧" U2027.
#   See # # B08-level_1 period
#
#   Followed by colon, dead_circumflex is a shortcut to the horizontal ellipsis
#   "…" U2026.
#
#   Followed by slash, dead_circumflex is a shortcut to the fraction slash
#   "⁄" U2044.
#
#   Followed by question, dead_circumflex is a shortcut to the interrobang
#   "‽" U203D, and by exclam, to the inverted interrobang "⸘" U2E18.
#   See #   Interrobang
#
#
#   Dagger
#
#   Followed by bar, dead_circumflex yields the left-guard dagger "⸶" U2E36,
#   consistently with dead_caron yielding its right-guard couterpart.
#   See #*# HACEK
#
#
#   Asterisks
#
#   "⁂" U2042 ASTERISM is also expected to be supported by dead_circumflex,
#   additionally to its support in the symbol groups and by dead_abovering.
#   See # # C10 bar
#   See #*# RING_ABOVE
#
#
#   Per mille
#
#   Since per mille "‰" U2030 and per myriad "‱" U2031 are not widely used, due
#   to their confusability and limited availability, they are relegated to the
#   symbol groups 11 and 12, in favor of potentially more useful symbols in the
#   groups 1 and 2.
#   See # # D02 percent
#
#   However, per mille has shortcuts in dead_acute and in dead_circumflex, and
#   per myriad has one in dead_diaeresis.
#   See #*# ACUTE
#   See #*# DIAERESIS
#
#
#   Math symbols
#
#   Consistently with other dead keys supporting diacriticized math symbols,
#   plus yields "⨣" U2A23, asciitilde yields "⩯" U2A6F, at and multiply yield
#   "⨶" U2A36.
#
#   Further, less and greater yield the slanted "⩽" U2A7D and "⩾" U2A7E as a
#   convenience for French usage. and equal yields "≦" U2266 consistently with
#   dead_caron yielding "≧" U2267 by the same base character.
#
#   Followed by bracketleft or braceleft, dead_circumflex is a shortcut to the
#   mathematical "⟨" U27E8, and by bracketright or braceright, to its "⟩" U27E9
#   counterpart, so as to support both mnemonics by brackets, and ease of input
#   by braces on the same row as the French-mode dead_circumflex instance.
#
#
#   Diacritics
#
#   The doubled diacritic "᪰" U1AB0 COMBINING DOUBLED CIRCUMFLEX ACCENT has
#   case insensitive "d" as base characters, with alphabetic mnemonics,
#   thanks to French not having any word with "êd".
#   https://www.motsavec.com
#   See #   "Ê" key emulation
#   See "᫏" U1ACF
#
#   The double diacritic "᷍" U1DCD has emdash as a mnemonic base character, and
#   dollar as an ASCII alternative with "double" mnemonics, for consistent
#   input methods across all dead keys featuring a double diacritic.
#
