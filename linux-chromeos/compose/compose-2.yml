#
#
#^# HACEK input facility by CIRCUMFLEX
#   dead_circumflex double press
#   Multikey: ¦<<
#
#   For ease of access, and in an attempt to meet potential user expectations,
#   the hacek dead key is also activatable by dead_circumflex double press,
#   extending the logic that multiple dead key presses shift diacritics around,
#   to include the idea that a double press may also turn the diacritic, if
#   that is a better option with respect to usability.
#
#   For maintainability of the code, and usability of the documentation, this
#   dead key content is grouped in a single place.
#   See #*# HACEK
#   See # # Notes about documentation
#
#
#^# CIRCUMFLEX_BELOW
#   dead_belowcircumflex
#   dead_circumflex triple press
#   Multikey: ¦<<<
#
#   Although the circumflex accent below is extremely rare, Unicode has 6 pairs
#   of Latin letters precomposed with it. Except on Windows, several composed
#   letters are also supported, as C̭, c̭, K̭, k̭, R̭, r̭ are found in the
#   “Palette Accent circonflexe souscrit” on Wikipédia, although with redlinks
#   and without usage information,
#   https://www.frathwiki.com/Circumflex_Below
#   https://fr.wikipedia.org/wiki/Mod%C3%A8le:Palette_Accent_circonflexe_souscrit
#
#   "˿" U02FF MODIFIER LETTER LOW LEFT ARROW has quotedbl and EuroSign as base
#   characters, with a rationale combining low and less, matching this arrow’s
#   head.
#
#
#   Shortcut
#
#   Consistency with the bépo keyboard layout and other diacritical dead keys
#   requires virtualizing the circumflex accent below dead key by double press
#   of the circumflex accent dead key. Usability however imposes to use this as
#   a shortcut for the hatchek dead key located on B04, level 4, and to move to
#   triple press the variant below, while providing a shortcut using the
#   dead_circumflex dead_abovering chord in an attempt to restore some ease of
#   input, given that the dead_circumflex dead_caron chord conflicts with the
#   space-terminated sequences for "≶" U2276 and "≷" U2277, and the
#   dead_circumflex *dead_flag chord, with those for "⇐" U21D0 and "⪙" U2A99.
#   https://bepo.fr/wiki/Touches_mortes#Circonflexe_souscrit
#
#   For maintainability of the code, and usability of the documentation, this
#   dead key content is grouped in a single place.
#   See # # Notes about documentation
#
