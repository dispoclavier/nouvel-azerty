#
#
#*# BREVE
#   breve, without handle, short right leg
#   dead_breve
#   Multikey: ¦)
#
#   This also supports cropped letters "ꭇ" UAB47, "ꭎ" UAB4E, "ꭏ" UAB4F,
#   "ꭚ" UAB5A, with mnemonics based on the "short" semantics.
#
#   There does not seem to be any other dead key except the group dead key,
#   for unintuitive support in letter groups 4 and 5.
#   See #+# GROUP_4
#   See #+# GROUP_5
#
#
#   Flower punctuation
#
#   Followed by asterisk, dead_breve yields "⁕" U2055 FLOWER PUNCTUATION MARK,
#   with an alphabetic mnemonic based on keycap "F" that works both in French
#   and in English, and a graphic mnemonic due to the punctuation’s shape.
#   See #*# HOOK
#
#
#   Half rings
#
#   "˒" U02D2 MODIFIER LETTER CENTRED RIGHT HALF RING is mapped to
#   unconflicting and case insensitive "c", with its left counterpart
#   in dead_invertedbreve.
#   See #*# INVERTED_BREVE
#
#   "ʾ" U02BE MODIFIER LETTER RIGHT HALF RING is mapped to case insensitive
#   "d", with its left counterpart "ʿ" U02BF in dead_invertedbreve.
#
#   Raised half rings "ʿ" U02BF and "ʾ" U02BE are in group 1 of "l" and "m",
#   too.
#   See #+# GROUP_1
#
#
#   Diacritics
#
#   The double diacritic "͝" U035D has emdash as a mnemonic base character, and
#   dollar as an ASCII alternative with "double" mnemonics, for consistent
#   input methods across all dead keys featuring a double diacritic.
#
#   The combining candrabindu "̐" U0310 has a shortcut by period.
#
