#
#
#^# BREVE_BELOW
#   breve below, belt
#   dead_belowbreve
#   dead_breve double press
#   Multikey: ¦))
#
#   The rationale for merging the BELT dead key with the BREVE dead key is
#   similarity in shape. But in practice, BELT cannot be merged with BREVE,
#   because of the composed L with combining breve used in Inng. As a result,
#   *dead_belt is merged with dead_belowbreve, dead_breve double press.
#
#   As an easier alternative, HORN could be used, but it is not, for the sake
#   of mnemonics, and to prevent HORN from becoming a holdall dead key.
#   See #*# HORN
#
#   BELT cannot be merged with HOOK either, because of "𝼑" U1DF11, nor with
#   CURL, because of "ȴ" U0234, nor with FLOURISH, because of "𝼦" U1DF26.
#
#   BELT cannot be merged with RETROFLEX_HOOK either because of "ɭ" U026D, nor
#   with PALATAL_HOOK because of "ᶅ" U1D85, and because RETROFLEX_HOOK and
#   PALATAL_HOOK occur together with BELT on "ꞎ" UA78E, "𐞝" U1079D, "𝼓" U1DF13.
#
#   BELT cannot be merged with RING either, because this occurs as middle ring
#   on small l: "ꬹ" UAB39.
#
#
#   Double diacritic
#
#   The double diacritic "͜" U035C has emdash as a mnemonic base character, and
#   dollar as an ASCII alternative with "double" mnemonics, for consistent
#   input methods across all dead keys featuring a double diacritic.
#
#
#   Spacing clones
#
#   For a spacing clone of the combining breve below, "⏑" U23D1 METRICAL BREVE
#   could be picked. Yet it is a symbol, not a letter, so it is not a good fit.
#   Given that breve below and inverted breve below do not have spacing clones,
#   and for a consistent scheme across breve and inverted breve using modifier
#   letters only, not symbols nor punctuation, the TOP and BOTTOM HALF O seem a
#   better fit. As these come in a baseline set and a superscript set, both are
#   provided, with the superscript going by the no-break thin space as a base.
#
<dead_breve><dead_breve>                                                                   <space> : "̮" U032E # COMBINING BREVE BELOW
