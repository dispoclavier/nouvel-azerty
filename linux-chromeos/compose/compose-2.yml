#
#
#*# DOT_ABOVE
#   dot above, middle dot, dotless
#   dead_abovedot
#   Multikey: ¦.
#
#   For L and l, dead_abovedot results in WITH MIDDLE DOT.
#
#   For i and j, dead_abovedot results in DOTLESS, applying binary logic. As a
#   consequence, dotless letters do not need support on live keys or in groups.
#
#   This supports various combining dots, with digits as base characters, and
#   with numeric or numpad-based mnemonics using the position of the key on the
#   numpad or the bump on key "5" (C52):
#
#       1    "᷺" U1DFA COMBINING DOT BELOW LEFT
#       3    "᪴" U1AB4 COMBINING TRIPLE DOT
#       5    "͒" U0352 COMBINING FERMATA
#       7    "᷸" U1DF8 COMBINING DOT ABOVE LEFT
#       9    "͘" U0358 COMBINING DOT ABOVE RIGHT
#
#   This scheme also includes three paper symbols, with alphabetic mnemonic,
#   as well as — for the permanent paper symbol — a shape-based mnemonic using
#   digit 8. The remaining two slots 4 and 6 are populated with duplicates.
#   See #*# RETROFLEX_HOOK
#   See # # D04 backslash
#   See # # D08 braceleft
#
#       0 and 6    "♼" U267C RECYCLED PAPER SYMBOL
#       2 and 4    "♽" U267D PARTIALLY-RECYCLED PAPER SYMBOL
#       8          "♾" U267E PERMANENT PAPER SIGN
#
#   The Chinantec tone marks "ꜗ" UA717, "ꜘ" UA718, "ꜙ" UA719 are intuitively
#   supported with matching base characters bar, slash and underscore (due to
#   minus being required for "∸" U2238 DOT MINUS), without multikey
#   equivalents, while "ꜚ" UA71A is featured in lieu of a spacing clone of
#   horn, and the full set has dedicated multikey support.
#   See #*# HORN
#   See #^# Chinantec tone marks
#
#
#   Fullwidth punctuation
#
#   With an alphabetic mnemonic, dead_hook on key D08 "I" as "IDEOGRAPHIC"
#   yields CJK symbols and punctuation, single on single press, most double on
#   double press, and triple press yields "〚" U301A, "〛" U301B.
#
#            <bracketleft> : "〚" U301A LEFT WHITE SQUARE BRACKET
#           <bracketright> : "〛" U301B RIGHT WHITE SQUARE BRACKET
#
#   Single press is in dead_hook.
#   See #*# HOOK
#
#   Double press is duplicated in *dead_retroflexhook.
#   See #^# CURL
#   See #*# RETROFLEX_HOOK
#
#   Triple press is duplicated in dead_abovedot.
#   See #^# SQUIRREL_TAIL
#   See #*# DOT_ABOVE
#
#   Consistently with other dead keys supporting diacriticized math symbols,
#   plus yields "∔" U2214; equal yields "≐" U2250 in group 0, and "⩧" U2A67 in
#   group 1 ("≡" U2261 is in group 1 of equal); quotedbl and EuroSign (where
#   "∈" U2208 is in group 2) yield "⋵" U22F5; percent yields "⧊" U29CA;
#   multiply and semicolon (with B08 keycap mnemonic) yield "⨰" U2A30; grave on
#   B06 (where "∧" U2227 is in group 2) yields "⩑" U2A51; question on B07
#   yields "⩒" U2A52 ("∨" U2228 is in group 3 of grave); less yields "⪁" U2A81;
#   greater yields "⪂" U2A82; asciitilde yields "⩪" U2A6A in group 0, and
#   "⩭" U2A6D in groups 1..3 (lenient group selection); apostrophe and
#   rightsinglequotemark (where "⊂" U2282 is in group 2) yield "⫃" U2AC3;
#   braceleft (key D08, while apostrophe is D07) yields "⫄" U2AC4.
#   See # # Lenient dead key press
#
<dead_abovedot>                                                                            <space> : "̇" U0307 # COMBINING DOT ABOVE
#   Multikey conflicts with "⋅" U22C5.                                                     <space> : "̇" U0307 # COMBINING DOT ABOVE
