#
#
#^# INVERTED_BREVE_BELOW
#   dead_invertedbreve double press
#   Multikey: ¦((
#
#   For consistency with breve below by dead_breve double press.
#   See #^# BREVE_BELOW
#
#
#   Double diacritic
#
#   The double diacritic "᷼" U1DFC has emdash as a mnemonic base character, and
#   dollar as an ASCII alternative with "double" mnemonics, for consistent
#   input methods across all dead keys featuring a double diacritic.
#
#
#   Spacing clones
#
#   Given that breve below and inverted breve below do not have spacing clones,
#   and for a consistent scheme across breve and inverted breve using modifier
#   letters only, not symbols nor punctuation, the top and bottom half o seem a
#   better fit. As these come in a baseline set and a superscript set, both are
#   provided, with the superscript going by the no-break thin space as a base.
#
<dead_invertedbreve><dead_invertedbreve>                                                   <space> : "̯" U032F # COMBINING INVERTED BREVE BELOW
#   Multikey conflicts with "⦅" U2985.                                                     <space> : "̯" U032F # COMBINING INVERTED BREVE BELOW
<dead_invertedbreve><dead_invertedbreve>                                                   <U200B> : "̯" U032F # COMBINING INVERTED BREVE BELOW
<Multi_key><parenleft><parenleft>                                                          <U200B> : "̯" U032F # COMBINING INVERTED BREVE BELOW
