#
#   This dead key is required to support about 50 reversed Latin letters, and
#   it has an intuitive multikey equivalent, backslash, that provides it with
#   a natural key position altogether.
#
#
#   Misnomer alert
#
#   "Ǝ" U018E LATIN CAPITAL LETTER REVERSED E, "ɘ" U0258 LATIN SMALL LETTER
#   REVERSED E is no casing pair. The small letter has no capital letter, while
#   the capital letter is considered a turned "e", uppercase of "ǝ" U01DD LATIN
#   SMALL LETTER TURNED E. As such it is in the TURNED dead key, as well as in
#   group 1 of "E".
#   See #*# TURNED
#   See #+# GROUP_1
#
#
#   Bullets
#
#   The two “pilcrow bullets” "⁌" U204C BLACK LEFTWARDS BULLET and "⁍" U204D
#   BLACK RIGHTWARDS BULLET are supported by case insensitive "b" and "d",
#   thanks to the fact that these lowercase letters are the reversed
#   counterpart of each other and would thus be missing from the reversed
#   dead key. The association with the pilcrow bullets is based on shape-driven
#   mnemonics using the rounded and straight parts of the bullets, coming close
#   to "¶" U00B6 PILCROW SIGN and "⁋" U204B REVERSED PILCROW SIGN, that is also
#   supported by remaining "p", and by "paragraph" (U00B6), key D10, level 7.
#
#   "⦰" U29B0 is supported with braceright as a base character consistently
#   with the base character of "∅" U2205 in the symbol group 2.
#   See # # D09 braceright
#
#
#   Glottal stop
#
#   The reversed glottal stop "ʕ" U0295 has "q" as a base character, with shape
#   mnemonics and case insensitivity.
#
#
#   Math symbols
#
#   Digits yield mathematical backslashes "∖" U2216, "⟍" U27CD, "⧵" U29F5,
#   "⧹" U29F9. The digit is consistent with the number of leading spaces of
#   multikey sequences, and #0 is duplicated on #4 for convenience.
#
#       0  "∖" U2216
#       1  "⧹" U29F9
#       2  "⟍" U27CD
#       3  "⧵" U29F5
#       4  "∖" U2216
#
#   This is a part of the design of math sequences.
#   See #   Outsourcing to dead keys
#   See #*# STROKE
#   See #*# MACRON
#
#   "⮈" U2B88 is supported with underscore as a base character due to the
#   presence of "⮊" U2B8A in group 12 of underscore.
#
#
#   Diacritic
#
#   As a diacritic, "̔" U0314 COMBINING REVERSED COMMA ABOVE is included, along
#   with its spacing counterpart "ʽ" U02BD.
#
<UEFD6>                                                                                    <space> : "̔" U0314 # COMBINING REVERSED COMMA ABOVE
