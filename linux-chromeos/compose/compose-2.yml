#
#
#*# SUBSCRIPT
#   subscript, small cap
#   *dead_subscript UEFD2
#   Multikey: ¦_
#
#   Unlike superscript letters, used as abbreviation indicators in French and
#   other Latin-script-using languages, subscripts do not seem to be used in
#   orthographies of natural languages.
#
#   By lack of preformatted subscript uppercase, the uppercase slots are used
#   for small caps, frequent in phonetics, consistently with other dead key
#   implementations.
#
#   Letters still missing after a proposal advising to encode them all were
#   replaced with "∄" U2204 THERE DOES NOT EXIST for the time being.
#   https://www.unicode.org/L2/L2002/02141-n2419-uralic-phonetic.pdf#page=5
#
#   But ultimately, all these instances are populated with the remaining Greek
#   preformatted letters, both subscript and small caps:
#
#       "ᴦ" U1D26 # GREEK LETTER SMALL CAPITAL GAMMA
#       "ᴧ" U1D27 # GREEK LETTER SMALL CAPITAL LAMDA
#       "ᴨ" U1D28 # GREEK LETTER SMALL CAPITAL PI
#       "ᴩ" U1D29 # GREEK LETTER SMALL CAPITAL RHO
#       "ᴪ" U1D2A # GREEK LETTER SMALL CAPITAL PSI
#       "ꭥ" UAB65 # GREEK LETTER SMALL CAPITAL OMEGA — This did not fit in the
#            subscript empty slots, but it is both on regular V and intuitive O
#            in the SUBSCRIPT&GROUP_6 and GREEK_OR_CIRCLED&SUBSCRIPT virtual
#            dead keys.
#       "ᵦ" U1D66 # GREEK SUBSCRIPT SMALL LETTER BETA
#       "ᵧ" U1D67 # GREEK SUBSCRIPT SMALL LETTER GAMMA
#       "ᵨ" U1D68 # GREEK SUBSCRIPT SMALL LETTER RHO
#       "ᵩ" U1D69 # GREEK SUBSCRIPT SMALL LETTER PHI
#       "ᵪ" U1D6A # GREEK SUBSCRIPT SMALL LETTER CHI
#
#   This started supporting "⃨" U20E8 COMBINING TRIPLE UNDERDOT when it was
#   moved in the wake of (temporarily) freeing up groups 1..3 of numbersign,
#   with the rationale that combining below is lower than the baseline ellipsis
#   (that is on live key except in ASCII mode), and that this character has
#   other input methods, too.
#   See #*# DOT_BELOW
#   See # # C01 numbersign
#
#   The associated diacritic "̲" U0332 and its spacing clone, ASCII "_" U005F,
#   are built on the underscore theme hinted by the subscript’s TeX command.
#   See #*# SUPERSCRIPT
#
#   The multikey equivalent of "₋" U208B conflicts with "ᴃ" U1D03, "ᵻ" U1D7B,
#   "ᵾ" U1D7E and "ᶧ" U1DA7, but this can be worked around by typing it the
#   other way around instead. The same holds true for "₎" U208E conflicting
#   with "𐞜" U1079C, "𝼄" U1DF04.
#   See # # Superscript or subscript signs, symbol, punctuation
#
<UEFD2>                                                                                    <space> : "̲" U0332 # COMBINING LOW LINE
<Multi_key><underscore>                                                                    <space> : "̲" U0332 # COMBINING LOW LINE
<UEFD2>                                                                                    <U200B> : "̲" U0332 # COMBINING LOW LINE
<Multi_key><underscore>                                                                    <U200B> : "̲" U0332 # COMBINING LOW LINE
