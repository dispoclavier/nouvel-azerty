#
#
#*# GREEK_OR_CIRCLED
#   Greek letter, circled
#   dead_greek
#   Multikey: ¦@
#
#   The Greek letter dead key is present on several layouts and supported by
#   XKB thanks to the French ergonomic BÉPO keyboard layout.
#   https://bepo.fr/wiki/Lettres_grecques
#   https://bepo.fr/wiki/Version_1.1rc2#Touches_mortes
#
#   The Greek dead key is mapped on D06 "Y" with a mnemonic based on "Greek I",
#   translating its French name: "i grec". As an exception to the rule that the
#   dead keys on alphabetic keys are at level 4, the Greek dead key is both at
#   level 4 and at level 3, given that its multikey equivalent "@" has a stable
#   level-1 position on E11 (both in French mode and in ASCII mode).
#
#   This ease of access is consistent with dead_greek’s potentially heavy use
#   for Greek letters and for circled digits, letters and symbols alike.
#
#   For Greek letters, group 6 provides an alternative input method.
#   See #+# GROUP_6
#
#   The Greek-to-Latin map conforms to ISO/IEC 9995-9 consistent with the Greek
#   keyboard layout.
#
#   When dead_greek was designed and added to en_US.UTF-8/Compose far ahead of
#   ISO/IEC 9995-9, mappings were not yet synced with the Greek keyboard. That
#   is the reason of the discrepancies between en_US.UTF-8/Compose and current
#   keyboard standards, like NF Z71-300:2019 in sync with ISO/IEC 9995-9:2016.
#
#       c : "ψ" (was "")
#       C : "Ψ" (was "")
#       j : "ξ" (was "θ")
#       J : "Ξ" (was "Θ")
#       q : ""  (was "χ")
#       Q : ""  (was "Χ")
#       u : "θ" (was "υ")
#       U : "Θ" (was "Υ")
#       v : "ω" (was "")
#       V : "Ω" (was "")
#       w : "ς" (was "ω")
#       x : "χ" (was "ξ")
#       X : "Χ" (was "Ξ")
#       y : "υ" (was "ψ")
#       Y : "Υ" (was "Ψ")
#
#   The empty places on Q are used for the theta symbol, whose uppercase glyph
#   is preferred in Romani when case conversion is less of an issue.
#
#   Greek subscript letters and small cap letters are also supported.
#   See # # GREEK_OR_CIRCLED&SUBSCRIPT
#
#   Polytonic Greek is supported alongside to meet eventual user expectations,
#   but due to file size restrictions, it cannot be included right here.
#   See ### Greek with diacritics
#   See # # Notes for maintenance
#
#   The diacritic slot is used for the combining ypogegrammeni "ͅ" U0345 as the
#   most likely to be useful and expected, rather than other diacritical marks.
#   So is the spacing clone slot used for "ι" U1FBE rather than "ι" U03B9, that
#   is consistent with Greek encoding but is less expected in this place.
#   https://www.unicode.org/faq/greek.html
#   https://www.opoudjis.net/unicode/unicode.html
#
#   With non-alphabetic base characters, dead_greek single press is a dead key
#   for CIRCLED, alongside dead_greek double press, that is the general-purpose
#   *dead_circled and supports also multikey equivalents with less, greater and
#   underscore, that otherwise conflict with polytonic Greek letters.
#   See #^# CIRCLED
#
#   The base character for "⊚" U229A is degree, and its ASCII counterpart
#   parenright is based on French AZERTY keycap mnemonics, where parenright and
#   degree are both on E11.
#
#   The base character for "⊗" U2297 is multiply, and its ASCII counterpart
#   semicolon is based on French AZERTY keycap mnemonics, where semicolon and
#   period are both on B08, and the dot operator is related to multiplication.
#
#   Zero yields circled number 10, for usability and consistency with Unicode,
#   as circled zero "⓪" U24EA, "⓿" U24FF, "🄋" U1F10B, "🄌" U1F10C is so rare
#   that some items weren’t even encoded in the first place: U24FF was added in
#   Unicode 4.0, U1F10B and U1F10C were added as late as in Unicode 7.0.
#
#   As a consequence, the base character for circled zero is ASCII grave, with
#   positional mnemonic based on US-QWERTY’s E00 grave, and with alphabetically
#   consistent grave on this layout’s key B06, "N" like "null".
#
#   For sideways compatibility with en_US.UTF-8/Compose, multikey sequences
#   with a leading opening parenthesis are also supported.
#   See # # Circled by leading parenthesis
#
#   The efficiency of the level-3 Greek or circled dead key is used to likewise
#   support circled numbers with inverted colors, called negative (referring to
#   photography), and circled sans-serif numbers. Unicode has encoded several
#   font types in various ranges, listed for reference:
#
#   Digits and numbers:
#
#       CIRCLED:                             0 ("⓪" U24EA) .. 50 ("㊿" U32BF)
#       (DINGBAT) NEGATIVE CIRCLED:          0 ("⓿" U24FF) .. 20 ("⓴" U24F4)
#       DINGBAT CIRCLED SANS-SERIF:          0 ("🄋" U1F10B).. 10 ("➉" U2789)
#       DINGBAT NEGATIVE CIRCLED SANS-SERIF: 0 ("🄌" U1F10C).. 10 ("➓" U2793)
#
#   Letters:
#
#       NEGATIVE CIRCLED: A ("🅐" U1F150) .. Z ("🅩" U1F169)
#       SQUARED:          A ("🄰" U1F130) .. Z ("🅉" U1F149)
#       NEGATIVE SQUARED: A ("🅰" U1F170) .. Z ("🆉" U1F189)
#
#   Among these, most are supported by dead key with multikey equivalent, while
#   the 21..50 range of circled numbers is supported by multikey only.
#   See # # CIRCLED_TEEN
#   See # # CIRCLED_NEGATIVE
#   See # # CIRCLED_NEGATIVE_TEEN
#   See # # CIRCLED_SANS
#   See # # CIRCLED_NEGATIVE_SANS
#   See # # SQUARED
#   See # # Circled by leading parenthesis
#
<dead_greek>                                                                               <space> : "ͅ" U0345 # COMBINING GREEK YPOGEGRAMMENI
<Multi_key><at>                                                                            <space> : "ͅ" U0345 # COMBINING GREEK YPOGEGRAMMENI
