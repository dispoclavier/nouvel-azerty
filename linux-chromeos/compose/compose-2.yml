#
#
#*# ACUTE
#   dead_acute
#   Multikey: ¦'
#
#   Composed "J" with acute "J́" is in en_US.UTF-8/Compose, but composed "Ĳ"
#   with acute "Ĳ́" is not, nor do all fonts render it correctly with an accent
#   on each letter partial making up the all-in-one digraph letter.
#   https://glyphsapp.com/learn/localize-your-font-accented-dutch-ij
#
#
#   Quotation marks
#
#   Followed by quotedbl, EuroSign, apostrophe or rightsinglequotemark,
#   dead_acute yields high curly quotation marks U201D, U2019 (closing or
#   opening). A conflicting multikey equivalent is commented out
#   and replaced with a dedicated sequence.
#   See # # Quotation mark input method
#   See # # Comma-shaped quotation marks
#
#
#   Shortcuts
#
#   For usability, in French mode, dead_acute is in the benefit of an unshifted
#   position. Hence its use for various shortcuts.
#
#   Followed by Éé, dead_acute is a shortcut to Ãã for Portuguese, with spatial
#   mnemonic on AZERTY, where "A" (D01) is close to "É" (E02).
#
#   Followed by Àà, dead_acute is a shortcut to Õõ for Portuguese, with spatial
#   mnemonic on AZERTY, where "O" (D09) is close to "À" (E10).
#
#   Followed by Èè, dead_acute is a shortcut to Ññ for Breton and Spanish, with
#   spatial mnemonic on AZERTY, where "N" (B06) is below "È" (E07).
#
#   Followed by Ùù, dead_acute is a shortcut to unicase glottal stop "ʔ" U0294,
#   with an alphabetic mnemonic based on "u", and accomodating with the lack of
#   level-2 uppercase according to French usage, while casing glottal stop is
#   in group 1 of Qq.
#   See # # Glottal stops
#
#   Followed by "7", dead_acute is another shortcut to unicase "ʔ" U0294, with
#   a mnemonic based on this ASCII alias.
#   https://en.wikipedia.org/wiki/Glottal_stop#Writing
#
#   Followed by grave, dead_acute is a shortcut to "ʕ" U0295.
#
#   Followed by parenleft, dead_acute is a shortcut to the German stirrup r
#   "ꭅ" UAB45 with a mnemonic based on the stirrup’s shape.
#
#   Followed by asterisk, dead_acute is a shortcut to the bullet "•" U2022.
#
#   Followed by plus, dead_acute is a shortcut to "±" U00B1.
#
#   Followed by minus the hyphen, dead_acute is a shortcut to the extra hyphen
#   "‐" U2010.
#   See #   Keyboard support for hyphens
#
#   Followed by equal, dead_acute is a shortcut to the negated equal
#   "≠" U2260, with a shape-based mnemonic referring to the diacritic’s slant.
#
#   Followed by asciicircum, dead_acute is a shortcut to "‣" U2023.
#
#
#   End marks
#
#   Followed by bracketleft, dead_acute is a shortcut to the box-shadowed
#   "❒" U2752, with mnemonics based on the slant of the acute accent.
#   See #*# GRAVE
#   See "❑" U2751
#
#   Followed by bracketright, dead_acute is a shortcut to the drop-shadowed
#   "❐" U2750, with mnemonics based on the slant of the acute accent. This
#   makes for a streamlined user experience, as opposed to lenient bracket
#   sides while using group 1 for the drop-shadowed square.
#   See #*# GRAVE
#   See "❏" U274F
#
#
#   Primes
#
#   The primes by digits sequences add to the support of "′" U2032, "″" U2033,
#   "‴" U2034, "⁗" U2057 by multikey.
#   See # # Primes
#   See # # Quadruple prime
#
#
#   Daggers
#
#   Although "†" U2020 DAGGER and "‡" U2021 DOUBLE DAGGER are in groups 1 and 2
#   of "|", dead_acute provides shortcuts with "!" and "?" as base characters.
#
#   This is part of the dead key enhancement carried out yet before the symbol
#   groups were designed and implemented, There, the daggers were included as
#   late as in version 5.0.0 (2025-04-15), after a failed early attempt for
#   version 2.0.0 (2024-05-20).
#
#   This also predates the support of the full set of daggers in dead_tilde, as
#   some daggers were in *dead_bar, in dead_circumflex, and in the virtual dead
#   key named “LONG” that was in dead_macron double press followed by "|", now
#   partly in dead_macron.
#   See # # D02 percent
#
#
#   Per myriad
#
#   Since per mille "‰" U2030 and per myriad "‱" U2031 are not widely used, due
#   to their confusability and limited availability, they are relegated to the
#   symbol groups 11 and 12, in favor of potentially more useful symbols in the
#   groups 1 and 2.
#   See # # D02 percent
#
#   However, per mille has shortcuts in dead_diaeresis and in dead_circumflex,
#   and per myriad has one in dead_acute.
#   See #*# CIRCUMFLEX
#   See #*# DIAERESIS
#
#
#   Symbols for documentation
#
#   Outline square brackets "⟦" U27E6, "⟧" U27E7 used in math are supported in
#   dead_acute by "/" and "\" or "·" U00B7 periodcentered to work around the
#   special formatting triggered by some ASCII-bracketed strings in Markdown,
#   when the actual intent is to mark up keycaps in documentation.
#   https://github.com/dispoclavier/nouvel-azerty/blob/main/readme.md
#
#   "▿" U25BF WHITE DOWN-POINTING SMALL TRIANGLE representing the no-break
#   space U00A0, by at, is by courtesy of the Draw Spaces plugin of GEdit.
#   See # # Symbols for NO-BREAK SPACE
#
#
#   Windows-specific
#
#   Sequences yielding composed letters are additionally repurposed as
#   Windows-specific shortcuts in an attempt to improve the degraded
#   user experience on Windows due to the defective DEADTRANS macro.
#   See #   Lines starting with "#@"
#   See # # Notes for maintenance
#   See # # Notes about documentation
#   See #@<
#
#
#   Acute accent below
#
#   The acute accent below virtual dead key is skipped in favor of the virtual
#   double acute accent dead key, the more as there are no precomposed letters
#   with an acute accent below. Therefore, a virtual dead key is not required.
#   The only two “acute below” characters are supported by ampersand for
#   "̗" U0317 COMBINING ACUTE ACCENT BELOW, and by underscore for
#   "ˏ" U02CF MODIFIER LETTER LOW ACUTE ACCENT.
#   See #^# DOUBLE_ACUTE
#   See #*# GRAVE
#   See #   Grave accent below
#
