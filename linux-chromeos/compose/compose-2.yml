#
#
# # TILDE&AMPERSAND
#
#   This new virtual dead key uses the synergy of the dead_tilde main instance,
#   on key D11, level 3, with the ampersand on D10, level 3, according to the
#   new ASCII symbol map on alphabetic keys.
#
#   The TILDE&AMPERSAND dead key is partly dedicated to African click letters,
#   that hopefully come into the benefit of a consistent input method
#   additionally to their support in group 5 with another set of base letters.
#   See #+# GROUP_5
#
#   Three click letters have Latin equivalents in Zulu and are mapped on these
#   letters consistently, while another two use graphic mnemonics based on "O"
#   and on H, the latter thought of as sideways. These base letters are case
#   insensitive except q for intuitivity of the support for the superscript:
#
#       c  "ǀ" U01C0 LATIN LETTER DENTAL CLICK
#       x  "ǁ" U01C1 LATIN LETTER LATERAL CLICK
#       q  "ǃ" U01C3 LATIN LETTER RETROFLEX CLICK (post)alveolar click (IPA)
#
#       Q  "𐞹" U107B9 MODIFIER LETTER RETROFLEX CLICK WITH RETROFLEX HOOK
#
#       H  "ǂ" U01C2 LATIN LETTER ALVEOLAR CLICK  palatoalveolar click (IPA)
#       O  "ʘ" U0298 LATIN LETTER BILABIAL CLICK
#
#   Other parts of this dead key are dedicated to combining diacritics, with
#   the ampersand carrying the "combining" semantics.
#   See # # Combining Diacritical Marks for Symbols used in mathematics
#
#   While the mnemonics based on ASCII symbols are obvious, the mnemonics based
#   on letters use a new-school French AZERTY and its ASCII symbol map on the
#   alphabetic keys and row-B punctuation keys B01..B10, C01..C10 and D01..D10,
#   except for the annuity diacritic "⃧" U20E7 mapped on case insensitive A.
#   The list has been reordered alphabetically for consistency, but it started
#   with D and F for opening and closing parentheses "᫁" U1AC1, "᫃" U1AC3,
#   "᫂" U1AC2, "᫄" U1AC4, using uppercase for above, lowercase for below.
#
#   Half macrons and tildes start on the keys that their multikey equivalents
#   "|" and "~" are on, for the variants above: "︤" UFE24, "︥" UFE25, "︢" UFE22
#   and "︣" UFE23. But for these, the semantics of uppercase/lowercase is used
#   for the left and right halves, with the rationale that uppercase carries
#   semantics of start when it is in titlecase position. The variants below are
#   on a letter whose key is below M or T on the keyboard: G for the half tilde
#   "︩" UFE29 and the half tilde "︪" UFE2A, N for the half macron "︫" UFE2B and
#   the half macron "︬" UFE2C. This assumes a French AZERTY, where M comes
#   after L, and N is the last letter in the row below the row that M is in.
#
#   The ligature halves below are on L: "︧" UFE27, "︨" UFE28, while those above
#   – "︠" UFE20, "︡" UFE21 – are on P, as the P key is nearly above the L key,
#   and it benefits from the ampersand mnemonic.
#
#   By contrast, the "᫇" U1AC7 and "᷹" U1DF9 diacritics use graphic mnemonics
#   on case insensitive W and U.
#
#   As of the combining diacritic, the pick is the most iconic of the already
#   supported combining diacritics, also matching the ampersand silhouette,
#   "⃤" U20E4 COMBINING ENCLOSING UPWARD POINTING TRIANGLE, and for the spacing
#   clone, "△" U25B3 WHITE UP-POINTING TRIANGLE as the closest spacing
#   counterpart.
#
