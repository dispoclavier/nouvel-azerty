#
#
# # Lenient dead key press
#
#   When dead keys are chained, dead keys virtualized by multiple press may be
#   abbreviated to single press so as to streamline the user experience.
#   See #   Lenient dead key press
#   See # # INVERTED&CURL
#
#   When the scheme applies to the group dead key, it is called “lenient group
#   selection” for clarity.
#   See #   Lenient group selection
#
#   Where diacritical or transformational dead keys are chained with the group
#   dead key, empty lower groups are used for redundant mappings of characters
#   expected in higher groups, so as to not require activating the exact group.
#
#   This is part of the streamlined, “un-screwed-up” user experience set as an
#   implicit design goal.
#   See #   Streamlining
#   See # # Symbols for multikey
#
#
# # Quotation mark input method
#
#   A complete set of current curly quotes is input on unshifted keys, thanks
#   to the fact that both the involved dead keys and the base characters have
#   base level mappings.
#
#   This is part of the dead key enhancement based on considering each dead key
#   a group selector activating the "<dead key> group": "circumflex group", or
#   "dead_circumflex group", for example.
#
#   Common quotation marks:
#
#       Circumflex:   turned high    opening or closing   U2018, U201C
#       See #*# CIRCUMFLEX
#
#       Acute accent: high           closing or opening   U2019, U201D
#       See #*# ACUTE
#
#       Diaeresis:    low            opening              U201A, U201E
#       See #*# DIAERESIS
#
#   Additionally, some rare quotation marks are also supported, with a dead key
#   that is not at the base level:
#
#       Grave accent: reversed high  opening              U201B, U201F
#       See #*# GRAVE
#
#       Double grave, or diaeresis + grave:    reversed low      U2E42
#       See #^# DOUBLE_GRAVE
#       See # # DIAERESIS&GRAVE
#
#
#   Alternative multikey support
#
#   Conflicting multikey equivalents as part of the quotation mark support by
#   dead keys are commented out according to the related policy.
#   See # # Multikey equivalents
#
#   To palliate the resulting lack of multikey support, the affected set of
#   most current apostrophe-and-comma-shaped quotation marks is supported by
#   another facility.
#   See # # Comma-shaped quotation marks
#
#
#   Ornamental quotation marks
#
#   "❝" U275D, "❞" U275E, "❠" U2760, as well as "❛" U275B, "❜" U275C "❟" U275F,
#   are supported in group 1, and "🙶" U1F676, "🙷" U1F677, "🙸" U1F678 are in
#   group 2.
#
#
# # Mathematical symbols
#
#   Approximation: See #*# TILDE
#   Negation:      See #*# STROKE
#   Equality:      See #*# FLAG
#
#
# # Spacing modifier letters and clones of diacritics
#
#   An input method based on overtyping reportedly existed on very old systems.
#   Most of the spacing diacritics in Latin-1 were replaced with letters in
#   Latin-15, but other symbols were replaced too, while a diacritic remained.
#
#   The Unicode Standard states in §7.9 that it is not clear whether diacritics
#   were combining or standalone.
#   https://www.unicode.org/versions/Unicode17.0.0/core-spec/chapter-7/#G18173
#
#   Unicode added U02D8..U02DD to the Latin-1 diacritics merely for roundtrip
#   compatibility with pre-existing character sets.
#
#   Using standalone, separate spacing characters as dead characters (Windows)
#   or terminators (macOS) in dead keys is not possible consistently throughout
#   and is a reason why many keyboard layouts are not streamlined, and dead key
#   behavior is inconsistent. The most outstanding example is a dedicated "ê"
#   key, when "ê" is better supported by configuring the circumflex accent dead
#   key accordingly, with "ê" U00EA as a dead character. Other examples include
#   unrelated dead characters for hook and horn and for almost all chained dead
#   keys, when using diacriticized letters instead makes the user experience
#   more consistent by showing a preview (macOS) or an example on failure with
#   the ability to emulate an "Ê" key (Windows). This "Ê" key emulation is
#   cross-platform compatible. A "Ç" key can also be emulated.
#   See #*# CIRCUMFLEX
#   See #*# CEDILLA
#   See #*# HOOK
#   See #*# HORN
#
#   Both NBSP U00A0 (AltGr + spacebar) and NBTSP U202F (AltFr + spacebar) are
#   used as base characters.
#
#   DIAERESIS "¨" U00A8 and CEDILLA "¸" U00B8 exist only in Latin-1, so these
#   are accessible both ways.
#
#   By contrast, Latin-1 MACRON "¯" U00AF and ACUTE ACCENT "´" U00B4 match
#   modifier letters. Then, the modifier letters’ base character is NBTSP, and
#   the Latin-1 avatars’ is NBSP exclusively.
#
#   For consistency, the ASCII symbols GRAVE ACCENT "`" U0060,
#   CIRCUMFLEX ACCENT "^" U005E and TILDE "~" U007E are included as well.
#
#
# # Dead characters for portability
#
#   On Windows, each dead key has a mandatory and unique dead character through
#   which it exists in the C source, while on MacOS, dead keys have arbitrary
#   identifiers, and the optional character related to a dead key is merely a
#   UX feature called terminator. Both OSes output it when the base character
#   is not listed with the current dead key, prior to outputting the unchanged
#   base character itself. XCompose, by contrast, has no output in this case.
#
#   Traditionally, this character is output in isolation on hitting space after
#   a dead key, but space is now reserved for the related combining diacritic,
#   and this is inappropriate as a dead character, because dead characters must
#   be spacing so as to be clearly distinguishable and keep user experience at
#   a correct level, also with respect to the use on macOS of these characters
#   as terminators displayed on a yellow background during an ongoing sequence,
#   and in support of the new XKB feature displaying underlined dead characters
#   picked in a system file, as opposed to Windows not providing any feedback.
#
#   Yet, many diacritics do not have any spacing clone to be picked as a dead
#   character or terminator. By contrast, picking the dead character from the
#   dead key output is universal.
#
#   The topmost reason for picking the dead character from the dead key output
#   is that an "Ê" key emulation on the circumflex accent dead key requires "ê"
#   as a dead character in dead_circumflex, and so does the "Ç" key emulation
#   require "ç" in dead_cedilla. But this is limited to Windows.
#   See #*# CIRCUMFLEX
#   See #*# CEDILLA
#
#   For dead_tilde, the dead character base letter is "e" for consistency with
#   dead_belowtilde, that is precomposed only with "e", "i", "u", and for
#   equity, as opposed to picking one of "ã", "ñ", "õ", and thus favoring
#   either Portuguese or Spanish. The "ẽ" also makes for a consistent mnemonic,
#   as "tilde" ends in "e".
#   See #*# TILDE
#   See #^# MIDDLE_TILDE
#
#   For documentation, a list of dead character candidates is provided here.
#   For natively unsupported dead keys, a keysym candidate is proposed as well.
#   See # # Dead keys not included in keysymdef.h
#
#   <dead_abovedot>                                     "ṗ" U1E57 LATIN SMALL LETTER P WITH DOT ABOVE
#   <dead_abovering>                                    "å" U00E5 LATIN SMALL LETTER A WITH RING ABOVE
#   <dead_abovering><dead_abovering>                    "ḁ" U1E01 LATIN SMALL LETTER A WITH RING BELOW
#   <dead_acute>                                        "ó" U00F3 LATIN SMALL LETTER O WITH ACUTE
#   <dead_belowcomma>                                   "ș" U0219 LATIN SMALL LETTER S WITH COMMA BELOW
#   <dead_belowdot>                                     "ḅ" U1E05 LATIN SMALL LETTER B WITH DOT BELOW
#   <dead_belowdot><dead_belowdot>                      "ƞ" U019E LATIN SMALL LETTER N WITH LONG RIGHT LEG
#   <dead_breve>                                        "ŏ" U014F LATIN SMALL LETTER O WITH BREVE
#   <dead_caron>                                        "ȟ" U021F LATIN SMALL LETTER H WITH CARON
#   <dead_cedilla>                                      "ç" U00E7 LATIN SMALL LETTER C WITH CEDILLA
#   <dead_circumflex>                                   "ê" U00EA LATIN SMALL LETTER E WITH CIRCUMFLEX
#   <dead_circumflex><dead_circumflex>                  "ḙ" U1E19 LATIN SMALL LETTER E WITH CIRCUMFLEX BELOW
#   <dead_currency>                                     "¤" U00A4 CURRENCY SIGN
#   <dead_diaeresis>                                    "ë" U00EB LATIN SMALL LETTER E WITH DIAERESIS
#   <dead_diaeresis><dead_diaeresis>                    "ṳ" U1E73 LATIN SMALL LETTER U WITH DIAERESIS BELOW
#   <dead_doubleacute>                                  "ű" U0171 LATIN SMALL LETTER U WITH DOUBLE ACUTE
#   <dead_grave>                                        "ò" U00F2 LATIN SMALL LETTER O WITH GRAVE
#   <dead_grave><dead_grave>                            "ȕ" U0215 LATIN SMALL LETTER U WITH DOUBLE GRAVE
#   <dead_greek>                                        "ε" U03B5 GREEK SMALL LETTER EPSILON
#
#       The "Greek letter" dead key is required by the French keyboard standard
#       (NF Z71-300:2019, page 17, section 6.2.5; page 7, introduction, bottom;
#       the dead character specified page 28, row C05, is "µ" U00B5 (“U+014B”))
#       for scientific notation, but on this keyboard layout, it is the circled
#       dead key alongside and could thus have a related dead character such as
#       <dead_greek>                                    "⚪" U26AA MEDIUM WHITE CIRCLE (an emoji)
#       But for diplomatic reasons it is advisable to stick with a Greek letter
#       at the expense of user-friendliness with respect to persons not reading
#       Greek, and bothered by the presence of Greek letters on French keymaps.
#
#   <dead_hook>                                         "ɱ" U0271 LATIN SMALL LETTER M WITH HOOK
#   <dead_horn>                                         "ơ" U01A1 LATIN SMALL LETTER O WITH HORN
#   <dead_invertedbreve>                                "ȏ" U020F LATIN SMALL LETTER O WITH INVERTED BREVE
#   <dead_macron>                                       "ō" U014D LATIN SMALL LETTER O WITH MACRON
#   <dead_macron><dead_macron>                          "ḇ" U1E07 LATIN SMALL LETTER B WITH LINE BELOW
#   <dead_ogonek>                                       "ǫ" U01EB LATIN SMALL LETTER O WITH OGONEK
#   <dead_stroke>                                       "ø" U00F8 LATIN SMALL LETTER O WITH STROKE
#   <dead_tilde>                                        "ẽ" U1EBD LATIN SMALL LETTER E WITH TILDE
#   <dead_tilde><dead_tilde>                            "ḛ" U1E1B LATIN SMALL LETTER E WITH TILDE BELOW
#   <UEFD0>                  <*dead_group>              "①" U2460 CIRCLED DIGIT ONE
#   <UEFD0><UEFD0>           <*dead_group2>             "②" U2461 CIRCLED DIGIT TWO
#   <UEFD0><3>               <*dead_group3>             "③" U2462 CIRCLED DIGIT THREE
#   <UEFD0><4>               <*dead_group4>             "④" U2463 CIRCLED DIGIT FOUR
#   <UEFD0><5>               <*dead_group5>             "⑤" U2464 CIRCLED DIGIT FIVE
#   <UEFD0><6>               <*dead_group6>             "⑥" U2465 CIRCLED DIGIT SIX
#   <UEFD0><7>               <*dead_group7>             "⑦" U2466 CIRCLED DIGIT SEVEN
#   <UEFD0><8>               <*dead_group8>             "⑧" U2467 CIRCLED DIGIT EIGHT
#   <UEFD0><9>               <*dead_group9>             "⑨" U2468 CIRCLED DIGIT NINE
#   <UEFD0><0>               <*dead_group10>            "⑩" U2469 CIRCLED NUMBER TEN
#   <UEFD0><1>               <*dead_group11>            "⑪" U246A CIRCLED NUMBER ELEVEN
#   <UEFD0><2>               <*dead_group12>            "⑫" U246B CIRCLED NUMBER TWELVE
