#
#
#*# HORN
#   horn, notch, low left serif, descender
#   dead_horn
#   Multikey: ¦+
#
#   As HORN has no reported usage outside Unicode precomposed letters, and the
#   precomposed letters with horn alone come in two pairs only, dead_horn is
#   extended to support the Swedish "ⱸ" U2C78 LATIN SMALL LETTER E WITH NOTCH,
#   two letters "ꭕ" UAB55 and "ꭙ" UAB59 with a low serif on the left leg, and
#   the historic letters with descender "Ⱨ" U2C67, "ⱨ" U2C68, "Ⱪ" U2C69,
#   "ⱪ" U2C6A, "Ⱬ" U2C6B, "ⱬ" U2C6C, "Ꞑ" UA790, "ꞑ" UA791. The mnemonics are
#   based on considering the notch and the serif as a low upwards horn, the
#   descender as a low downwards horn.
#   https://www.frathwiki.com/Horn
#   https://www.frathwiki.com/Descender
#   https://fr.wikipedia.org/wiki/%E2%B1%B8
#   https://fr.wikipedia.org/wiki/%EA%AD%95
#
#   HORN could also be used as an easier alternative for the belt diacritic.
#   It is not, to prevent HORN from becoming an unmnemonic holdall.
#   See #^# BREVE_BELOW
#
#
#   Pilcrow signs and bullets
#
#   Thanks to the availability of both "p" and "q", dead_horn is also used for
#   intuitive shortcuts to pilcrow signs and “pilcrow bullets,” both of which
#   come in two symmetric forms, the reversed of each other, with the bullets
#   used as signature marks. They may also have bracketing, opening and closing
#   semantics:
#
#       Q  "¶" U00B6 PILCROW SIGN
#       q  "⁌" U204C BLACK LEFTWARDS BULLET
#       P  "⁋" U204B REVERSED PILCROW SIGN
#       p  "⁍" U204D BLACK RIGHTWARDS BULLET
#
#   See #   “Pilcrow bullets”
#   See #^# Abbreviations, Units and Legal Symbols
#
#
#   Math symbols
#
#   Consistently with other dead keys supporting diacriticized math symbols,
#   and with mnemonics based on dead_horn’s multikey equivalent, less yields
#   "⥆" U2946, and greater yields "⥅" U2945.
#
#
#   Arrows
#
#   Digits yield simple arrows "←" U2190.."↙" U2199 as a redundant facility
#   expected to meet most common user expectations. Double arrows are yielded
#   by *dead_flag.
#   See #*# FLAG
#
#
#   Diacritics
#
#   Additionally to the combining horn "̛" U031B, this supports "᫉" U1AC9
#   COMBINING DOUBLE PLUS SIGN ABOVE by quotedbl or EuroSign, while the single
#   counterpart "᫈" U1AC8 is supported in combining above.
#   See #^# COMBINING_ABOVE
#
#   This also supports "᫊" U1ACA COMBINING DOUBLE PLUS SIGN BELOW by ampersand,
#   while the single counterpart "̟" U031F is supported in combining below.
#   See #^# COMBINING_BELOW
#
#
#   Spacing modifier letters
#
#   Instead of a non-existing spacing clone of "̛" U031B, "ꜚ" UA71A is picked,
#   based on the horn’s shape, although this is a Chinantec tone mark, but a
#   spacing modifier letter anyway.
#
#   The other Chinantec tone marks "ꜗ" UA717, "ꜘ" UA718, "ꜙ" UA719 are in
#   dead_abovedot, and the full set has dedicated multikey support.
#   See #*# DOT_ABOVE
#   See #^# Chinantec tone marks
#
#   Another mnemonic spacing modifier letter, "˖" U02D6 MODIFIER LETTER PLUS
#   SIGN, based on the horn’s multikey equivalent, is supported by other base
#   letters: not case insensitive P, as this is used for pilcrow signs and
#   bullets, but all other fully available base letters for a streamlined user
#   experience.
#
<dead_horn>                                                                                <space> : "̛" U031B # COMBINING HORN
<Multi_key><plus>                                                                          <space> : "̛" U031B # COMBINING HORN
<dead_horn>                                                                                <U200B> : "̛" U031B # COMBINING HORN
<Multi_key><plus>                                                                          <U200B> : "̛" U031B # COMBINING HORN
<dead_horn>                                                                         <nobreakspace> : "ꜚ" UA71A # MODIFIER LETTER LOWER RIGHT CORNER ANGLE
<Multi_key><plus>                                                                   <nobreakspace> : "ꜚ" UA71A # MODIFIER LETTER LOWER RIGHT CORNER ANGLE
