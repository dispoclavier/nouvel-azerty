#
#
#^# SQUIRREL_TAIL
#   mid-height left hook, squirrel tail
#   dead_hook triple press
#   Multikey: ¦{{{
#
#   The squirrel tail and mid-height left hook are merged in a single dead key
#   thanks to their empty intersection. This composite dead key is named after
#   the squirrel tail for iconicity, and because the mid-height left hook uses
#   two word separators while a single one, space, is required.
#
#
#   Fullwidth punctuation
#
#   With an alphabetic mnemonic, dead_hook on key D08 "I" as "IDEOGRAPHIC"
#   yields CJK symbols and punctuation, single on single press, most double on
#   double press, and triple press yields "〚" U301A, "〛" U301B.
#
#            <bracketleft> : "〚" U301A LEFT WHITE SQUARE BRACKET
#           <bracketright> : "〛" U301B RIGHT WHITE SQUARE BRACKET
#
#   Single press is in dead_hook.
#   See #*# HOOK
#
#   Double press is duplicated in *dead_retroflexhook.
#   See #^# CURL
#   See #*# RETROFLEX_HOOK
#
#   Triple press is duplicated in dead_abovedot.
#   See #^# SQUIRREL_TAIL
#   See #*# DOT_ABOVE
#
#
#   Diacritic
#
#   As a diacritic, double ring is used, as coming closest to a squirrel tail.
#   As the combining double ring below has no spacing clone nor any modifier
#   looking close to it, the centered half rings "˒" U02D2, "˓" U02D3 are used
#   instead, with a rationale based on the laterality of the AltFr and AltGr
#   modifier keys involved in typing these left and right half rings this way.
#   See #^# CURL
#
