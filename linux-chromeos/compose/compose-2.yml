#
#
#^# CURL
#   curl, crossed-tail, loop, flourish, hook tail
#   dead_hook double press
#   Multikey: ¦{{
#
#   This virtual dead key on dead_hook double press supports letters whose hook
#   is elongated, mostly until crossing itself. The extension has various names
#   and is found as a CURL on "ɕ" U0255, "ȡ" U0221, "ʥ" U02A5, "ȴ" U0234,
#   "ȵ" U0235, "𝼞" U1DF1E, "ȶ" U0236, "ʨ" U02A8, "ⱴ" U2C74, "ʑ" U0291 and
#   "ʓ" U0293; as a CROSSED-TAIL on "ꬼ" UAB3C, "ꬶ" UAB36, "Ʝ" UA7B2, "ʝ" U029D,
#   "ꬺ" UAB3A, "ꬻ" UAB3B, "ꭉ" UAB49 and "ꭊ" UAB4A; and as a LOOP on "Ꝍ" UA74C,
#   "ꝍ" UA74D and "Ỿ" U1EFE, "ỿ" U1EFF.
#   See  WITH CURL
#   See  WITH CROSSED-TAIL
#   See  WITH LOOP
#
#   This also supports FLOURISH for the purpose of streamlining the input,
#   instead of supporting "Ꝓ" UA752, "ꝓ" UA753, "Ꞗ" UA796, "ꞗ" UA797 and
#   "ꬴ" UAB34 only by triple press.
#
#   Double press of dead_hook is also the straightforward input method for
#   "Ɋ" U024A, "ɋ" U024B when considering its HOOK TAIL as a downwards hook,
#   as opposed to the upwards HOOK of "ʠ" U02A0 in dead_hook single press.
#
#
#   Ayin
#
#   This also supports the LATIN LETTER AIN "ᴥ" U1D25, for its loop form, by
#   case insensitive "i" for the shape mnemonic based on its curly glyph close
#   to a handwritten dotless "i", because "q" close to its phonetic notation
#   "ʕ" U0295 is required for "Ɋ" U024A, "ɋ" U024B.
#
#   For consistency, the EGYPTOLOGICAL AIN "Ꜥ" UA724, "ꜥ" UA725 is supported as
#   well, by "H", "h" by lack of any better base letter remaining, and with a
#   mnemonic upside by immediately preceding the base letter "i" of "ᴥ" U1D25;
#   and for completeness, the EGYPTOLOGICAL ALEF "Ꜣ" UA722, "ꜣ" UA723 by "A",
#   "a", even though these do not feature any curl, while being somewhat curly
#   by themselves.
#
#
#   Fullwidth punctuation
#
#   With an alphabetic mnemonic, dead_hook on key D08 "I" as "IDEOGRAPHIC"
#   yields CJK symbols and punctuation, single on single press, most double on
#   double press, and triple press yields "〚" U301A, "〛" U301B.
#
#               asciitilde : "〰" U3030 WAVY DASH
#                braceleft : "〘" U3018 LEFT WHITE TORTOISE SHELL BRACKET
#               braceright : "〙" U3019 RIGHT WHITE TORTOISE SHELL BRACKET
#                parenleft : "〖" U3016 LEFT WHITE LENTICULAR BRACKET
#               parenright : "〗" U3017 RIGHT WHITE LENTICULAR BRACKET
#              bracketleft : "『" U300E LEFT WHITE CORNER BRACKET
#             bracketright : "』" U300F RIGHT WHITE CORNER BRACKET
#                     less : "《" U300A LEFT DOUBLE ANGLE BRACKET
#                  greater : "》" U300B RIGHT DOUBLE ANGLE BRACKET
#
#   Single press is in dead_hook.
#   See #*# HOOK
#
#   Double press is duplicated in *dead_retroflexhook.
#   See #^# CURL
#   See #*# RETROFLEX_HOOK
#
#   Triple press is duplicated in dead_abovedot.
#   See #^# SQUIRREL_TAIL
#   See #*# DOT_ABOVE
#
#
#   Diacritic
#
#   As a diacritic, the double ring is provided, for coming closest to a curl
#   below. Yet this has no spacing clone, nor any modifier looking close to it.
#   So, the centered half rings "˒" U02D2, "˓" U02D3 are provided instead, with
#   a rationale based on the laterality of the AltFr and AltGr modifier keys
#   involved in typing these left and right half rings in this setting.
#   See #*# HOOK_ABOVE
#
