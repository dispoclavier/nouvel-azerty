#
#
#*# RING_ABOVE
#   ring, ring above, circle above, middle ring, low ring inside, low right ring
#   dead_abovering
#   Multikey: ¦*
#
#   Ring above has no reported usage beyond precomposed letters.
#   https://www.frathwiki.com/Ring_Above
#
#   Lowercase "x" is required for "ꭖ" UAB56 LATIN SMALL LETTER X WITH LOW RIGHT
#   RING as a base character, and uppercase "X" is required for "ꭔ" UAB54 LATIN
#   SMALL LETTER CHI WITH LOW RIGHT RING, consistently with supporting
#   "ꭘ" UAB58 LATIN SMALL LETTER X WITH LONG LEFT LEG AND LOW RIGHT RING in
#   dead_macron due to its long leg. This prevents "ꭔ" UAB54 LATIN SMALL LETTER
#   CHI WITH LOW RIGHT RING from having "q" picked as a base character given
#   that en_US.UTF-8/Compose used it previously as a base character for Greek
#   chi, when French-style phonetic mnemonics prevailed over graphic mnemonics.
#   See #*# GREEK_OR_CIRCLED
#   See #+# GROUP_3
#   See #+# GROUP_4
#
#
#   Half rings
#
#   This also supports combining half rings "͑" U0351, "͗" U0357 with matching
#   parentheses as base characters.
#
#   So as to extensively support half rings, spacing half rings are also
#   included. As these are either right, left, raised or centered, digits are
#   used as base characters, with numpad-based mnemonics:
#
#       4  "˓" U02D3 MODIFIER LETTER CENTRED LEFT HALF RING
#       6  "˒" U02D2 MODIFIER LETTER CENTRED RIGHT HALF RING
#       7  "ʿ" U02BF MODIFIER LETTER LEFT HALF RING
#       9  "ʾ" U02BE MODIFIER LETTER RIGHT HALF RING
#
#
#   Asterisks
#
#   Asterisk symbols "⁎" U204E, "⁑" U2051, "⁂" U2042 are also supported, with
#   the related digits as base characters, and so are the asterisk operator
#   "∗" U2217, by "5" with mnemonics based on the centered alignment of this
#   operator, and the star operator "⋆" U22C6 by "8". (But there is no room
#   left for stars "★" U2605 and "☆" U2606, that have easy support in group 1.)
#
#
#   Degree sign
#
#   As a matter of supporting the degree sign by dead key, alongside its support
#   on live key, after the loss of its en_US.UTF-8/Compose sequence <o> <o>, the
#   left-over base character "0" is used, with a huge upside of sideways compat.
#   See # # Degree sign
#   See # # "°" U00B0
#
#   Unpreferred yet not discouraged precomposed temperature units "℃" U2103 and
#   "℉" U2109, and conflicting "Å" U212B in group 1, are supported for
#   completeness, and so is the formally unrelated "K" U212A alongside,
#   although all of these are supported by dedicated multikey sequences.
#   See #^# Abbreviations, Units and Legal Symbols
#
#
#   Math symbols
#
#   Consistently with other dead keys supporting diacriticized math symbols,
#   case insensitive "T" yields "⟟" U27DF; braceright (base character of
#   "∅" U2205 in the symbol group 2) yields "⦲" U29B2; plus yields "⨢" U2A22;
