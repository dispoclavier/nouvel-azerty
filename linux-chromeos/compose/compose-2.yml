#
#
#^# INVERTED
#   inverted, sideways, more turned
#   *dead_turned double press
#   Multikey: ¦%%
#
#   This supports the full set of those among the Old Lisu letters that can be
#   used for writing in turned Latin letters, except "ꓞ" UA4DE, that is in the
#   single press dead key for the sake of using the uppercase slot of "ɟ" U025F
#   and making room for the Claudian letter "Ⅎ" U2132, that has a lowercase
#   form "ⅎ" U214E, intended to meet Unicode casing requirements, and thus less
#   appropriate for support in the single press *dead_turned, where "ɟ" U025F
#   is more convenient.
#   See #*# TURNED
#
#   The other Claudian letters are "Ↄ" U2183, "ↄ" U2184
#   https://en.wikipedia.org/wiki/Claudian_letters
#   See #*# REVERSED
#   and "Ⱶ" U2C75, "ⱶ" U2C76.
#   See #+# GROUP_5
#
#   Old Lisu does not turn the letters M, Q, W.
#
#   The two parentheses yield the two underties, one of which is inverted:
#   "⁔" U2054, "‿" U203F. For mnemonics, these are like sideways, or vertical
#   parentheses. "⁀" U2040 and "‿" U203F are also in group 12 of "(" and ")".
#   See # # C03 parenleft
#   See # # C04 parenright
#
#   As a diacritic, "̕" U0315 COMBINING COMMA ABOVE RIGHT is included, with the
#   rationale that turning twice may be used to represent a shift to the right.
#   Rather than "̓" U0313 COMBINING COMMA ABOVE, as this is supported in
#   dead_belowcomma double press.
#   See #^# COMMA_ABOVE
#
#   As a spacing clone, letter apostrophe "ʼ" U02BC is picked invariably.
#
