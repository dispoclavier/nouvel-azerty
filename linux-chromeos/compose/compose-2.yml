#*# HACEK
#   dead_caron
#   Multikey: ¦>
#
#   For consistency with undiacriticized Czech spelling "haček" following
#   Ken Whistler, this dead key is spelled "HACEK" rather than "HATCHEK".
#   https://www.unicode.org/notes/tn24/NamesList-4.1.0en_US.txt
#   https://www.unicode.org/notes/tn24/
#
#
#   Subscripts
#
#   The hacek dead key supports subscript digits, for the sake of conformance
#   with NF Z71-300:2019, 6.3.3 p24, that E DIN 2137-1:2020-11 has been synced
#   with.
#   https://de.wikipedia.org/wiki/DIN_2137#%C3%9Cberarbeitung_2020
#   See #*# CIRCUMFLEX
#
#   This redundancy with the subscript dead key is extended to the signs and
#   parentheses, although the French standard does not require these in 2019.
#   But the ISO/IEC 9995-11 standard makes it optional since its 2026 revision.
#   See #*# CIRCUMFLEX
#   See #*# SUBSCRIPT
#
#   Multikey equivalents are deactivated due to conflicts with mathematical
#   symbols, that would require leading space.
#
#
#   Turned letter apostrophe
#
#   Followed by comma, dead_caron provides an additional input method for
#   "ʻ" U02BB MODIFIER LETTER TURNED COMMA.
#   See # # B06 grave
#
#
#   Dagger
#
#   Followed by bar, dead_caron yields the right-guard dagger "⸷" U2E37,
#   consistently with dead_circumflex yielding its left-guard couterpart.
#   See #*# CIRCUMFLEX
#
#
#   Diacritic
#
#   The doubled diacritic "᫏" U1ACF COMBINING DOUBLE CARON (since Unicode 17.0)
#   is the hacek counterpart of "᪰" U1AB0 COMBINING DOUBLED CIRCUMFLEX ACCENT.
#   It has case insensitive "w" as base characters, with graphic mnemonics,
#   thanks to hacek not having any precomposed "w̌".
#   https://www.unicode.org/charts/PDF/Unicode-17.0/U170-1AB0.pdf
#   See "᪰" U1AB0
#
#
#   Shortcut
#
#   For ease of access, and in an attempt to meet potential user expectations,
#   the hacek dead key is also activatable by dead_circumflex double press,
#   extending the logic that multiple dead key presses shift diacritics around,
#   to consider that they may also turn them.
#
#   Chaining is only supported with the group dead key.
#
#   For portability, the full dead key content is supported, as well as
#   multikey, even though that does not make sense.
#
#   For maintainability of the code, and usability of the documentation, this
#   dead key content is grouped in a single place.
#   See # # Notes about documentation
#
