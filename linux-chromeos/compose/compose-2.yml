#
#
#*# DOUBLE_ACUTE
#   dead_doubleacute
#   Multikey: ¦"
#
#   This dead key supported by XKB supports what can also be virtualized by
#   dead_acute double press.
#   See #^# DOUBLE_ACUTE
#
#   The DOUBLE_ACUTE dead key is required for consistency with the characters
#   mapped at level 3, and with the new-school multikey scheme mapping dead
#   keys and ASCII symbols (except ampersand and question mark) bijectively.
#   See # # Introducing new-school input composition
#
#   Multikey sequences with quotedbl are duplicated with EuroSign, to account
#   for the mapping of EuroSign instead of quotedbl for compliance with current
#   hardware and the European Commission’s recommendation, that is the purpose
#   of mapping quotedbl and dead_doubleacute on the "E" key (D04), rather than
#   braceleft and dead_hook (now on D08).
#   See dispocla.cpp ## Note about EURO SIGN
#
#   Double acute has no reported usage outside Unicode precomposed letters.
#   https://www.frathwiki.com/Double_Acute_Accent
#
#
#   Circled numbers
#
#   With digits, dead_doubleacute acts as a shortcut for double circled numbers
#   with “double” mnemonic. Double arrows have their mnemonic redundancy on
#   *dead_flag.
#   See #^# DOUBLE_CIRCLED
#   See #*# FLAG
#
#
#   Emoji
#
#   Double acute is chained with *dead_reversed for an emoji dead key designed
#   as a facility supporting some extra emoji on non-Windows OSes, in response
#   to the extra emoji on live keys with the additional modifier combinations
#   partly supported on Windows.
#   See kbcommon-1.c:142
#   See kbcomazerty.c
#   See kbligatures.c:761
#
#   This emoji dead key content is located after the symbol groups so as to get
#   out of compose-2.yml, due to a file size restriction on github.com.
#   See # # EMOJI_READY
#   See # # Notes for maintenance
#
