#*# GROUP_1 placeholder
#   group dead key
#   *dead_group UEFD0
#   Multikey: ¦#
#
#   The content of the group dead key is reunited in part 3, compose-3.yml, in
#   order to maintain the displayability of compose-2.yml on github.com, since
#   v2.3.0.
#   See #*# GROUP_1
#
#
#*# CURRENCY
#   dead_currency
#   Multikey: ¦$
#
#   This is 100% sideways compatible with en_US.UTF-8/Compose, except for the
#   double press, used to activate the CURRENCY_EXTENDED dead key, rather than
#   to yield the generic currency sign "¤" U00A4.
#
#   The generic currency sign "¤" U00A4 however is extensively supported, with
#   both the two breaking and the two no-break spaces as base characters, both
#   after single and double press, and by case insensitive <Multi_key><x><o>
#   sequences as sideways compatible multikey equivalents.
#   See #^# CURRENCY_EXTENDED
#   See # # Currency symbols by ISO codes
#
#   Letters Jj Qq Vv Xx Zz are unused in en_US.UTF-8/Compose dead_currency,
#   while nine symbols are left over among support by Latin base letters.
#   In en_US.UTF-8/Compose, the BENGALI RUPEE MARK "৲" U09F2 requires a thorn
#   live key, as "T", "t" base letters are used up for "₮" U20AE, "৳" U09F3,
#   while the INDIAN RUPEE SIGN "₹" U20b9 is supported only by multikey « ¦=R »
#   sequences. The other seven symbols are unsupported in en_US.UTF-8/Compose.
#
#   New base:
#   J        "৲" U09F2 # BENGALI RUPEE MARK
#   j        "₹" U20B9 # INDIAN RUPEE SIGN
#   Q        "₹" U20B9 # INDIAN RUPEE SIGN alternative
#   q        "֏" U058F # ARMENIAN DRAM SIGN
#   V        "₺" U20BA # TURKISH LIRA SIGN
#   v        "₾" U20BE # LARI SIGN
#   X        "₸" U20B8 # TENGE SIGN
#   x        "₼" U20BC # MANAT SIGN
#   Z        "₽" U20BD # RUBLE SIGN
#   z        "₷" U20B7 # SPESMILO SIGN
#
#   These are also supported in the new double press CURRENCY_EXTENDED,
#   as well as the following:
#
#   "₿" U20BF # BITCOIN SIGN
#   "₶" U20B6 # LIVRE TOURNOIS SIGN
#   "₻" U20BB # NORDIC MARK SIGN
#
#   See #^# CURRENCY_EXTENDED
#
#   These are duplicated on another base letter as well:
#
#   "৲" U09F2 # BENGALI RUPEE MARK
#   "₢" U20A2 # CRUZEIRO SIGN
#   "₵" U20B5 # CEDI SIGN
#   "₱" U20B1 # PESO SIGN
#   "௹" U0BF9 # TAMIL RUPEE SIGN
#
#   "₵" U20B5 # CEDI SIGN has Ccedilla as a base character too, for consistency
#   with en_US.UTF-8/Compose.
#
#   Integral symbols are also supported, based on "S" mnemonic, with the
#   corresponding digits as base characters. Likewise, contour integrals
#   are supported too, although these are also in dead_abovering.
#   See #*# RING_ABOVE
#
